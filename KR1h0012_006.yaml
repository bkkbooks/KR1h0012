body:
  text: 欽定四庫全書論語全解卷六宋陳祥道撰先進第十一子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進時有先後禮樂有文質先進於禮樂惟其寔而文不足故曰野人後進於禮樂惟其文而已故曰君子惟其文則非躬行者也故欲從先進以救之以其矯枉以直救時以正孔子筮得賁卦其色愀然與此仝意論語之言文質有曰從周從先進有曰彬彬彬彬者道之中從周從先進者時之中洪範三徳其施於爕强平康亦若是而已子曰從我於陳蔡者皆不及門也徳行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子㳺子夏子曰回也非助我者也於吾言無所不説門者道之微室者道之竗自門以徂堂入室之理也由微以至妙入道之序也孔子之門淵騫之徒從之也久造之也深其上有至于在寢其下有至于升堂故列之四科於陳蔡者則後其所從皆不及門孔子所以憫之也夫徳則成之以行言則成之以語政則成之以事文則成之以學徳行所以行道言語所以眀道政事則治人而已文學則道學而已由仲弓而上則具體而微者也由仲弓而下則得其一體者也其具體而微則同其所以具體而微則異故先顔閔而後伯牛仲弓其得一體則同而其所以得一體則異故先言語而後政事文學禮曰或以徳進或以事舉或以言揚其序與此不同者學道以言語為優取人以政事為先也子張之才與于四友曽子之孝幾於徳行而四科不稱之者盖論四科之時二子之才未成故也夫以二子之才未成猶不列於四科彼許商以四科論士王莾以四科取士不亦偽哉子曰孝哉閔子騫人不間於其父母昆弟之言孝於徳為本於行為大閔子騫盡孝之道能和睦而無怨者也故人不間於其父母兄弟之言曽参之孝特可語之以和睦無怨而已故或告其殺人而母疑之也亢倉子曰閔子善事父母交逰稱其信郷黨稱其仁宗族稱其弟徳行之人溢於天下所以人不間於其父母兄弟之言也南容三復白圭孔子以其兄之子妻之傳曰一言而非駟馬勿追一言而急駟馬勿及故在天有卷舌之星在周廟有金人之銘是言者榮辱之主禍福之機不可不慎也南容誦詩至白圭而三復可謂能慎矣此所以邦無道免於刑戮季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡君子之于天下異之以稱物同之以平施與上大夫言至于誾誾與下大夫言則侃侃而已對君與大夫可以同之哉故對哀公則詳對康子則畧顔淵死顔路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也顔淵死子曰噫天䘮予天喪予顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為顔淵死門人欲厚𦵏之子曰不可門人厚𦵏之子曰回也視予猶父也予不得視猶子也非我也夫二三子也君子之於人不以義掩恩不以恩掩義以義掩恩君子之所不忍以恩掩義君子之所不敢顔淵死而子哭之慟者恩也顔路請車以為椁而不與之義也孟子曰不得不可以為悦無財不可以為悅得之為有財古之人皆用之然則顔淵之貧非所謂有財其賤也非所謂得之此孔子所以不與之車而以門人厚𦵏為不可也回之死門人厚𦵏之孔子以為不可孔子之死門人以三代之禮𦵏之君子不以為非者盖有孔子之徳然後可𦵏以人所不可行之禮若無其徳如孔子而亦可以為師者門人厚𦵏之則過矣孔子曰才不才亦各言其子則與墨翟愛無差等異曰天䘮予則與哀公天祝予天祝予同鯉之死先於顔淵史記以顔淵之死先於鯉妄矣季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死善教者不陵節善學者不躐等子路問事鬼與知死躐等也孔子不告之不陵節也盖盡事人之道則知事鬼盡知生之理則可以知死死生之說鬼神之情状非夫原始要終極物知變孰與此哉然子貢問死者之所知而不告宰予問鬼神之名而告之其不告與此同其告與此異者盖所告者事鬼之事不告者事鬼之道也易以知死生先于鬼神子路之問則先事鬼而後及知死者盖問事鬼而不可得然後及於其次者閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂若由也不得其死然老子曰柔弱者生之徒剛强者死之徒周廟之銘曰强梁者不得其死好勝者必遇其敵故子路之行行孔子曰若由也不得其死然顔淵曰力猛于徳而得其死者鮮矣然則子路之與盆成括有以異乎曰括不聞道而小有才有必死之道由聞道而不能法有不得其死之道有必死之道不免為小人有不得其死之道無害為君子魯人為長府閔子騫曰仍舊貫如之何何必改作子曰夫人不言言必有中利不百者不變法功不十者不易器魯人為長府於利則不百于功則不十特傷財勞民而已閔子所以言仍舊貫如之何何必改作也言必有中與孔子之言皆中時病者同一意子曰由之瑟奚為于丘之門門人不敬子路子曰由也升堂矣未入於室也孔子之意欲子路之進於道也則抑之欲門人之知子路也則又譽之抑之者仁也譽之者義也子貢問師與商也孰賢子曰師也過商也不及曰然則師愈與子曰過猶不及子曰師也辟子㳺曰吾友張也為難能也過也子謂子夏曰無為小人儒子㳺曰子夏之門人小子當洒掃應對進退則可矣抑末也本之則無如之何不及也由世俗言之則過優於不及由禮義以觀之則過猶不及而已是故賢者過之不肖者不及而道之不眀一也智者過之愚者不及而道之不行一也墨翟之兼愛楊朱之為我其于害道一也單豹之飬内張毅之養外其于傷生一也或失之多或失之寡皆學者之弊或徐而甘或疾而苦皆輪人之患華無實實無華皆不足以為禮事勝辭辭勝事皆不足以為經然則過與不及豈相逺哉禮記言子夏除䘮而見予之瑟彈之而不成聲子張除䘮而見予之瑟彈之而成聲夫子夏善哀于巳三年之内子張忘哀于才三年之際則是商也過師也不及與此不同何也孔子家語毛氏詩傳言子夏援琴衎衎而樂損援琴切切而哀盖家語可信而記可疑季氏富於周公而求也為之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也喻于義者君子之事喻于利者小人之事冉有學君子之道而為小人之事故曰非吾徒也小子鳴鼓而攻之可也夫隠惡而揚善者孔子之心鳴鼓而攻之者孔子之所不得已也易夬揚于王庭周官戮而罰之皆鳴鼓而攻之之意也禮曰百乗之家不畜聚歛之臣與其有聚歛之臣寜有盗臣盖聚歛之臣倚法以削而其害大盗臣取非其有而其害小其害大者孟子以為民賊其害小者周官以為邦盗而已由此觀之則冉求之見惡於孔子宜矣然對季康子之問從政則取之此則攻之何也君子之于人不以所短廢所長亦不以所長蔽所短其取之者仁也其攻之者義也孔子不以管仲不知禮為不仁亦不以管仲之仁為知禮春秋不以僖公之有頌而隐其非不以春秋之有貶而沒其美亦猶是也柴也愚参也魯師也辟由也喭子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中愚則不智魯則不中喭則不怯子路使子羔為費宰孔子以為賊夫人之子及為成宰犯人之禾而不庚此柴之愚也以子㳺裼裘而弔為禮以孔子死欲速朽䘮欲速貧之言為是此参之魯也子貢仕于魯廢著鬻財於齊魯之間此貨殖者也邾子執玉髙其容仰定公執玉卑其容俯子貢視之以為皆死焉此億則屢中者也貨殖不受命不足為知天屢中不足為知人惟回之屢空為庶以其安命故也盖柴師参由蔽於性求賜累於物惟回則不然此所以為庶也子張問善人之道子曰不踐迹亦不入於室子曰論篤是與君子者乎色荘者乎所存者在心所行者在迹心過於迹則於君子為有餘迹過於心則於善人為不足盖善人之道未能有諸已者也未能有諸已則必以心踐迹然後能入於室子張禹行舜趋夷考其行而不掩迹焉不踐迹者也故答之以不踐迹亦不入於室然又曰論篤是與君子者乎色荘者乎謂躬行君子則善矣色荘則不足於善論不篤者以色荘為善人論篤者則與君子而已子張能荘而不能誠故告之如此易曰元者善之長君子體仁足以長人是善者仁之體仁者善之用子張未足於善人則其難與並為仁也固矣子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之善醫者之於人補其不足損其有餘善教者之於人長其善救其失此所以於求也退故進之由也兼人故退之也為人子者無私喜無私怒出必告反必面不有其身不私財不私其食饗不擅於税入有父兄在聞斯行諸其亦可乎曰告於父兄禮也聞斯行諸義也昔舜之娶君子以為猶告則聞斯行諸君子有時為之矣易曰過其祖是也盖由之有聞未之能行惟恐有聞故教之以禮而抑其過求悦夫子之道以力不足而自畫故教之以義而勉其不及若夫道無二子之蔽則行禮以義守義以禮惟其當而已子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死弟之於師猶臣之于君臣之于君君在與在君亡與亡故回曰子在回何敢死傳曰死者非難䖏死者難若回可謂知䖏死矣衛君之難孔子於柴知其來於由知其死及匡之難孔子於回則疑之何也君子之善死義也或不免焉命也義固可知而不可必命則難諶而不可知孔子之於匡畏所不可不畏於顔淵也疑所不可不疑季子然問仲由冉求可謂大臣與子曰吾以子為異之問曽由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弑父與君亦不從也大臣事君以道具臣事君以才事君以道故能致君於堯舜之隆措世于禮樂之盛及其不可則止而已事君以才則智足以効一官能足以効一軄及其不可則從之而巳仲由足於果不足於藝冉求足於藝不足於果季氏旅于泰山而不能救伐顓臾而不能諫而又不能致之而去是偹位者也故曰具臣然弑父與君而從之則孟子所謂亂臣者也由求于大臣則不能于姦臣則不為故曰弑父與君亦不從也齊魯二生漢召之而不至且曰禮樂必百年而後興是待天下以不仁也楊子謂之大臣過矣子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者聞學而後從政未聞以政學者也故先人民社稷而學之則事至而辦後人民社稷而學之則蒞事煩矣孔子喜開㸃之不願仕而惡子路以子羔為費宰則學其可忽哉夫有才而不聞道猶足以殺身則不學而仕者不能無害故曰賊夫人之子子産論尹何為邑亦猶是也子路曽晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乗之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉㸃爾何如鼓瑟希鏗爾舎瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大加以師旅因以饑饉則困于力而救死不暇矣困于力則不能勇救死不暇則不知為善由也於不知為善者則方之比及三年則能拯已困之民置之安强之地故不能勇者斯有勇不知為善者斯知方此果之效也足民者治之始禮樂者治之終求雖不足于禮樂而使足民此藝之效也由能勇而不知遜求赤知遜而不知道若㸃可謂知道矣故有志于學無志於仕而孔子與之也孔子無君則皇皇出疆必載質未嘗不急於仕也㸃無志於仕孔子與之可耶君子之於道有餘不可以不應不足不可以不求子有餘而急於應㸃不足而急于求此所以為孔子曽㸃也顔淵第十二顔淵問仁子曰克己復禮為仁一日克已復禮天下歸仁焉為仁由已而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣已物之敵也勝已之私謂之克禮性所有也克己而趋焉謂之復盖不逺之復令于修身故復禮本於克己克己則能仁復禮則能克一日克己復禮天下歸仁焉則不在久矣為仁由已則不在外矣為仁由已故不可以不克己非禮勿視勿聽勿言勿動故不可以不復禮孔子曰人而不仁如禮何禮曰道徳仁義非禮不成是禮以仁而後復仁以禮而後成顔淵嘗曰約我以禮盖所以成其心也然克己未至於無我復禮未至於中禮此回所以止于殆庶也今夫水性無人火性無我無人未離乎有我而於五蔵為精精則為賢人無我則不特無人而已故于五蔵為神神則為聖人回之克己孔子之無我如此而已仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎周禮大祭中祭小祭見於天官之酒正春官之大司樂大賔之禮大客之儀見于秋官之行人則凡祭與客其禮殺大祭大賔其禮隆出門如見大賔使民如承大祭欽也已所不欲勿施於人恕也欽則于人無所慢恕則於人無所拂故在邦無怨在家無怨在家無怨易在邦無怨難故先邦而後家也春秋傳曰出門如賔承事如祭仁之則也孟子曰强恕而行求仁莫近焉仲弓問仁故孔子答之如此仲弓嘗言居敬行簡而其行則不録舊罪使臣如借居敬行簡使臣如借則可教之以敬不録舊罪則可教之以恕聖人之於人豈能推其所有强其所無哉亦因其性而道之也故司馬牛未可與言仁則告之以仁為之難而已樊遲子張可與言仁而未可與言為仁故或告之以先難或告之以愛人或告之以居䖏恭執事敬與人忠或告之以恭寛信敏恵而已惟顔子然後能盡仁故告之以克已復禮克復仁之事也仲弓可與言仁未可以盡仁故告之以敬恕而已訒與難一也言之難則曰訒為之難則曰難牛多言而躁言訒云者救之失歟司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子矣乎子曰内省不疚夫何憂何懼君子之修身也言行無尤悔俯仰不愧怍以守則為仁以行則為勇仁故不憂勇故不懼古詩有之徳義之不愆何恤人之言内省不疚而不憂者也曽子曰自反而縮雖千萬人吾往矣内省不疚而不懼者也不憂不懼孔子猶以為不能牛不足與言仁而告之以此何也牛以魋之為亂而憂懼焉故孔子解之而已非牛可以與言此也憂在内懼在外傳曰民無内憂又無外懼司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也鄭師慧謂朝無人非無人也無賢人也晋叔向謂卒列無長非無長也無善長也司馬牛憂無兄弟非無兄弟也無令兄弟也命者天之令天者命之所自出孟子曰莫之為而為者天莫之致而至者命是天以逺而在彼者為言命以近而在此者為言也死生非力之所能移故言有命富貴非人之所能為故言在天然合而論之則一而已書曰我生不有命在天是在命者可以言天也列子命謂力曰柰何賤賢而貴愚貧善而富惡是在天者可以言命也言與人恭則敬以處已者也言有禮則無失徳者也處已敬而有徳則人宗之與人恭而有禮則人親之如此則四海之内孰非兄弟也曾子謂弟子曰執仁立志先言而後行千里之外皆兄弟也苟是之不為則雖汝親庸親汝乎與此同意觀桓魋之亂司馬牛致邑而適齊及桓魋奔齊司馬牛致邑而適吳趙簡子召之於晋陳成子亦召之於齊而莫之屑就反卒於魯而已則司馬牛之賢可知矣故孔子曰君子何患乎無兄弟子張問眀子曰浸潤之譛膚受之愬不行焉可謂眀也已矣浸潤之譛膚受之愬不行焉可謂逺也已矣譛而言之謂之譛首而告之謂之愬浸潤之譛若水之於物則漸而不暴膚受之愬若垢之於膚則淺而不廹皆其難知者也能知其所難知而止之使不行則其智眀出人逺矣盖眀則察言而已逺則眀之過于人君子之於譛愬有度以度之有數以數之故詩曰他人有心予忖度之往來行言心焉數之如此則賢者不以忠信見疑小人不以誕謾見信豈非眀而且逺哉傳曰流丸止于甌臾流言止于智者子貢問政子曰足食足兵民信之矣子貢曰必不得已而去于斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立兵之於徳為末於器為凶故古者制字之意戈欲偃弓欲弛武欲止則兵豈先王之所尚哉此所以寜有信而去兵也食之所養者小體也信之所養者大體也故無信而生不若有信而死此其所以寜去食而信㫁不可少也然非兵則無以有其食非食則無以存其信三者固不可偏廢惟其輕重緩急之不同故孔子之言有如此棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟毛謂之皮革謂之鞟虎豹犬羊所以别者以皮之不同也君子野人所以别者以文質之不同也今也去毛以為鞟則虎豹猶犬羊而已去文以從質則君子猶野人而已此棘子成之失于偏見也故子貢責之以駟不及舌鄧析曰一言而非駟馬勿追一言而急駟馬勿及哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足什一天下之中正也多乎什一則大桀小桀少乎什一則大貉小貉魯自宣公初税畝多乎什一而二焉哀公又欲用田賦故有若因其憂不足而告以盍徹所以救其弊也方哀公之欲用田賦也故孔子嘗曰君子度于此而禮以其薄則丘亦足矣不度于此而貪日用無窮則雖以田賦將又不足則有若所謂百姓足君孰與不足百姓不足君孰與足固孔子之意何則古之善為國者蔵於民不蔵於公與之為取而不以取之為取以為君則父民則子也未有子富而父貧未有民足而君不足揚雄所謂洪羊擅利其如子何子張學干禄孔子告之以言行或問不為政孔子答之以孝友衛公待之以為政孔子欲先正名梁王問利國孟子說以仁義盖君子之言惡茍簡以狥利寜髙濶以正本也有若之于哀公問不足而告之以盍徹其意亦若此而已子張問崇徳辨惑子曰主忠信徙義崇徳也愛之欲其生惡之欲其死既欲其生又欲其死是惑也誠不以富亦祇以異徳由中出惑自外來由中出者不可不髙故崇之自外來者不可不眀故辨之易曰忠信所以進徳敬義立而徳不孤此主忠信徙義崇徳者也禮曰身有所忿懥則不得其正有所好樂則不得其正此愛之欲其生惡之欲其死是惑也子張持嘐嘐之志而其行不掩則不足于忠信抱堂堂之容難與為仁則不足于徙義愛之過辟則欲其生惡之過辟則欲其死則誠不以富于已適足以異于人也故曰誠不以富亦祇以異樊遲問崇徳辨惑則同而孔子告之不同者盖好利者務得而多怨務得則不能先事多怨則不能無怨以先事後得為崇徳以一朝之忿為怨此所以告樊遲也告子張曰是崇徳也是辨惑也告樊遲曰非崇徳與非辨惑與盖樊遲之賢不及子張子張常以孔子之言為是故告之以是樊遲疑孔子之言為非故告之以非與觀樊遲之問及于修慝子張常問善人之道是子張可進于善樊遲未離乎慝也孔子曰言人之惡非所以美已言人之枉非所以正已故君子攻其惡無攻人之惡樊遲問修慝孔子告之以此者欲其不舎已之田而芸人之田者也昔衛有蘧伯玉人者直已而不直人盖如此也已齊景公問政于孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸景公之時慶封滅崔氏田鮑髙欒謀慶氏而田氏又私其徳於民此臣不臣也景公以少子荼為太子而逐羣公子于莱邑而羣公子皆亡于外是子不子也臣之不臣以君之不君子之不子以父之不父故孔子答以君則臣臣父則子子也漢三老茂曰父不父則子不子臣不臣由于君不君其言先父子者為戻園而發也洪範言作福作威而繼之以惟辟玉食以言人君能作威福然後不失其玉食不能作威福則君不君矣其得康食乎故曰雖有粟吾得而食諸子曰片言可以折獄者其由也與子路無宿諾子曰聽訟吾猶人也必也使無訟乎信義不著雖多言不可以折獄信義著雖一言可以折獄易曰君子折獄書曰惟良折獄子路片言可以折獄者以其有君子之良心為人所信故也禮曰與其有諾責寜有已怨老子曰輕諾必寡信子路無宿諾則于人無輕諾于已無寡信此所以果于折獄也小邾輕千乗之盟而信子路之一言則子路信義之著可知矣夫先之以徳禮輔之以政刑使有耻且格而無情者不得盡其辭此所以無訟也子路能折獄於已訟之後而不能化人于未訟之先語之以無訟則未也孔子聽訟則與人同使人無訟則與人異故曰聽訟吾猶人也必也使無訟乎易曰君子作事謀始書曰帝徳罔愆而繼之以茲用不犯于有司禮曰禮之教化也微而繼之以使人逺罪不自知使無訟之謂也茍婚姻之禮廢而滛僻之罪多郷飲酒之禮廢而争闘之獄煩䘮祭之禮廢而臣下之恩薄聘覲之禮廢而君臣之位失然後從而聽斷之不亦晚乎故子路之折獄不及孔子之使無訟也召公之聽獄又不若周南之無犯也在昔揚子有曰必也律不犯子張問政子曰居之無倦行之以忠居之無倦則于已無逸行之以忠則于人不欺子張問仁告之以敏則有功問崇徳告之以主忠信徙義問行告之以言忠信盖倦則不能敏而徙義不忠則不能崇徳而有行子張之行不免于此故于其問政而告之以居之無倦行之以忠也傳稱子張問入官孔子告之以怠惰者時之所以後非忠信則無以取親於百姓與此同也盖無倦然後能使民無倦忠然後能使民作忠孔子于子張兼無倦與忠而教之于子路則教之以無倦而已以子路之蔽不至于不忠也子曰慱學于文約之以禮亦可以弗畔矣夫重出子曰君子成人之美不成人之惡小人反是互郷童子潔已以進孔子與之而不拒成人之美也冉求聚歛孔子欲鳴鼓而攻之不成人之惡也小人幸灾樂禍故成人之惡惡直忌正故不成人之美孟子之五教有成徳者皆成人之美也季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正季康子患盗問於孔子孔子對曰茍子之不欲雖賞之不竊教之化民深于命民之効上㨗于令故鄭伯好勇國人暴虎秦穆貴信士多從死陳姬好巫而民滛祀晋侯好儉而民畜聚太王躬仁邠民貴恕吳王好劍客而民多瘡痍楚王好細腰而朝多餓死則季康子之欲而魯民盗理勢之必然也老子曰不必以静天將自正又曰我無欲而民有樸故孔子于為政者患不能以正導之耳荘子曰盗竊之仁行雖貴而可乎季康子之謂也季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃徳教洽而民氣樂法令極而民風衰先王任徳不任力好生不好殺不得已則刑期無刑而已夫豈後徳禮而先政刑哉故曰子為政焉用殺子欲善而民善矣夫上之化下無可見之迹而俗日遷故喻以風民性含仁而衆柔不能自立故喻以草草惟風之偃民惟上之從康子不能正徳以善之特欲殺之而已不亦過哉書曰四方風動又曰爾惟風下民惟草傳曰我徳如風民應如草子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞逹者志在不窮聞者為名而已逹則不必聞聞則不必逹質者直徳也好義義也察觀智也慮下禮也徳義所以處已故志不窮於内禮所以處人故行不窮於外此所以在家必逹在邦必逹也取仁行違居之不疑此取偽為以尚人而已與質直好義察言觀色慮以下人者反矣此所以在家必聞在邦必聞詩言帝謂文王不大聲以色文王大之不失其色非色取仁也以徳而已此則在邦必聞在家必聞者也盖逹與受小國是逹受大國是逹同聞與聲聞過情同在家言其止在家在邦言其止在邦子張色荘者平則色取仁矣難與並為仁則行違其志曰古之人古之人則居之不疑矣孔子因其失而救之也樊遲從逰於舞雩之下曰敢問崇徳修慝辨惑子曰善哉問先事後得非崇徳與攻其惡無攻人之惡非修慝與一朝之忿忘其身以及其親非惑與樊遲問仁子曰愛人問知子曰知人樊遲未逹子曰舉直錯諸枉能使枉者直樊遲退見子夏曰郷也吾見於夫子而問知子曰舉直錯諸枉能使枉者直子夏曰冨哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣自其為仁智言之則智易而仁難自其愛人知人言之則愛人易知人難故遲於愛人則達於知人則未達書曰簡厥修亦簡其或不修進厥良以率其或不良易曰君子帷有解吉有孚于小人傳曰禹稱善人不善人逺此所謂舉直錯枉使枉者直也舜湯之所舉多矣特言臯陶伊尹者臯陶之賢其徳足以懐民其謨足以知人其為士也能制百姓於刑之中伊尹之賢其才足以任重其道足以格天其割正有夏能變簡賢附勢之徒如此則仁賢履位奸邪悉退豈非不仁者逺哉堯舜之仁不徧愛人急親賢也如此而已子貢問友子曰忠告而善道之不可則止毋自辱焉忠告屬言善道屬行仁也不可則止義也芮伯之於朋友曰既之隂女反予來赫又繼之以凉曰不可覆背善詈不為不辱矣而芮伯為之者救時之責故也曽子曰君子以文㑹友以友輔仁文出于理仁出于性以文㑹友然後能窮理以友輔仁然後能盡性禮曰相觀而善以文㑹之所以能相觀以仁輔之所以善也孔子曰工欲善其事必先利其器事所以譬仁器所以譬友事以利器然後善仁以益友然後成君子于友可不慎哉子曰損者三友益者三友益友所以輔仁損友則害仁而已論語全解卷六
