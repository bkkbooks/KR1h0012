body:
  text: 欽定四庫全書論語全解卷二宋陳祥道撰八佾第三孔子謂季氏八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂天下無道諸侯僭天子大夫僭諸侯陪臣僭大夫大夫不僭諸侯而僭天子陪臣不僭大夫而僭諸侯大夫之僭天子季氏之八佾是也陪臣之僭諸侯陽貨之執國命是也樂之八音所以擬八風也佾舞所以節八音而行八風也以其節八音而行八風故自八以下此天子所以八佾也季氏之舞八佾則是樂於是大壞而民將無所措手足焉故曰是可忍也孰不可忍也夫八者數也佾者名也禮樂之所嚴在名與數而大夫且僭之是忍其所不可忍則非仁也以相維辟公天子穆穆之辭施於三家之堂則又非智也八佾季氏之所獨雍徹三家之所同故於八佾言季氏於雍徹言三家歌者貴聲於上舞則動容於下故於雍徹言堂於八佾言庭禮記明堂位祭統皆言干戚舞大武八佾舞大夏公羊則曰八佾舞大武誤矣周禮樂師凡國之小事帥學士而歌徹蓋歌雍也雍歌於禘又用以徹與鹿鳴歌於燕羣臣又用於鄉飲酒同意子曰人而不仁如禮何人而不仁如樂何周官掌禮樂以春官以明禮樂以仁而立也孟子言仁之實而言禮樂以仁為本也蓋禮者仁之文樂者仁之聲有仁之實然後能興禮樂苟非其人禮樂豈虛行哉故顔子不違仁而孔子告以復禮與韶樂季氏之不仁罪其八佾與旅泰山也記曰惟君子為能知樂孔子曰仁者制禮林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚儉戚出於天之性奢易出於性之欲天之性質而不文性之欲薄而不厚二者皆非中道故聖人為禮以節之使之歸縮於中然後無過不及矣周道之衰趨末者衆林放問禮之本孔子告以禮與其奢也寧儉喪與其易也寧戚正末以本而使之正矯枉以直而使之中也孔子於禮樂則欲從先進於為邦則欲乘殷輅服周冕亦此意歟林放問禮之本與堯之為君孔子皆曰大哉蓋禮之本禮之大者則天為君之大者故也子曰夷狄之有君不如諸夏之亡也禮義存則雖無君而與有君同禮義亡則雖有君而與無君等賈誼曰法立而不犯令行而不逆細民向善大臣至順故臥赤子於天下之上而安植遺腹朝委裘而天下不亂此所謂夷狄之有君不如諸夏之亡也季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎節莫差於僭僭莫大於祭故父不祭於支庶之宅君不祭於臣僕之家泰山之神可祭於季氏乎此於明以瀆禮於幽以瀆神非冉有不能救神豈能說耶夫子故曰曾謂泰山不如林放乎子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子君子無所不遜於仁則不遜君子無所爭於射則爭君子之射有德以詔之有禮以節之有罰以戒之定其位則有物課其功則有算勝者袒决張弓而揖不勝者不勝者脫拾弛弓而飲於勝者則求勝者非求服人而害之也將以養之也上求中者非求中而怨之也將以辭養也養之則德辭養則禮君子之事如此投壺之禮當飲者跪曰賜灌勝者跪曰敬養與此同意子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起豫者商也始可與言詩已矣倩盼質也有倩盼然後可文之以禮素質也有素質然後可文之以繪詩人近取諸身以明義孔子逺取諸物以明詩此所以始可與言詩也始可與言詩則前此未可與言也蓋朽木不可雕糞土之牆不可杇故音者宫立而五音行矣味者甘立而五味和矣色者白立而五色成矣安有無其質而有文哉昔人有反裘而負芻者將以愛其毛而已然不知裏弊而毛無所傅是知其文而不知其質者也有以南山之竹不操自直斬而用之達於犀角然不知括而羽之鏃而厲之然後為能深入是知其質而不知其文者也知夫文質兼尚而不失先後之施者其惟忠信學禮之人而已然子貢因禮以明詩子夏因詩而悟禮孔子皆曰始可與言於賜不言起豫於商言之者起豫之言生於不足故也孔子以回為非助我而以商為起豫則其賢可知矣子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣先王之於二代欲其人足證故修其禮物孔子之時不修賢德以傳之孔子所以傷之也中庸於杞言不足徴於宋言有宋存焉蓋亦彼善於此而已觀春秋瓦屋之會尊宋公於齊侯之上杞之來朝則卑之以子爵則禮物之存不存可知矣子曰禘自既灌而往者吾不欲觀之矣或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌祭如在祭神如神在子曰吾不與祭如不祭禘之為祭其文煩而難行其義多而難知難行也故自灌而往者多失於不敬難知也故知其說者之於天下如指掌此孔子所以於禘既灌不欲觀之於禘之說則曰不知也夫郊社之禮禘嘗之義其粗雖寓於形名度數其精則在於性命道德明其義者君也能其事者臣也不明其義君人不全不能其事為臣不全然則魯之君臣其不能全也可知矣所謂祭如在祭神如神在吾不與祭如不祭祭如在事死如事生也祭神如神在事亡如事存也吾不與祭如不祭此所以禘自既灌不欲觀之也孔子於祭則受福祭如在祭神如神在故也王孫賈問曰與其媚於奧寧媚於竈何謂也子曰不然獲罪於天無所禱也易曰匪其彭無咎則不媚奧而媚竈者非孔子之與為也其見所不見敬所不敬姑以逺害而已在昔漢馮野王之於石顯蕭望之之於霍光汲黯之於田蚡猶且不媚而况不為三子者乎彼商鞅附景監朱博附丁傅谷永附王鳳其趨炎附勢凡若是者不可勝數則其所存者可知矣春秋傳獲器用曰得得人曰獲則得者獲之易獲者得之難子曰周監於二代郁郁乎文哉吾從周天寒積而成暑非一日制作積小而備大非一代也周禮率為之制曲為之防上有格於皇天下有極於狸蟲則文之郁郁可知矣孔子所以欲從之也中庸亦曰吾學周禮今用之吾從周然弊不可以不救變不可以不通故有從先進之說則吾從周者為後世言也從先進者為當世言也孔子筮得賁卦其色愀然與從先進同意子入大廟每事問或曰孰謂鄹人之子知禮乎入大廟每事問子聞之曰是禮也傳曰周公稱太廟魯公稱世室羣公稱宫則太廟其周公之廟歟每事問此所謂在宗廟便便言唯謹爾者也而或者因以孔子為不知禮夫又安知孔子所謂知禮者何以易此哉傳曰禮之數可陳也其義難知也孔子之於禮非不知也然而於每事問者蓋所謂信言慎也子曰射不主皮為力不同科古之道也水有科以容其本斗有科以受其所酌凡物自為科彼此異焉蓋射之中在巧其至在力然一於力則所觀在力不在德矣故曰射不主皮為力不同科古之道也周官以主皮在和與容之後射義以志正體直在持弓矢之先見射不尚力可知矣周道之衰射者皆爭於主皮若魯莊之不出正養由基之穿楊葉叔段之善射者蓋亦多矣故孔子以不主皮為古之道以救其弊子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮禮不在玉帛然非玉帛無以存其文樂不在鐘鼓然非鐘鼓無以存其聲告朔不在餼羊然非餼羊無以見其禮故愛羊非所以存其禮而愛禮不可以不存羊故曰爾愛其羊我愛其禮孔子吉月必朝服而朝孟子告齊王以勿毁明堂亦此意也春秋文公六年閏月不告朔猶朝於廟十六年公不視朔蓋告朔告於廟視朔視其事則玉藻所謂聽朔是也玉藻以天子𤣥端聽朔於南門之外諸侯皮辨聽朔於太廟蓋南門路門之外即治朝而曰南門之外者因閏月闔門言之也天子告朔於太廟聽朔於南門之外諸侯告朔聽朔一於太廟而已告朔必祭而祭必特牲祭則祭法所謂月祭是也特牲餼羊是也春秋言朝於廟禮記曰聽朔於太廟則兼於祖矣子曰事君盡禮人以為諂也希意導言謂之諂莫之顧而進之謂之佞孔子事君盡禮而人以為諂疾固而人以為佞入太廟每事問而人以為不知禮擊磬於衛而人以為有心豈非所謂聖賢逆曳方正倒植者哉夫諂則過簡則不及孔子行禮於君人以為諂孟子行禮於朝人以為簡則方是之時無道者不可行禮有道者不得行禮此所以進退出入無所逃於過與不及之責也然觀世俗之說以堯舜為不德以周公為不仁智以章子為不孝其不見是也非特孔子已定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠君之於臣不敢慢故使之以禮臣之於君不敢欺故事之以忠皇皇者華遣之以禮樂所謂禮也四牡不遑將母所謂忠也尚書曰狎侮君子罔以盡人心狎侮小人罔以盡其力孟子曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人昔豫氏曰范中行以衆人畜我我故以衆人視之智伯以國士遇我我故以國士報之賈誼曰遇之有禮故羣臣自喜嬰以廉恥故人矜節行君臣之道施報而已故先言君使臣以禮後言臣事君以忠子曰關雎樂而不淫哀而不傷后妃之求賢也既得則致其樂未得則致其哀關雎友之以琴瑟樂之以鐘鼓樂而不淫也求之以寤寐思之以反側哀而不傷也樂者樂也不淫色禮也哀者仁也不傷性義也樂而節之以禮仁而成之以義此所以為后妃之德也詩先哀思而後樂論語與詩序先樂而後哀思先哀思者事之序先樂者得后妃之心作詩者叙其事說詩者逆其心其理然也關雎樂而不淫豳勤而不怨季札以二南為勤而不怨以豳為樂而不淫何也關雎樂而不淫后妃之德而已勤而不怨則二南之事也豳勤而不怨則豳民之事而已樂而不淫則豳國之風也哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗子聞之曰成事不說遂事不諫既往不咎民之所祈以遂其生者社之神也所治以致其利者野之性也觀野之所宜木則糞土所宜畿疆所定林木所出出於族類所從易見為難亂教民稼穡人事不戾乎神土性不病乎物觀其名社與野而符之是耳故夏后氏以松殷人以柏周人以栗其意如此非若詩之柏舟喬松禮之贄栗所以託其意也而宰豫對哀公以戰栗解之宰我之對失之逺矣成事不說遂事不諫此孔子罪宰我之言也既往不咎此孔子恕宰我之言也成事不說言成哀公之事而不為之說遂事不諫言遂哀公之事而不為之諫使之闕疑而有問焉是勿成之也使之悟非而有改焉是非遂之也且宰我之言社猶仲憲之言明器也曾子則非仲憲孔子不咎宰我何也仲憲言於曾子非既往者也宰我言於哀公則既往者也后以言繼體者也氏以言人歸之也夏之所以有天下得之於君商周之所以有天下得之於人得之於君而嗣帝之位則幾於天道故曰后得之於人而天下歸仁故曰人詩皇皇后帝書上天神后是天道之繼體者謂之后禮記孟子皆曰仁者人也是人道之全者謂之人稱氏以明其嗣於上不稱氏以明其興於下此夏商周之别也春秋或書氏或書人以其凡繼世者皆氏凡微者皆人其稱氏與夏后同其稱人與商周異子曰管仲之器小哉或曰管仲儉乎曰管氏有三歸官事不攝焉得儉然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮管仲於內則三歸於外則具官盈禮也非所謂儉塞門以自蔽反坫以禮賓僭禮也非所謂知禮此所以為小器也蓋形而上者謂之道形而下者謂之器老子言大方無隅而繼之以大器晚成則方者道德之所在器者功業之所寓也大人之功業則大賢人之功業則小焉而已仲尼託迹於諸侯以規矩準繩自用此自治以治人正已而物正者也故謂之大器范氏曰器博者無近用道長者其功逺是也管仲不自治而治人不自正而正物烏得為大器哉孟子曰功烈如彼其卑是也魯之施伯以管仲為天下之大器管仲之器對魯臣而言則大對大人而言則小也禮記家語以大夫具官為僭豈讀論語而誤為之說乎子曰中庸之為德民鮮能久矣禮記則以為不能期月守子曰人而無恆不可以作巫醫禮記則以為龜筮猶不能知也其誤亦若此歟子語魯大師樂曰樂其可知也始作翕如也從之純如也皎如也繹如也以成凡樂之作始於一而成於三至於繹如也謂之一成反翕如也謂之一變凡樂之用始於一而止於九以致鬼神以和邦國以諧萬民以安賓客以恱逺人以作動物不能翕如也以作繹如也以成則夫逺近幽深其孰能感之哉學者不至於從則不足以語道作樂不至於從則不足以語樂繹如也以成不至於從作樂而至於從者也所欲不踰矩不至於從學道而至於從者也樂之作也其患在於不相通協值不相通值不相協應而翕如也相協而不睽相值而不失樂之從也其患在於雜而不純混而不明而純皎如也則不亂顧不美哉及夫世衰樂壞工師之徒或去而不存於朝或存而不知乎樂摯適齊干適楚去而不存於朝者也孔子之所語者存而不知乎樂者也始言翕如而終言繹如者若此亦樂之粗而已若夫奏之以人合之以天其卒無尾其始無首則始作翕如不足言也奏之以隂陽之和燭之以日月之明鬼神守其幽星辰行其紀則從之純如皎如不足言也奏之以無忌之聲調之以自然之命動於無方居於窈冥則繹如不足言也孔子之語太師不及是者以車馬不可以載鼷鐘鼓不可以樂鷃故也儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸世無以興乎道道無以興乎世故道之衰也斯足患今也世雖無以興乎道而夫子之道足以興乎世故其衰也不足患木鐸金口而木舌金口則義木舌則仁天將以夫子為木鐸使之狥仁義之教於天下而已蓋五百年必有王者興其間必有名世者由文王至孔子五百餘歲以其數則合矣考其時則可矣此封人所以言二三子無患於喪也彼不知孔子而謂知其不可為而為之者其可以語此哉然封人之知孔子者外也黨人之知孔子者內也外也故可以為木鐸內也故無所成名子謂韶盡美矣又盡善也謂武盡美矣未盡善也天下無異道有異時聖人無異心有異迹故禮以堯舜授受湯武征伐為時春秋傳以揖遜征誅其義一也然則韶盡美而武獨未盡善豈非美者在心與道未盡善者在時與迹歟蓋充實之為美可欲之謂善武王之於紂欲遂其為臣而不得逃其為君而不能則其順民心行天罰者豈所欲哉觀賓牟賈以聲淫及商為非武者則武之非欲從此可知矣然樂者道之聲則有美與善道之至則無美與善故莊子有曰天下皆知美之為美斯惡矣皆知善之為美斯不善矣子曰居上不寬為禮不敬臨喪不哀吾何以觀之哉里仁第四子曰里仁為美擇不處仁焉得知仁人之於里猶玉之於山珠之於淵玉在山則木潤珠生淵則崖不枯則里之有仁猶當知以為美里之有仁以為美則自擇而不知處仁者焉得為智乎此孟子所以言術不可不慎繼之以莫之禦而不仁是不智也是是非非之謂智非是是非之謂愚不知仁之美而不能利仁其何以安哉不曰為仁而曰處仁者以仁者人之安宅也天下之廣居故也然則孔子言里仁為美以外况內也孟子言矢人以小况大也子曰不仁者不可以久處約不可以長處樂仁者不充詘於富貴故處樂如處約不隕穫於貧賤故處約如處樂不仁者非不可以處約不可以久處約非不可以處樂不可以長處樂孔子曰君子而不仁者有矣夫未有小人而仁者也則不仁雖不足為君子亦未至於小人禮曰小人窮斯濫富斯驕則窮斯濫非特不可以久處約也富斯驕非特不可以長處樂也老子言天長地久言長生久視是長者必久久不必長也蓋處樂人之所易故言長處約人之所難故言久易言何可長何可久亦以長甚於久也仁者安仁知者利仁仁者盡性而靜故安仁知者窮理而動故利仁然窮理而不已則至於盡性利仁而不已則至於安仁此中庸所以言或安而行之或利而行之或勉强而行之及其成功一也坤卦始於利貞終於安貞利仁與利貞同意莫非安仁也有聖人之安仁有君子之安仁堯之安仁聖人之安仁也仲山甫之安仁君子之安仁也孔子曰生而知之者上也學而知之者次也困而學之又其次也蓋上者安仁次者利仁又其次者强仁於此不及强仁者其言主於仁知故也子曰惟仁者能好人能惡人道無喜怒而喜怒者道之過德無好惡而好惡者德之失失德而後仁則仁者不離好惡而能好惡者也蓋仁者誠足以盡性明足以盡理不牽於憎愛之私不惑於是非之似故所好非作好而天下之所同是所惡非作惡而天下之所同非此所謂無欲而好仁無畏而惡不仁也黃帝之伐蚩尤任力牧舜之命九官去四凶不過如此彼愛之欲其生惡之欲其死以至好人所惡惡人所好不仁可知也子曰茍志於仁矣無惡也茍志於仁則未足乎仁無惡則可以為善苟志於仁者其善可知也蓋可欲之謂善可惡之謂惡所謂無惡者以其雖有過失不在所可惡也衛宣公之二子相爭而死不足以為孝而詩以為不瑕秦之三臣殉葬於君不足以為忠而詩以為良人以其茍志於仁無惡也故曰雖歸於惡志善則有子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也富與貴人之所欲不以君子之道得之則不處以其有義也貧與賤人之所惡不以小人之道得之則不去以其有命也君子有可以得富貴之道以非得富貴之道而得之君子不以為榮小人有可以得貧賤之道以非得貧賤之道而得之君子不以為辱故非其義祿之以天下而伊尹不顧非其功位之以三旌而屠羊不受簞瓢陋巷不足以病顔回桑樞甕牖不足以病原思凡此富貴不能淫貧賤不能移者也彼以隋珠而彈雀舍靈龜而觀朵頥者豈足以知此哉君子去仁惡乎成名莊子曰不義則不生不仁則不成不成者實不成於內名不成於外也蓋名之非實君子之所恥沒世不稱君子之所疾此所以處仁而不去也成名則君子之事無所成名則是小人之事君子無終食之間違仁造次必於是顛沛必於是人之情於行事之迹終食造次或忽於為仁後顛前沛或不暇於為仁君子則不然無終食之間違仁造次必於是顛沛必於是以其有終身之由而無須臾之離也孔子之語顔回以非禮勿視非禮勿聽非禮勿言非禮勿動為仁則造次顛沛必是者言視聽動無非禮故也然則終食不違食之有祭是也顛沛必於是林回棄璧負赤子而趨是也子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身有能一日用其力於仁矣乎我未見力不足者蓋有之矣我未之見也見善如不及好仁者也見不善如探湯惡不仁者也好仁者不求尚人而人無以尚之惡不仁者不使加我以橫逆而巳時人未能如此子故曰我未之見所以傷之也又曰有能一日用其力所以勉之也孟子曰五穀者種之美者也茍為不熟不如荑稗然則一日為仁其能熟乎善誘之而已子曰人之過也各於其黨觀過斯知仁矣君子之黨顯黨也小人之黨幽黨也君子之過過於厚小人之過過於薄過於厚則易辭過於薄則難辭觀過各於其黨則不以君子之過責小人不以小人之過待君子然後仁不仁可知也然必觀過然後知仁者與人同功其仁未可知與人同過然後其仁可知也言知仁不言知不仁者君子樂道人之善惡言人之惡患不知不仁故也其言毁譽而終之以如有所譽言君子小人而終之以溫而厲詩之瞻彼洛矣言賞善罰惡而終之以福祿其立言之意似與此同子曰朝聞道夕死可矣不原始不足以知生之說不反終不足以知死之說學者期於知生死之說而已故曰朝聞道夕死可矣蓋道非獨以善吾生亦將以善吾死君子得道於已則知古今為一時生死為一貫又安往而不適哉古人有言德人無纍知命不憂又曰學不羡久生者此也孔子之門人若子貢之願有所息子路之問死皆不知生者也不知生則不可以知死豈所問者哉老子曰聽之不聞名曰希莊子曰道不可聞聞而非也此言聞道者以其非彼聞也自聞而已矣莊子嘗曰道不可致德不可致又曰致道忘有心足者至各有所當也子曰士志於道而恥惡衣惡食者未足與議也衣之所飾者外也食之所養者小也君子所飾在內不在外所養在大不在小食飲簞瓢不足以憂舜回鶉衣緼袍不足以恥由夏食無求飽孔子之謂好學服美于人康王期之以惡終夫豈溺於口腹之末而易吾之志哉蓋君子仁義飽於內不願人之膏粱令聞廣譽施諸身不願人之文繡以惡衣食為恥者豈足與議此哉蓋命厚而德薄衣食雖美不足以自矜德厚而命薄衣食雖惡不足以自愧也周官以本俗安萬民而曰媺宫室同衣服蓋周官所言者民而此所論者士也子曰君子之於天下也無適也無莫也義之與比人之交也以勢則易絶以利則易散以故則或失其為故以親則或失其為親故君子之於人原以探其所為於卜筮以占其所為於元永貞是則比之非則違之無可也無不可也唯義所在而已易比之初六以隂比陽而有不自失之吉六三以隂比隂而有匪人之傷商好與勝己者處孔子期之以日進賜好與不勝己者處孔子期之以日損以其所比義與不義故也傳曰善雖不吾與吾將强而納不善雖不吾惡吾將强而去子曰君子懷德小人懷土君子懷刑小人懷惠有德以善俗有刑以逐惡君子樂得其道故懷之土則利我者也惠則施我者也小人樂得其欲故懷之治莫尚於德而刑次之利莫大於土而惠次之故先懷德後懷刑先懷土後懷惠子曰放於利而行多怨利者外物也求在我所以寡欲也求在外所以多怨也所謂多怨者不怨已多怨乎人人亦怨乎已子曰能以禮讓為國乎何有不能以禮讓為國如禮何遜以禮為本禮以遜為用孝經曰先之以敬勝而民不爭道之以禮讓而民和睦此禮遜為國之先務也禮曰禮之正國猶繩墨規矩又曰為國不以禮猶無耜而耕春秋以禮為幹荀卿以為國之命以禮之所興衆之所治禮之所廢衆之所亂故也方周之興賤者猶遜路季女猶循禮及其衰也貴者則鞠𨄌而孟姜則犯禮由是觀之為國以禮遜其可已乎傳曰世之治也君子尚能而遜其下小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿德及其亂也君子稱其功以加小人小人伐其技以憑君子是以上下無禮亂患並生由爭善也謂之昏德孔子之言惟其救昏德之弊而已矣子曰不患無位患所以立不患莫已知求為可知也求之有道得之有命求在外者也求則得之舍則失之求在我者也在外者不可必在我者可必此所以不患無位患所以立也夫聲無逺而不聞行無隱而不形有車者必見其軾有衣者必見其敝則有可知之道而人有不知者乎此所以不患莫已知求為可知也莊子曰行修於內者無位而不怍不患無位之謂也孟子曰人知之亦囂囂人不知亦囂囂不患莫已知也彼未得而患得既得而患失與內不足而急於人知蓋反是矣然無位則莫已知也莫已用則不必莫已知莫已知者必莫已用故先言不患無位而繼之以不患莫已知也莊子有言曰德成之謂士所以立者德成之謂歟子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣盡己之謂忠盡物之謂恕忠所以進德而德不止於忠恕所以求仁而仁不止於恕則忠恕者以之為道則違道不逺以之為非道則非違道不逺語之以聖人之妙則未也孔子之道無不該也無不遍也仁者見之謂之仁智者見之謂之智曽子謂夫子之道忠恕而已其所見者然也由此推之則子貢言夫子溫良恭儉讓亦若是矣子曰君子喻於義小人喻於利君子從其大體而樂得其道其見聞服習無非義也故曰喻於義小人從其小體而樂得其欲其見聞服習無非利也故曰喻於利揚子曰衆人曰富貴夫子曰義此之謂也喻於義者利存於中喻於利者害在於中此君子所以兩得而小人所以兩失也雖然先王之時以義為利能使小人為君子故詩曰肅肅兔罝施于中林世俗日衰則以利勝義使君子為小人故詩曰如賈三倍君子是識子曰見賢思齊焉見不賢而內自省也思所以求諸身省所以察諸已見賢思齊則能勉其所不能見不賢而內自省則能免其所不善孔子曰三人行必有我師焉擇其善者而從之其不善者而改之禮曰之其所畏敬而辟焉之其所哀矜而辟焉荀卿曰見善修然必以自存見不善愀然必以自省皆此意也孟子曰舜為法於天下可傳於後世我猶未免為鄉人是則可憂此見賢思齊者也子貢曰紂之不善不如是之甚是以君子惡居下流是見不賢而內自省者也子曰事父母幾諫見志不從又敬不違勞而不怨幾諫無犯也又敬不違勿逆也勞而不怨勿怠也記曰從命不忿微諫不倦勞而不怨可謂孝矣與此同義蓋諫者義也幾諫者仁也臣之於君猶貴於諷諫則子之於親其可以不幾諫乎然幾諫不從則至於熟諫熟諫不從則至於號泣而隨之幾諫者人子之心熟諫者人子之所不得已此孔子所以特言幾諫也舜之怨君子所以為大孝小辨之怨君子以為親親蓋孝子非怨也非不怨也不失其為孝而已孔子則曰勞而不怨者以勞而怨非若舜與小辨之怨可比故也子曰父母在不逺遊遊必有方傳曰孝子曾參不一宿於外此所謂不逺遊也禮曰所遊必有常親老出不易方此所謂遊必有方也然肇車牛逺賈用孝但遊必有方雖逺無害也子曰三年無改於父之道可謂孝矣所謂道者非謂無道也猶可遵行也蓋父時事雖可遵行而時有當改者今父喪尚在三年之內於時雖當改而於心有不忍改亦孝也子曰父母之年不可不知也一則以喜一則以懼人子之於親也生而事之之日喜與懼半死而祭之之日哀與樂半李謹曰願為人兄而不願為人弟為人兄者事親之日長為人弟者事親之日短孝子之心大抵然也此孝子之所以愛日也子曰古者言之不出恥躬之不逮也子曰以約失之者鮮矣聖人縱口之所言橫意之所行則無事於約賢者必思而後言必擇而後動不可以不約故多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔此所謂以約失之者鮮矣禮曰君子約言孟子曰孟施舍不如曾子之守約孔子曰言不務多必審其所謂行不務多必審其所為周廟銘曰無多言多言多敗無多事多事多患皆約之謂也言寡尤行寡悔又言失之者鮮蓋寡者必無之辭鮮者未必無也子曰君子欲訥於言而敏於行雍也仁而不佞此所謂訥於言而敏於行者若石奮石建周仁張叔則幾之而已班固之言過矣子曰德不孤必有鄰古人有言曰罷士無伍又曰善則有鄰則無德者孤有德者不孤也易曰敬義立而德不孤蓋敬以禮人義以宜人禮人者人必禮之宜人者人必宜之此德所以不孤也比卦言有孚盈缶終來有它吉中孚言鳴鶴在隂其子和之荀卿曰木䕃則鳥息醯酸則蚋聚此德不孤必有鄰之謂也古之有德其上足以格皇天而皇天輔之其幽足以通神明而神明享之而况於人乎此舜所以三徙成都大王之去邠民歸之如市也雖然此特德而已若夫道則不可得而親亦不可得而疏則使人無保矣子游曰事君數斯辱矣朋友數斯疏矣疏失人辱失已故事君不欲數數則諂朋友不欲數數則瀆疑於諂者將以致忠而招辱疑於瀆者將以致親而適踈此孔子所以言以道事君不可則止忠告善道無自辱焉禮曰事君量而後入則不數可知矣論語全解卷二
