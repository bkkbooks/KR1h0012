body:
  text: 欽定四庫全書論語全解巻九宋陳祥道撰陽貨第十七陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗謂孔子曰來予與爾言曰懐其寳而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣其饋也以禮孔子受之禮也其來也闞亡孔子稱其施而往報之亦禮也孔子於衞不主彌子瑕於齊不主侍人瘠環則於魯豈主陽貨哉故諾以仕而終不仕諾以仕者言遜也終不仕者危行也子曰性相近也習相逺也天命之謂性人為之謂習性則善惡混故相近習則善惡判故相逺今夫水之為性不雜則清莫動則平通之為川瀆則有以利物升之為霜雪則有以害物木之為性其直則喬以折其曲則樛以屈構之以為棟宇則為庇人之器刻之以為矛㦸則為殺人之器人之性習豈異是哉書曰習與性成又曰若生子罔不在厥初生自貽哲命荀卿曰于越夷貉之子生而同聲長而異俗教使之然也子曰唯上知與下愚不移上智生而知之者也不移而為愚下愚困而不學者也不移而為智班固曰堯舜禹稷卨欲與之為善則行鯀驩兠欲與之為惡則誅可與為善不可與為惡是謂上智桀紂龍逢比干欲與之為善則誅崇侯欲與之為惡則行可與為惡不可與為善是謂下愚賈誼曰上主不可引而下下主可引之而下不可引之而上與此同意然書曰惟聖罔念作狂惟狂克念作聖者罔念克念者習之始不移者習之成子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳君子學道則能仁能仁故愛人小人學道則知禮知禮故易使子游為武城宰而以道教民可謂知本矣觀其責子夏之趨末則其學道而為政務本可知矣蓋君子之於天下無所施而非道夫豈以衆寡小大而加損之哉然則割雞牛刀之説特戲之也詩曰善戲謔兮不為虐兮惟和也故善戲謔兮惟中也故不為虐公山弗擾以費叛召子欲往子路不説曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎道者君子所以處已義者君子所以趨時方其守道也雖諸侯之善辭命者有所不從其行義也雖公山佛肸之召則欲往蓋彼叛而召我者豈欲得我而與為不義哉殆亦有悔過遷善之心焉耳夫茍有悔過遷善之心而可與之為東周者其可以棄而不欲往乎故欲往者以義行道而終不往者以道處義以義行道則不失人以道處義則不失已此所以為孔子也夫堅譬則徳白譬則行徳固扵内而不可虧故曰磨而不磷行純扵外而不可變故曰湼而不緇磨而不磷湼而不緇與易所謂常雜而不厭同意磷與考工記所謂敝而不甐之甐同意子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰㳟寛信敏恵恭則不侮寛則得衆信則人任焉敏則有功恵則足以使人孔子言為仁則曰恭寛信敏恵而不及公言為政則曰寛信敏公而不及恭恵盖公者王道之端而非子張之所及恭恵者仁體之末而非為政之所先也於為政曰信則民任焉於為仁曰信則人任焉夫恭者為仁之始使人者為仁之效故始之以恭終之以使人孔子論子産之道始之以其行已也恭終之以其使民也義與此同意佛肸召子欲往子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟叛子之往也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏𤓰也哉焉能繫而不食子曰由也女聞六言六蔽矣乎對曰未也居吾語女好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂仁知信徳性也直勇剛徳行也好仁不好學則施而不能返故愚若墨翟是也好知不好學則動而不能静故蕩若儀秦是也好信不好學則復言以害仁故賊若尾生是也好直不好學則訐而不能容故絞若證父者是也好勇不好學則暴而不怯若賁育是也好剛不好學則强而不知節故狂若陽處父是也子路甞曰南山有竹不扶自直何學之有其使子羔為費宰則曰何必讀書然後為學由是觀之則子路之不好學可知矣故孔子告之如此仁智信五徳之序也直剛勇三徳之序也剛徳之偏故在勇下然言五徳不及禮義言三徳不及柔者禮義之於仁智信勇則履之宜之而已柔非所以告子路也子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名詩可以興可以觀窮理也可以羣可以怨盡性也學至於盡性則邇可以事父逺可以事君若多識鳥獸草木之名則學詩之所成終始也蓋學詩則知言故可以興知言則有節於内故可以觀有節於内則知所避就故可以羣知所避就則出怒不怒可以怨則人道盡矣故以之事父則孝以之事君則敬此所以成孝敬厚人倫者也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正墻面而立也與乾坤易之門周南召南詩之始學易始於乾坤學詩始於周召故曰人而不為周南召南其猶正墻面而立也與書云不學牆面又不特不學詩已子曰禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉禮主於中而不在物樂主於和而不在聲故孟子以節文仁義為禮之實樂仁義為樂之實禮記以中正無邪為禮之質莊敬恭順為禮之制論倫無患為樂之情欣喜歡愛為樂之官如叔齊以守國行政無失其民為禮魏絳以殿萬邦來逺人為樂然則聲之與文豈與其間哉子曰色厲而内荏譬諸小人其猶穿窬之盗也與子曰鄉原徳之賊也子曰道聽而塗説徳之棄也子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣子曰古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣人之身隂陽節通則平偏倚則疾性之疾猶身之疾故凡性之失其平者皆謂之疾易言我仇有疾損其疾詩言庶人之愚亦職惟疾孔子言民有三疾孟子言寡人有疾是也古之狂也肆意以進取而已今之狂則蕩而無所守古之矜也廉隅以自持而已今之矜則忿戾而有所爭古之愚也質直無為而已今之愚則詐而有所欺孔子之門若曾晢琴張其志嘐嘐然可謂狂矣子貢正衣冠齊顔色嗛然而終日不言可謂矜矣子羔則可謂愚矣然狂不至於蕩矜不至於忿戾愚不至於詐故皆可以遊聖人之門而聖人所以未嘗不與之也子曰巧言令色鮮矣仁子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者紫亂正色鄭亂正聲利口亂正言故孔子惡之傳曰紫色䵷聲餘分閏位聖王之所驅除云爾子曰予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉天地有大美而不言四時有明法而不議萬物有成理而不説聖人原天地之美逹萬物之理故至人無為大聖不作觀於天地之謂也其斯以為孔子孺悲欲見孔子孔子辭以疾将命者出户取瑟而歌使之聞之君子之所以教者五而不屑之教不與焉蓋五者之教教之教也不屑之教不教之教也孔子之於孺悲如是非教之教也不教之教而已然則君子之教者不為多術乎宰我問三年之喪期已久矣君子三年不為禮禮必壊三年不為樂樂必崩舊榖既沒新榖既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰子之不仁也子生三年然後免於父母之懐夫三年之喪天下之通喪也子也有三年之愛於其父母乎創鉅者其日久痛甚者其愈遲三年之喪稱情以出之所以為其痛極也由是而殺焉故有期月有九月有五月有三月是喪因隆以有殺非因殺而有隆焉禮記荀卿皆曰加隆焉使倍之故再期其説誤矣子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已人之性勞則易以善佚則易以淫故曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎已蓋博弈非所以待君子亦以為特賢乎無所用心而已或以為待君子者誤矣子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盗勇非義不立義非勇不行則勇以義為主義以勇為輔此義所以為上也君子有勇而無義為亂若好勇不好學其蔽也亂是也小人有勇而無義為盗若荆軻専諸是也子路能勇不能怯孔子於其喜浮海則曰無所取材於其聞斯行諸則曰有父兄在於其行三軍則曰暴虎憑河吾不與也於其問强則曰寛柔以教不報無道則其問勇而對之以義宜矣孔子謂子路曰君子以心導耳目立義以為勇小人以耳目導心不遜以為勇蓋以此也言義以為質又言義以為上者義為質則禮文義為上則勇下子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者傳曰聰明深察而近於死者好議人者也博辨廣大而危其身者𤼵人之惡者也孟子曰言人之不善當如後患何此所以惡稱人之惡者也孟子曰不得而非其上非也揚子賊義近鄉訕此所以惡居下流而訕上者也孔子曰勇而無禮則亂州吁勇而無禮衞風刺之此所以惡勇而無禮者也蓋稱人之惡則不仁居下流而訕上勇而無禮則不義果敢而窒則不知四者以稱人之惡為先以子貢不能匿人之過故也子貢曰賜惡徼以為智者惡不遜以為勇者惡訐以為直者蓋察伺者似智不遜者似勇訐者似直三者似是而非故子貢惡之孔子曰唯仁者能好人能惡人子貢不足於仁而有所惡者茍有所惡而已語之以能惡則未也子曰唯女子與小人為難養也近之則不孫逺之則怨女子小人不知禮義者也不知禮故近之則不孫不知義故逺之則怨子曰年四十而見惡焉其終也已年彌髙徳彌卲君子之所善也年四十而見惡焉其終也已則年彌髙徳彌消可知矣四十者强仕之年也當强仕之際宜其為人所敬畏而不見惡焉為人見惡而不見畏孔子亟言而深斥之為其終此而已焉故也㣲子第十八㣲子去之箕子為之奴比干諫而死孔子曰殷有三仁焉㣲子去所以存商之祀箕子奴所以貽天下之法比干死所以示人臣之節去則明夷于飛垂其翼者也利而不正死則過渉滅頂者也正而不利奴則内難而能正其志者也利而且正三者之所趍雖殊然去者仁之清奴者仁之和死者仁之任皆其自靖以趨於仁而已此所以均謂之仁蓋㣲子去然後箕子奴箕子奴然後比干死事辭之序也武王克商然後釋箕子之囚則箕子未嘗去商而史以箕子避紂於朝鮮誤矣栁下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦三黜而不去者蓋栁下恵以止為事者也孟子曰不羞汙君不辭小官進不隠賢則栁下恵不以退為事也又曰遺佚而不怨阨窮而不憫則栁下恵不以進為事也以其在於進退之間援而止之而止豈非所謂以止為事者哉栁下恵繼伯夷者也伯夷繼伊尹者也繼栁下恵者孔子然後言孔子之去就齊景公待孔子曰若季氏則吾不能以季孟之閒待之曰吾老矣不能用也孔子行孔子於齊景公有際可之仕至於景公曰若季氏則吾不能以季孟之閒待之然後行去他國之道也齊人歸女樂季桓子受之三日不朝孔子行孔子於季桓子有行可之仕及齊人歸女樂而桓子受之三日不朝然後行去父母國之道也楚狂接輿歌而過孔子曰鳯兮鳯兮何徳之衰往者不可諫來者猶可追已而已而今之從政者殆而孔子下欲與之言趨而辟之不得與之言栁下恵則不屑去者也楚狂接輿長沮桀溺荷蓧丈人則不屑就者也孔子去齊去魯則非不屑去以為斯人之徒則非不屑就接輿知孔子有鳯之徳不知孔子所謂隠者不易乎世也桀溺知天下之滔滔而不知滔滔者可以與易也鳯有道則見無道則隠見非其時為徳之衰所謂非伏其身而弗見非閉其言而弗出也樂則行之憂則違之而已接輿欲孔子止而以謂當今之世欲從其政則其身必危揚子曰接輿之歌鳯也欲去而恐罹害也蓋接輿遊方之外者也故其行雖與孔子異而孔子亦未嘗不欲與之言也長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣蓋非其周流也問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟長沮桀溺所謂固矣孔子疾固者也惟天下無道則孔子與易之以謂滔滔者天下皆是也誤子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也遯於山林是與鳥獸同羣也子之言曰吾亦人耳若非與人為徒則誰與乎彼非我以天下皆無道誰以易之蓋不知惟其無道故吾思有以易之若其有道也吾不與易也子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而芸子路拱而立止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隠者也使子路反見之至則行矣子路曰不仕無義長㓜之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣道雖不行不可無仕不仕者無義而已夫長㓜之節不及君臣之義一身之潔不若大倫之不亂荷蓧知長㓜之節而不知君臣之義知潔其身而不知大倫豈所謂知務者哉蓋仕而行其義則在己而不仕於無義則在時在時在己則亦隠而已非逸民也至于伯夷叔齊虞仲夷逸朱張栁下惠少連然後可以謂之逸民也逸民伯夷叔齊虞仲夷逸朱張栁下惠少連子曰不降其志不辱其身伯夷叔齊與謂栁下惠少連降志辱身矣言中倫行中慮其斯而已矣伯夷叔齊則清而不和故内不降其志外不辱其身栁下惠少連則和而不清故内則降其志外則辱其身然志雖降而言不失其倫身雖辱而行不役其慮蓋不降其志不辱其身不嫌於言不中倫行不中慮降志辱身則嫌其不能如此故特曰言中倫行中慮而已謂虞仲夷逸隠居放言身中清廢中權虞仲夷逸隠居則身中清放言則廢中權中清則汚俗不能染中權則反經以合道蓋倫有經權有常變以中權為放言倫非放言矣我則異於是無可無不可伯夷叔齊虞仲夷逸不可者也栁下惠少連可者也孔子集七人之大成可以仕則仕可以止則止可以久則久可以速則速於其義之所去則無可於其義之所在則無不可故曰我則異於是不言朱張者荀卿以子弓與孔子同於行蓋子弓則子張是也大師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入于河播鼗武入于漢少師陽擊磬襄入于海古者有官守者不得其職則去然記此者以明樂工之賤亦知去就之義若夫君子知進退之義則不盡於此矣雖然猶異於長沮桀溺之徒専以隠為事也周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧施者易也荀卿曰充虚之相施易是也君子不以人之親易己之親易己之親則於親無去就之義於親無去就之義則事君有之矣君子不使大臣怨乎不以則臣其可以使君怨其不為用乎故舊無大故不棄則君無大故而可以去之乎君無求備於一人則臣其可以求備於君乎凡此欲自盡其恕以循理進退故也紀周公之言所以成微子之義工師之賤有去就之義故前此而言之八士則事人而已未必能盡去就之義故後此言之則周公所以謂魯公者不過不施其親至于無求備於一人而已荀卿則以為周公曰吾執贄而見者十人還贄而見者三十人貎執之士百有餘人欲言請畢事者千有餘人後世因為飰而吐哺沐而握髮之説殆不然矣成周之時士之所以為士者有徳行道藝以自重非若六國縱横之士汲汲於伸身以干澤也周公之所以為周公者有道法以御世非若孟嘗春申之僕僕於禮士以干譽也國語曰文王詢於八虞而説之者以為八士論語全解卷九
