body:
  text: 欽定四庫全書論語全解卷八宋陳祥道撰衛靈公第十五衛靈公問陳于孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也天根問為天下于無名人無名人曰汝鄙人也何問之不豫也靈公問陳于孔子亦若是而已此孔子對以俎豆之事則嘗聞之軍旅之事未之學也古者文事必有武偹武偹必有文事故射御之事寓于禮干戚之事寓于樂則君子之學禮樂也軍旅之事未嘗不在其中矣孔子于夾谷之㑹則以兵加萊人而齊人恐于費人之亂則命將士伐之而費人北嘗曰我戰則克而冉有亦曰聖人文武並用則孔子于軍旅之事曷嘗未學之蓋有所不言爾孔子于孔文子亦曰簠簋之事則嘗學之甲兵之事未之聞也其所對與靈公同其所以責之之意與靈公異明日遂行在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣子曰賜也女以豫為多學而識之者與對曰然非與曰非也豫一以貫之子曰由知德者鮮矣君子無常産而有常心則固于窮小人無常産因無常心故窮斯濫君子窮則樂小人窮斯濫多學而識則博于文而不知約故所知者事以一貫之則通于一而萬事畢故所知者德知德則自得而已故窮亦樂通亦樂知事則徇外而已故醜窮而色作子貢在陳則色作子路則愠見于此時言由知德者鮮則愠見與色作矣孔子于子貢曾子皆言以一貫之所以語之也子貢不知德則多學而已曰豫一以貫之者曾子之學可以語道曰吾道一以貫之所以誘之也曾子唯而不辨子貢聞而不問于聖人之體不能具也子曰無為而治者其舜也與夫何為哉恭已正南面而已矣繼治世而不用衆不能無為用衆而不繼治世亦不能無為舜之無為以其襲堯于其上而用衆于其下故也孔子曰舜有臣五人而天下治揚子曰襲堯之爵行堯之道無為矣或言有臣或言襲堯蓋皆有為言之也然則舜之所以無為非夫二者之偹則未之暇矣禮曰君子南鄉天道拱于北而與物辨降于南而與物交南面而聽者道取諸此也先王制禮冕則元表而朱裏服則元衣而纁裳位則背北而南面其義一也子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參于前也在輿則見其倚于衡也夫然後行子張書諸紳欲實莫如忠欲當莫如信致敬盡力莫如敦篤言忠信則言滿天下無口過行篤敬則行滿天下無怨惡故曰雖蠻貊之邦行矣言不忠信行不篤敬則反此故曰雖州里行乎哉昔河梁丈人以忠信入水而不溺商丘開以至信入火而不爇詩以欽恭明神宜無恫怨夫以水火鬼神猶可以忠信篤敬親之而况于人乎此所以近之于州里逺之于蠻貊莫適而不行也蓋子張持嘐嘐之志而其行不掩飾堂堂之容而難于與為仁則于忠信篤敬有所不盡故孔子告之如此立則見其參于前在輿則見其倚于衡與見堯于墻同意子張書諸紳與季路抱五慎之誡趙孟佩九言之針西門豹之佩韋董安于之佩弦同意觀古人之佩玉有瑜瑕不掩之忠孚尹旁逹之信垂之墜之之禮則子張以忠信篤敬之言書之于紳宜矣周官州里之名别而言之在鄉則有州在遂則有里合而言之凡所居者皆謂之里所聚者皆謂之州論語之言里則與鄉大夫司常所謂里同言州則與鄉師鄉大夫司常所謂州異子曰直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之史魚能直而已故邦有道如矢邦無道如矢伯玉則能曲直以趨時故邦有道則仕邦無道則可卷而懷之傳曰正直為正正曲為直參和為仁史魚可謂正曲者也伯玉可為參和者也觀史魚之死猶以尸諫則其直可知矣然書九德之直則濟之以溫詩頌之直則齊之以不倨仲山甫直而柔衛武公直而和如此然後無崖異之行而全中和之德史魚之直則異于是故孔子謂之直而不謂之君子也季札於史魚伯玉皆稱君子者以其有君子之行謂之君子可也孔子以志士同仁人而稱仁孟子以勾踐同文王而稱知揚子以黔婁同顔淵而稱賢與此同意君子之于人其言之也與其失真寧過其實故季札以之為君子則可荀卿以之為姦人則不可子曰可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言知人則不失人知言則不失言孔子于程子則不失人于孺子則不失言孟子于章子則不失人于王歡則不失言然此中道也鄙夫問我則不必中道矣子曰志士仁人無求生以害仁有殺身以成仁生我所欲所欲有甚于莊者舍生而取義此無求生以害仁也死我所惡所惡有甚于死者患有所不辟此殺身以成仁也無求生以害仁伯夷是也殺身成仁比干是也非特仁人為然志士亦能之故孟子曰志士不忘在溝壑子張曰見危致命志士則利仁仁人則安仁或安而行之或利而行之其成功一也列子稱伯曰仁義使我愛身而後名仲曰仁義使我身名並全然則為仁之道豈待殺身而已哉孔子言之姑以救弊云子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其事之仁者工之于事待器然後善君子之於仁待器而後成大夫之賢者則教我者也故事之士之仁者則輔我者也故友之孟子言仁賢則由仁而後賢春秋傳言仁賢則以佐賢而已是賢者必仁仁者不必賢大夫以智帥人者也故言賢士則以才者也故言仁于賢者事之所以尊之也于仁者友之所以親之也周公誥康叔于大史內史言友于服休服采言事宓子賤于五賢則事之于十一人則友之惠公于子思則事之于顔般則友之皆此意也對而言之則事賢而友仁通而言之賢可言友仁可言事詩曰友賢不棄易曰休復下仁是也子貢好與不如己者處故告之顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆商周推天地之氣而為正故文夏據人所見者為正故質春秋傳言大輅越席昭其檢也孔子言麻冕禮也今也純儉則乘殷之輅大輅也服周之冕麻冕也禮貴質儉故以夏時商輅周冕樂貴美善故以韶舞蓋禮莫盛于三王樂莫盛于五帝故言禮則夏商周樂則韶舞禮記于五帝稱不相襲禮于三王稱不相沿樂放逺之則舜命九官終于䕫之典樂龍之納言蓋有典樂則鄭聲放有納言則佞人逺為治至于鄭聲放佞人逺則治之至也孔子之門人惟回之賢可以為王者之佐故其問為邦而告之以此孔子嘗曰詩云媚兹一人應侯順德以其可以為王者之佐故也蓋言之入人不如聲之深故于鄭聲言淫于佞人言殆而已堯舜于巧言令色壬人猶病其難則其戒顔淵宜矣于淵猶然况餘人乎夫鄭聲之害不及佞人佞人之害不及利口故孔子于鄭聲言淫于佞人言殆于利口則言覆邦家也孟子于佞人言亂義于利口言亂信是利口之所亂者過于佞人不多言而明矣子曰人無逺慮必有近憂先事而慮之逺慮也事至而憂之近憂也人無逺慮必有近憂則有逺慮必無近憂矣春秋傳曰君子有逺慮小人從邇蓋聖人無思則無慮小人從邇則不能逺慮夫善于逺慮則長慮顧後者也不善于逺慮則私憂過計者也易曰君子思患而預防之荀卿曰先事慮患善于逺慮者也墨翟憂天下之不足杞子憂天地之壞不善于逺慮者也孔子曰處身而常佚者志不廣居下而無憂者思不逺然則君子之有終身之憂是以有逺慮也惟其有終身之憂故無近憂孔子告冉有曰逺人不服不能來也吾恐季孫之憂在蕭牆之內也此謂人無逺慮則必有近憂子曰已矣乎吾未見好德如好色者也詩言己焉哉接輿言己而已而孔子言已矣乎皆决辭也孔子于鳳鳥不至河不出圖吾未見能見其過而內自訟吾未見好德如好色皆言已矣乎則鳯鳥不至河不出圖傷其無時也未見自訟與好德傷其無人也好德出于性好色本乎情以性勝情為君子以情易性為小人子曰臧文仲其竊位者與知栁下惠之賢而不與立也文子曰知人之謂智愛賢之謂仁文仲知栁下之賢而不與立非不智也不仁而已不仁者抑人以自髙棄人以自利此偷天工以私己者也故謂之竊位曾子曰無益而受厚祿者竊也夫管仲非不賢于鮑叔子産非不賢于子皮孔子以鮑叔子皮為賢以管仲子産為不賢者以鮑皮能進管産而仲僑不能進賢也公孫𢎞不舉董仲舒汲黯不以為忠虞􅉌不舉孫叔敖樊姬不以為賢凡此皆竊位者也古者薦賢受上賞蔽賢蒙顯戮然竊位而不蒙戮也幸矣荀子曰蔽公者謂之昧隱良者謂之妬妬昧之臣國之孽也子曰躬自厚而薄責于人則逺怨矣君子為己不重而責已重以周為人不輕而待人輕以約重以周故自厚輕以約故薄責君子之交盡已之歡而不盡人之歡竭己之忠而不竭人之忠鄉飲酒之酬賓主人卒觶而賓不舉亦是意也湯之檢身若不及與人不求備孔子于聖仁不敢居于管仲則稱仁蓋以此歟然此非中道也有已然後求人無已然後非人此為中道子曰不曰如之何如之何者吾末如之何也已矣老子曰為之于未有治之于未亂書曰制治于未亂保邦于未危詩曰逮天之未隂雨徹彼桑土綢繆牖户易曰其亡其亡係于苞桑禮曰言前定則不跲荀卿曰先事慮謂之健先患慮謂之豫揚子曰用智于未奔此皆思患豫防而不曰如之何吾末如之何也已矣此之謂魚去沙而思于木轂碎破而大其輻渴而鑿井鬭而鑄錐則將噬臍無及矣古之善用兵者以虞待不虞善醫者不治已病治未病况君子之于事乎子曰羣居終日言不及義好行小慧難矣哉言不及義則利而已非所謂正言好行小慧則鑿而已非所謂正行揚子曰頻頻之黨賊夫糧食子曰君子義以為質禮以行之孫以出之信以成之君子哉義以為質則禮以行之孫以出之信以成之者文也義以禮行之則中以孫出之則和有中有和而又以信終始之此所以為君子也傳曰禮以行義荀卿曰行義以禮然後大太元曰成之者信此禮以行之信以成之之謂也然禮與義常相為依用方其以禮為體則義為用故易言敬以直內義以方外禮有之禮者義之本也子曰君子病無能焉不病人之不已知也子曰君子疾沒世而名不稱焉子曰君子求諸己小人求諸人君子病己之無能而不病人之不己知則雖愚必明雖柔必强疾沒世而名不稱則名不浮行行必浮名病為重疾為輕病己之無能則務本者也是以言病沒世而名不稱抑末而已故言疾子曰君子矜而不爭羣而不黨矜惜其行則與人異與人異則疑于有爭矜而不爭禮也羣居則與人同與人同則疑于有黨羣而不黨義也子曰君子和而不同和則矜而不爭不同則羣而不黨矜故不失己不爭故不失人羣故不失人不黨故不失己處己而思所以處人則禮處人而思所以處己則義君子之道也今夫水之于物不爭老子以為幾道羔羊于羣不黨詩人以為有德君子之不爭不黨本于道德故也不爭也有所謂爭聞義爭為不義爭改射與投壺爭勝君子之爭也不黨也有所謂黨于交則有顯黨于居則有鄉黨君子之黨也子曰君子不以言舉人不以人廢言言有誠僞人有賢不肖言善而人不肖舉之則不智人不肖而言善廢之則不仁宰豫之言孔子不取嗇夫之辨釋之排之不以言舉人也陽貨之言孟子不棄愚者之言智者擇焉不以人廢言也君子不以所長信所短不以所短掩所長子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施于人孔子曰一言有益于智莫如豫一言有益于仁莫如恕君子之于仁造次必于是顛沛必于是而恕則近仁故可終身行之也桓王以食菜之田與鄭白圭以鄰國為壑豈知此哉春秋傳曰恕而行之德之則也禮之經也蓋則與經立本者也立本則與趨時者異矣故可終身行之子曰吾之于人也誰毁誰譽如有所譽者其有所試矣斯民也三代之所以直道而行也譽起于所好毁起于所惡能好人則所譽無溢美能惡人則所毁無怨惡君子之于人豈容心于好惡毁譽哉凡因彼而已故曰如有所譽必有所試有所試則名實當故民不至枉道以求譽故曰斯民也三代之所以直道而行也譽則有所勸毁則有所沮有所勸則仁有所沮則義聖人在下見于言故有毁譽聖人在上見于行故有賞罰其致一也孟子言不虞之譽求全之毁揚子言妄譽仁之賊妄毁義之賊皆非直道故也子曰吾猶及史之闕文也有馬者借人乘之今亡已夫史喻馬闕喻借人于文不能知則俟知者知之可也于馬不能乘則借能者乘之可也孔子之時子張子游之徒猶不能闕其所不知况餘人乎此孔子所以謂吾猶及史之闕文今也則亡孔子曰聽逺音者聞其聲不聞其舒望逺者察其貌不察其形立乎定哀以指隱桓隱桓之日逺矣夏五傳疑也蓋君子之所慎而不苟也如此子曰巧言亂德小不忍則亂大謀巧言似忠信故亂德小不忍則優柔不斷故亂大謀巧言必察之以智小不忍必齊之以義蓋持狐疑之慮者無過人之略懷隱忍之心者無必成之功蝮之螫手則斬手螫足則斬足非惡手足而樂去之也以為愛其一肢則害于四體也鄭伯之于叔假齊桓之于竪刁易牙葉公之于公勝唐之于全忠祿山之徒皆養虎自遺患者也子曰衆惡之必察焉衆好之必察焉衆惡之中有君子衆好之中有小人如之何而勿察子曰人能𢎞道非道𢎞人人有志于道故能𢎞道道無情于人故非𢎞人我欲仁斯仁至矣人能𢎞道也小以成小大以成大非道𢎞人也易曰茍非其人道不虛行神而明之存乎其人禮曰禮儀三百威儀三千待其人而後行又曰制度在禮文為在禮行之其在人乎子曰過而不改是謂過矣過而能改則自無過矣故物之所責悔而後致吉子曰吾嘗終日不食終夜不寢以思無益不如學也思而不學則殆思而無益不如學也老子曰為學日益子曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣君子憂道不憂貧耕者志于利而害在其中學者志于道而利在其中君子所以謀道不謀食憂道不憂貧也詩權輿則謀食北門則憂貧何耶權輿之謀食也實非謀食也責其禮之不至也北門之憂貧也實非憂貧也傷其志之不得也與徒餔啜羞貧賤者異子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也知與仁德也君子以之處已莊與禮行也君子以之接人知所以盡性知窮理而不知盡性則所學不固故曰雖得之必失之莊者仁知之容禮者仁智之文以莊涖事則民敬以禮而動然後善故曰動之不以禮未善也仲弓知及之故孔子告之以承大祭見大賔顔子仁能守莊能涖未能動之以禮者也故孔子告之以復禮動以禮聖人之事孟子曰動容周旋中禮盛德之至也子曰君子不可小知而可大受也小人不可大受而可小知也大知小知存乎義大受小受存乎器君子之器識則大故老農老圃在所不知而受天下不以為泰此不可小知而可大受也小人之器識則小故乘君子之器致冦而童觀則無咎此不可大受而可小知也揚子曰師之所知貴大知也小知之師亦賤矣子皮曰君子務知大者逺者小人務知小者近者所謂大知小知詩曰受大國是逹揚子曰痺虛無因不能大受所謂大受小受子曰民之于仁也甚于水火水火吾見蹈而死者矣未見蹈仁而死者也水火所以養己仁所以成己養己者其利小成己者其利大此仁所以甚于水火也蹈水火而死匹夫匹婦之諒蹈仁而死則為志士仁人矣孔子之世為匹夫匹婦者恆多為志士仁人者恆少故曰水火吾見蹈而死者未見蹈仁而死者也子曰當仁不讓于師君子之于父兄無所不告聞斯行之則不必告也于師無所不遜當仁則不必遜也崔駰曰當其有事則褰裳濡足掛冠不顧人命則非仁也當其無事則躐步整襟規矩其步德遜不修則非忠也是以險則救俗平則守禮由此觀之無事則師有事則當仁不遜與言不稱師謂之畔行不稱師謂之倍者異矣子曰君子貞而不諒君子求諸己不求諸人小人求諸人不求諸己求諸已故內正不求諸人故不諒乎外泰之九三艱貞無咎以言在已為有義在人為有命茍內不能自正而外以求信于人則是不恤已之孚而恤人之不已孚豈為知命哉故曰不知命無以為君子荀卿曰君子能為可信不能使人必信已蓋能為可信故貞不能使人必信已故不諒子曰事君敬其事而後其食君子之于仕為道不為食人君之授祿食功不食志詩稱不素餐易稱不素飽坊記稱先事而後祿儒行稱先勞而後祿皆敬事後食者也古者男子生必先有志于事然後敢用榖况事君乎子曰有教無類教在己類在人在己者不可以有倦在人者不可以有擇此所謂有教無類也蓋人受天地之中以生而其性未嘗不善不幸而處于不善之類君子其可求類而教之哉一應之以無我而已故難言者莊子之所與廋履者孟子所不拒書言不協于極不罹于咎皇則受之詩言不顯亦臨無射亦保皆無類故也然孔子于孺悲則不見孟子于滕更則不答非不教之也不屑教也子曰道不同不相為謀道之同雖異曲而相合道之異雖同時而不相謀故賢人所以誡世聖人未嘗過而問焉君子所以誡國賢人未嘗過而問焉何則市井不可與語先生之言方內不可與語方外之道也孔子之於陽貨瞷之而拜孟子之于王歡未嘗與言齊王好竽而鼓瑟者不用漢武尚武而好文者不遇此傳所謂薰蕕不同器而藏堯桀不同國而治也太史公員枘方鑿之說若是而已子曰辭達而已矣意者辭之主辭者意之需君子之亂達其意而已夫豈多騁旁枝為哉故曰辭達而已矣儀禮曰辭多則史少則不達彼鄒衍之談天公孫龍之詭辭其言雖多皆辨者之囿而已豈知所謂辭達者哉王通曰吾師也辭達而已蓋倣此者矣師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與子曰然固相師之道也老者在所養喪者在所恤貴者在所敬古之人待瞽者如老者喪者貴者所以盡禮也禮曰八十拜君命一坐再至瞽亦如之又曰八十者一子不從政九十者其家不從政瞽亦如之是待瞽者如老者也論語曰見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨又曰見齊衰者雖狎必變見冕者與瞽者雖䙝必以貌是待瞽者如長者貴者也然則于其所不知者其可以不告乎故及階席則曰階也席也皆坐則曰某在斯禮曰未有燭而有後至者則以在者告導瞽亦然季氏第十六季氏將伐顓㬰冉有季路見于孔子曰季氏將有事于顓㬰孔子曰求無乃爾是過與夫顓㬰昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣袁絲曰周勃忠臣也非社稷之臣揚子曰若張子之智陳平之無誤絳侯勃之果霍將軍之勇終之以禮樂則可謂社稷之臣社稷之臣其難也如此而顓臾之附庸可以為之乎蓋社稷之臣有存乎人有存乎地者存乎人者才也存乎地者勢也顓㬰之為社稷臣者非稱其才勢而已也且爾言過矣虎兕出于柙龜玉毁于櫝中是誰之過與君子以義事君故能間其惡以仁處人故能保其善季氏之惡以譬則虎兕顓㬰之善以譬則龜玉季氏將伐顓㬰而不能間之是虎兕出于柙也顓㬰在邦域之中而不能保之是龜玉毁于櫝中也故曰求無乃爾是過與顛甚于危扶難于持危而持之然後安顛而扶之然後興故先言危而不持後言顛而不扶孟子曰君不鄉道不志于仁而為之强戰是輔桀也求由均是輔桀孔子特責求者以求嘗聚斂勢必欲廣土地也冉有曰今夫顓㬰固而近于費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故逺人不服則修文德以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈于邦內吾恐季孫之憂不在顓㬰而在蕭墻之內也政之不均而患民寡民之不安而患國貧非知本也書言罔曰民寡惟慎厥事詩言尹氏秉國之鈞不宜空我師是在患所政之不均而不在民寡也孟子言地利不如人和又言貨財不聚非國害上無禮下無學賊民興喪無日矣是故患在民之不安而不在國貧也然均則得民財故無貧和則得民心故無寡安則其本固故無傾周官政典以均方政職以聚百物此均無貧也孟子言得道者多助此和無寡也書曰民惟邦本本固邦寧此安無傾也蓋均故和和故安貧則無以聚人安能無寡寡則無與守邦安能無傾然不患貧而患不安者為國家以安之為終始也不安而欲均之不亦難乎由均至于安則在內者無患矣然逺人猶不服則修文德以來之此舜敷文德以格有苗太王施文德以治四國者也冉求之相季氏不如此而謀動干戈以伐顓㬰是患寡而不患不均患貧而不患不安也冉求曰顓㬰必為子孫憂孔子謂吾恐季孫之憂不在顓臾而在蕭墻之內其後陽貨果囚桓子非其驗歟夫蕭之言肅也朝欲肅故其墻謂之蕭墻軍欲和故其門謂之和門古人之為門墻者豈特為蔽居處之具哉凡皆有所寓也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣先王之盛時五禮六樂掌之于宗伯九伐之法掌之于司馬諸侯賜功矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯命之教然後為學此所謂非天子不議禮不制度不考文者也如此在上者無失政在下者無覬覦周衰之時天子失政始于東遷諸侯始于溴梁之㑹不過十世五世三世也以逆理彌甚者則國勢彌蹙故也書曰臣無有作福作威臣之有作福作威其害于而家凶于而國易有之曰過旬災也意其此之謂乎天下有道則政不在大夫天下有道則庶人不議天下有道政出于君大夫議之而無所遂庶人聽之而無所議以權有所在分有所限也聖人王天下先之以道德而民知修為而議有所不及次之以仁義則民知親愛而議有所不能五變而舉刑名九變而言賞罰則下知敬畏而議有所不敢雖然聖人猶為之慮也造言亂衆者有刑析言破律者有殺如此則橫議息矣後世失道而民入則腹誹出則巷議于是乎有弭謗之禁燔書之令豈非猶夫壅川之流而致其潰哉孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣政者威福之所在祿則福而已祿去公室則政未必逮大夫政逮大夫祿去公室可知矣故四世而三桓之子孫微矣此所謂五世希不失者也孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣直者所以正己之惡諒者所以輔己之信多聞者所以博己之知便者便人之所欲辟者避人之所惡此反于直者也善柔則能從人而已便佞則能悅人而已損友以此為最故益友先直次諒而後多聞損友先便辟次善柔而後便佞蓋直者能忠諒者能信為學之道先忠信以尊德性然後博學以道問學則取友之術亦若是而已孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚遊樂宴樂損矣禮得其節則中樂得其節則和禮節則行正樂節則心和在己者備矣在己者備然後繼之以樂人之善樂多賢友益者三樂則先節禮樂損者三樂則先樂驕樂驕非所以節禮樂非所以節樂也孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽躁瞽則失言隱則失人荀卿曰未可與言而言謂之傲可與言而不言謂之隱不觀氣色而言謂之瞽君子不傲不隱不瞽謹慎其身與此同意孟子曰未可與言而言以言餂之可與言而不言以不言餂之以言餂非特躁而已以不言餂非特隱而已故孔子以為愆孟子以為穿窬之盜蓋非可言之時而不言故無躁瞽之愆於可言之時而言故無隱之愆此易所謂言有序公明賈所謂時然後言也言有序故悔亡時然後言故人不厭其言非無愆者歟禮曰長者不及毋儳言孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得血為榮而行於脉中氣為衛而行於脉外行於脉中隂也行於脉外陽也寇莫大於隂陽為隂陽所冦而無以勝之則窮人欲而天理滅豈善養生哉此君子所以有三戒也然湯之不邇聲色則無事於戒色顔淵不遷怒犯而不校則無事於戒鬭孔子七十而從心所欲不踰距則無事於戒得三戒蓋以中心為制而已黃帝書曰血氣衰則內虛內虛則貪心生揚雄亦曰老則戒之在得莊周曰人之取畏者祍席飲食之間而不知為之戒者過也由是觀之得之所戒常在於老而色之所戒非特少之時而已蓋少時尤宜戒也孔子曰君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言天命命我者也大人臨我者也聖言教我者也畏天命畏天也畏大人畏人也畏聖言則天人之道存焉髙宗夤畏自度畏天命也孔子見所不見畏大人也臧榮拜六經畏聖言也帝乙之慢神齊人之不敬王伊尹曰侮聖言皆小人之事也春秋之時弒君殺大夫者無國無之則不特狎大人而已秦燔詩書則不特侮聖言而已古人有言曰慎以畏為本故士無畏則簡仁義農無畏則惰稼穡工無畏則壞規矩商無畏則貨不殖子無畏則忘孝父無畏則廢慈臣無畏則勳不立君無畏則亂不治是以太上畏道其次畏天其次畏物其次畏人其次畏身憂於身不拘於人畏於己不制於彼君子之畏小人之無畏豈特三者而已哉孔子之言舉其大者言也孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣生而知之仁者安仁也學而知之知者利仁也困而學之畏罪者强仁也困而不學則困蒙吝矣孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義思於五行主土百物非土不生百事非思不成君子於視能思則有視逺之明於聽能思則有聽德之聰此其內達者也於色能思則即之也溫於貌能思則恭而有禮此其外見者也如此則在我者修矣然後忠以接物而不欺敬以臨事而不慢有疑則又問以辨之則可為成德矣然忿而不思難見得而不思義則害于德故終之戒焉洪範五事先貌言而後視聽此先視聽而後貌言者洪範言用事之序此言修德之序也孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣隱居以求其志行義以逹其道吾聞其語矣未見其人也齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之其斯之謂與見善如不及見不善如探湯好學者能之故曰吾見其人隱居求志行義逹道非聖人不能故曰未見其人夷齊餓于首陽之下隱居以求終身之仁行義以激百世之清故曰民到于今稱之陳亢問于伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也志之所至詩亦至焉故不學詩無以言詩之所至禮亦至焉故不學禮無以立鯉之才不足以語樂故特教之以詩禮而已教之者仁也逺之者義也古者父子之間不責善命士以上則異宫以為責善則夷同宫則褻此君子所以逺子也荀卿曰君子于子愛之而勿面使之而勿貌道之以道而勿强其是之謂乎孔子于鯉教之以無以言又教之以正墻面而立教之以無以言者告之以詳教之以正墻面而立者告之以約詳說而繼以約者善教之道也邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人國君理陽道而出命正人于其外故曰君夫人理隂德而出論正人于其內故亦曰君易其君之袂詩我以為君詩序曰人君之德禮稱女君春秋書曰小君夫人寡小君皆以其出命正人故也易之家人于父母皆謂之嚴君則夫人謂之君宜矣蓋君于異邦曰寡君故夫人曰寡小君衰周之時自陽侯之後大饗廢夫人之禮于此猶云者蓋夫人之禮于大饗則發于聘問不廢也夫名不正則言不順言不順則事不成時之嫡庶不明而名之不正者多矣故夫子因而正之論語全解卷八
