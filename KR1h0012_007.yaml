body:
  text: 欽定四庫全書論語全解卷七宋陳祥道撰子路第十三子路問政子曰先之勞之請益曰無倦先之帥以正也勞之勞以思也無有先之而有以役之則民不從有以役之而無以勞之則民怨讟易曰説以先民民忘其勞孔子曰君子信而後勞其民未信則以為厲已禮曰勿驗勿信勿信民勿從是先之然後可以役之也豳風以東征勞士小雅以枤杜勤歸是役之必有以勞之也先之與孝經先之以博愛先之以敬遜同勞之與孟子勞之來之同先勞之而益之以無倦則民亦應之以無倦矣楊子曰不倦以終之為學而不倦則其德日新為政而不倦則其政日新故子張問政孔子亦告之以無倦今夫天地之于物出乎震齊乎巽相見乎離致役乎坤先之而後役之也説乎兑戰乎乾勞乎坎役之然後勞之也大元曰仰天而天不倦俯地而地不怠怠倦而能乎其事者古今未覩然則先勞而繼以無倦天地之道也天地尚然而况于人乎仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸有司分職然後事治事治然後可以治人之罪而赦小過赦小過則故為者刑矣故為者刑然後舉其賢才此所謂遏惡揚善者賢言其德才言其能傳曰一賢統衆才則有餘衆才度一賢則不足賢者必有才才者不必賢也子遊為武城宰孔子問之以得人蓋為宰之政必先之以有司為政之大莫尚于舉賢才子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣衛以父子爭國而君臣上下之名不正孔子欲以正名為先而子路以之為迂故曰野哉由也野者質而已矣家語所謂文不勝質是也子路於見南子則不悅於在陳則愠於公山召則曰何必公山氏之之也於佛肸召則曰親于其身為不善君子不入則子路之不知孔子者不特是也夫名之必可言名不正則言不順言不順則行之必不可行而事不成洪範謂言曰從從作乂禮曰功成作樂治定制禮蓋從則言順作乂則事成功成治定事成之謂故曰事不成則禮樂不興禮樂不興則謙遜和穆之風衰爭愎詐偽之俗成雖善聽者猶不能無枉故曰禮樂不興則刑罰不中易豫之作樂則曰刑罰清傳曰禮刑相為表裡是刑罰之中否係禮樂而已在昔荀卿有曰禮樂廢而邪音起危辱之本也樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼君子能為小人之所不能而不能遍能小人之所能蓋君子之所能者勞心也小人之所能者勞力也勞心者治人勞力者治于人治人者食于人治于人者食人樊遲不知君子之道而請學小人之事夫禮以敬之則民莫敢不敬義以間之則民莫敢不服信以結之則民莫敢不用情敬而後服服而後用情則將襁負其子而至以為已役雖不學稼其憂無食乎蓋精於物者以物物精於道者兼物物樊遲之學稼陳相之學許行其能兼物物哉宜孔子孟子之所不許也好禮然後好義好義然後好信與禮記修禮然後好義好義然後體信同意此學之序也孔子曰義以為質禮以行之信以成之行之序也采菽之詩始言禮中言信卒言義則待諸侯之道也子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為詩之為書其事則王道之迹其詞則法度之言誦之將以其事施之政其詞施之使而已若夫不眀其事而授之以政不達使於四方不能専對則與不學詩同故曰雖多亦奚以為禮曰誦詩三百不足一獻以言誦詩三百則易而一獻之禮則難於其易者猶不眀其義斯亦不足貴也已子曰其身正不令而行其身不正雖令不從以身教者從故其身正不令而行以言教者訟故其身不正雖令不從書曰爾身克正罔敢不正孟子曰大人正已而物正揚子曰身立則政立禮曰其所令反其所好而民不從王喜曰動以言不若以行似與此同意馬廖曰元帝罷服官而不用成帝御浣衣莊帝去樂府然而侈費不息至於衰亂者百姓從行不從言也子曰魯衛之政兄弟也楊希曰有人于此年兄弟也言兄弟也才兄弟也貌兄弟也夀天貴賤父子也名譽愛憎父子也父子以况其相逺兄弟以况其相類也魯者伯禽之所封而俗則一于周衛者康叔之所治而俗則一於商其俗雖不同而其政均善孔子所以追美之也曽子布幕衛也縿幕魯也孔子有曰衛之祔也離之魯之祔也合之善夫觀其禮法之存於後世者猶足為君子之所取則當時之政可知矣傳曰政猶魯衛德化均焉子謂衛公子荆善居室始有曰茍合矣少有曰茍完矣富有曰茍美矣瘠地之民多有心沃地之民多不才故匹庶之家多循禮世祿之家多侈怙其勢然也荆為公子其用稱家之有無以同乎人而其心未始有纍焉故始曰茍合少有曰茍完富有曰茍美豈所謂怙侈者哉此季札所以謂之君子也君子無所茍亦有所茍無所茍則於言行不妄有所茍則於利不纍荆之居室如此以比夫無而為有虛而為盈約而為泰者異矣莊子曰滿茍得子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之不庶無以蕃民數不富無以美民情不教無以理民性周官大司徒掌人民之數小司徒掌夫家之數縣師掌野亦辨夫家人民之數司冦掌刑亦登大比之民數生齒以上則書於司民成名以上則書於媒氏凶荒則有荒政之條疾病則有疾醫之治凡此所以庶之也大司徒十有二等以辨民宜十有二壤以教民稼小司徒井其田而任以耕事牧其野而任以畜事里宰於器之不足者助以合耦之令遂師於力之不足者救以移用之法慮其功之有餘也為之疆野以任之患其耕之有惰也為之時器以任之而有成功則鄙師掌令以行賞勸之而不勉則載師斂布以致罰於荒政則𣪚利以薄征於旅師則平頒其興積凡此所以富之也大司徒示以教象之法小司徒帥以教法之象州長嵗屬民而讀法者三黨正嵗屬民而讀法者七族師嵗屬民而讀法者十四糾之以司諫猶王之有師氏救之以司救猶王之有保氏自敬敏以上莫不書之以教其不自修自能者以上莫不與之以勸凡此所以教之也公劉之什言既庶既繁次之以既順乃宣又次之以于時言言于時語語與孟子言省刑罰又次之以深耕易耨又次之以壯者修其孝弟是亦庶富而教之也易言理財正辭書言既富方榖詩言飲之食之教之誨之傳言我有田疇子産殖之我有子弟子産教之意同禮云子産能食不能教非不能教特不若能食而已子曰茍有用我者期月而已可也三年有成子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也子曰如有王者必世而後仁為政之道德隆者其效速德殺者其效遲孔子曰如有用我者期月而已可也三年有成如有王者必世而後仁善人為邦百年亦可以勝殘去殺則期月可以為之兆而未必有成三年有成矣而未必仁故曰必世而後仁易曰重明以麗乎正乃化成天下又曰聖人久於其道而天下化成詩言周王夀考遐不作人又言仁如騶虞則王道成皆必世而後仁之謂也勝殘則在下無賊義之民去殺則在上有措刑之治漢之興至于文景唐之興至于開元然後幾致措刑皆百年勝殘去殺之效也然勝殘去殺則無暴民而已語之以仁則未也王者之仁成于必世不必百年善人之無暴民必待百年則其德之隆殺效之遲速可知矣若夫繼大治承大亂者則又異乎此故禹立三年百姓以仁遂繼大治也故事半古之人功必倍之承大亂也然文王百年德猶未洽于天下者以其善政仁人猶有故也其家語有言昔孔子為中都宰一年四方諸侯則焉此即所謂期月而已可也子曰茍正其身矣於從政乎何有不能正其身如正人何冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之禮曰政行則事治又曰不可以私不將公事孟子曰發於其政害於其事蓋行於上者謂之政通於下者謂之事孔子至于是邦未嘗不以譽命而與聞其政故曰其事也如有政吾其與聞之定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎邦之興喪在事不在言故言不可以若是幾之而已書曰后克艱厥后臣克艱厥臣而繼之以政乃乂知為君難之言可幾於興邦也易曰言善則千里應之言不善則千里違之而繼之以亂之所生則言語以為階是不善莫違之一言可幾於喪邦也若邳彤對光武以入關之非而史以為一言可以興邦李績導髙宗之立武后而史以為一言可以喪邦豈特為君難與莫豫違而已哉孔子之言止于是者對定公故也孫叔敖以一言復郢市晏子以一言省齊刑申叔時以一言復陳國其利雖未至于興邦是亦重言者歟葉公問政子曰近者説逺者來子貢言夫子之得邦家則曰綏之斯來動之斯和荀卿言大儒之郊則曰近者謳歌而樂之逺者竭蹶而趨之葉公問政亦可告以此乎孔子嘗曰荆之地廣而都狹民有離心莫安其居故政在悅近而來逺詩曰亂離瘼矣莫之適歸由此觀之孔子僅欲葉公定其亂離之民而已學記曰近者悅服逺者懷之大學之道也自我論之蓋孔子所言者政也學記所言者教也子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成為政之要在於循理而圖大循理則無欲速圖大則無見小利易曰浚恆凶欲速不達之謂也禮曰小謀敗大作見小利大事不成之謂也孟子言為學之道以欲速喻揠苗以見小利喻養其一指兵法言用兵之道軍以舒為吉軍無小聽戰無小利由此觀之君子之所為凡皆不可欲速見小利豈特為政已哉孔子所言姑以救子夏之失也葉公語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異于是父為子隱子為父隱直在其中矣天下之所為直者有禮義之直有非禮義之直父為子隱子為父隱雖曲而直存焉禮義之直也其父攘羊而子證之雖直而曲存焉非禮義之直也先王之法父子之罪不相及則恕之以其親鄰比之罪相及則責之以其友恕之以其親為其可以相隱故也責之以其友為其不可以相隱故也儀曰不私其父不成其為子春秋為親者諱今律大功以上相隱則不坐皆此意也樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也居處易以慢必欲其恭執事易以茍必欲其敬欲與人以虛雖戚必踈欲與人以實雖踈必密然則與人其可以不忠乎恭也忠也雖之夷狄猶且不可棄則君子于此固不可斯須去身矣故曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子貢問曰何如斯可謂之士矣子曰行已有恥使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱弟焉曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣曰今之從政者何如子曰噫斗筲之人何足算也言必信行必果則謹身而已非有稱於宗族鄉黨也宗族稱孝鄉黨稱弟則稱於近者而已非逺而有光華也行已有恥使於四方不辱君命則逺而光華矣蓋行已有恥則有所不為使於四方不辱君命則能専對有所不為義也善於専對智也宗族稱孝非禮記所謂州閭鄉黨稱孝也鄉黨稱弟非禮記所謂僚友稱其弟者也硜硜則常而不能變斗筲則小而不能容孔子以言必信行必果為小人孟子以言不必信行不必果為大人此揚子所謂事非禮義為小無事於小為大者也蓋莫非小人也有君子之小人有衆人之小人言必信行必果君子之小人也懷土懷惠比而不周驕而不泰衆人之小人也莫非君子也有聖人之君子有賢人之君子有未成德之君子有在位之君子易曰君子上交不諂下交不瀆君子之道鮮矣孟子言君子無上下之交聖人之君子也得見君子斯可矣賢人之君子也君子不仁君子有勇無義為亂未成德之君子也君子之德風在位之君子也子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也狂者近智狷者近義近智而非所以智則過近義而非所以義則不及狂譬則陽狷譬則隂中行譬則沖氣也孟子言中道體也孔子言中行用也孟子言狂簡言也孔子言狂簡行也易之中爻或言中道或言中行亦體用不同故也子曰南人有言曰人而無恆不可以作巫醫善夫不恆其德或承之羞子曰不占而已矣荀卿曰趨舍無定謂之無常巫醫賤技然人所委聽猶不可以無常况不為巫醫者乎恆之九三剛而不中剛之恆過者也巽而應柔巽之過者也一過于剛一過於巽不恆其德者也初與二在下而羞承之或承之羞者也易曰極數知來之謂占革九五之未占孚可知矣恆九三之不占羞可知矣禮曰人而無常不可以為卜筮龜筮猶不能知也而况於人乎蓋不知論語而誤為之説也子曰君子和而不同小人同而不和五味相和然後可食五聲相和然後可聽則和者有異而無乖同者有協而無異君子之與人也任道故和而不同小人之與人也任情故同而不和栁下惠油然與之偕而不自失焉和而不同也梁邱據君可則可君否則否同而不和也然君子不同有所謂同小人之同有所謂不同易曰君子以同而異君子之同也詩曰潝潝訿訿小人之不同也君子同不同皆是善小人同不同皆是不善子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之居之似忠信行之似廉潔非之無舉也刺之無刺也而衆皆悅之是鄉願者人之所好也故曰鄉人皆好之未可也怠者不能修忌者畏人修故事成而謗興德髙而毁來是獨行者人之惡也故曰鄉人皆惡之未可也方周之衰京人以叔假為仁沃人以桓叔為君子齊人以陳仲子為廉以匡章為不孝然則鄉人之好惡可不察之哉故鄉人之善者好之其不善者惡之則所好無非善所惡無非不善矣孔子曰衆好之必察焉衆惡之必察焉孟子曰國人皆曰賢然後察之國人皆曰可殺然後察之書曰出入自爾師虞庶言同則繹皆此意也蓋謀貴於衆斷貴於獨不因鄉人則失于自用因鄉人而不察之則失于隨人內不失于自用外不失于隨人惟仁者能之故曰惟仁者能好人能惡人子曰君子易事而難説也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求僃焉君子處已也正責人也輕正故難悅輕故易事小人處已也不正責人也私不正故易恱私故難事泰九二之包荒用憑河易事也兊九二之孚難説也與人不求備而不邇聲色湯之易事難悅也不顯亦臨而無畔援歆羡文王之易事難悅也易事仁也難悅義也小人反是子曰君子泰而不驕小人驕而不泰君子坦蕩蕩而謙以自牧故泰而不驕小人長戚戚而賤物貴我故驕而不泰莊子曰宇泰定者發乎天光易曰履而泰然後安則宇泰定者德也履而泰者行也禮曰小人富斯驕荀子曰小人能則倨傲以驕溢人則富斯驕者纍於利也能斯驕者纍於名也君子安於能行而不知有名利故能泰而不為驕小人纍於名利而不知有德行故為驕而不能泰君子不驕有所謂驕荀子所謂志意修則驕富貴是也小人不泰有所謂泰禮記所謂驕泰以失之是也然驕富貴非君子之成名時也至君子之成名則無驕矣子曰剛毅木訥近仁剛則無欲無欲則靜仁者靜故剛近之毅則果敢果則勇仁者必勇故毅近之木者無令色則不以色取仁訥者無巧言則不以給奪仁凡此不以末害本也仁者務本而已故木訥近之剛毅木訥近仁質美故也強恕而行求仁莫近焉行美故也子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡切切責也偲偲強也詩曰代木丁丁鳥鳴嚶嚶切切偲偲之謂也兄弟既翕和樂且耽怡怡之謂也蓋閨門之內恩掩義閨門之外義掩恩孔子言朋友切切偲偲兄弟怡怡孟子言責善朋友之道父子之間不責善是皆不以恩廢義不以義賊恩子路之為人唁而行行其於朋友兄弟必不能然故孔子告之棠棣之詩于急難則良朋不如兄弟於喪亂既平則兄弟不如友生此先朋友而後兄弟者亦兄弟不如友生之意也子曰善人教民七年亦可以即戎矣子曰以不教民戰是謂棄之有不能教之君無不可用之民善人教民七年可以即戎則君子教民雖不七年可以即戎矣孟子曰師文王者大國五年小國七年可以為政于天下蓋善人之教民猶小國之施政小國之政必七年然後及於天下善人之教民必七年然後可以即戎其勢然也觀晉侯之教民定襄王以示之義伐原以示之信大搜以示之禮然後用之以戰則先王之教民豈特司馬坐作進退疾徐疏數之節而已哉彼不知務者大則不能教民以禮義小則不能教民以戰陳及其有事則驅市人以就死地而已此孟子所以言不教而戰謂之殃民也司馬法曰教惟豫孫武曰教道不眀曰亂吳起曰兵之法教戎為先鄧析曰慮不先定不可以應巫兵不間習不可以當敵春秋書師次於郎甲午治兵師次而後治兵宜聖人譏之也憲問第十四憲問恥子曰邦有道榖恥也邦無道榖恥也克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也勝人之謂克自賢之謂伐怨生于所求欲生于所好四者出於情而害于性衆人縱之而不能止之學者止之而不能去之去之可以為仁止之則可以為義而已召南言夫人無妒忌之行周南言后妃無妒忌之心蓋無其行者不能無其心無其心者必無其行克伐怨欲不行特無其行而已其能無是心哉惟仁者則無是心矣宋襄公不鼓不成列孟之反不伐伯氏之無怨孟公綽之不欲孔子未嘗以仁名之以其於此不行而已若顔子之無伐伯夷之無怨此所謂無是心者也孔子曰君子言必忠信而心不忘仁義在心而已無伐者此也蓋克則加諸人伐則自伐而已克甚於伐伐甚於怨怨甚于欲此其序也子曰士而懷居不足以為士矣士之所尚在於志志之所尚在于道士而懷居則非志於道者也故不足以為士蓋物生于陵者安于陵生於水者安于水衆人不異乎物則懷土而已士則異於衆人其可懷居哉孔子曰君子居無求安傳曰晏安鴆毒不可懷也古之君子所以安土樂天不纍於物視九夷如中國不以為陋視陋巷如廣厦不以為憂不過充是志而已子曰邦有道危言危行邦無道危行言孫天下有道其言足以興故危言天下無道其默足以容故言遜禹戒舜以無若丹朱周公戒成王以無若商王受周昌比漢髙以桀紂劉毅比晉武以桓靈所謂危言也孔子諾陽貨以將仕閔子告魯使以善辭所謂言遜也蓋行所以行已言所以應物行已者君子所以立道故施于治亂則同應物者所以趨時故施于治亂則異彼泄冶論相服之戲於陳李雲疏貂璫之封於漢王嘉之言董賢王章之言王鳯李固之言梁冀其言非不忠然卒見誅者以其不知言遜故也子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁德至靜也其發則為言仁至柔也其動則為勇顔子善言德行有德者必有言也子貢能言不能訥有言者不必有德也比干殺身以求仁仁者必有勇也子路能勇不能怯勇者不必有仁也蓋君子自得則為德應物則為言愛人則為仁惡人之害則為勇艮之六五有德者也則有言矣謙之六五有仁者也利用侵伐則有勇矣咸之上六騰口説同人九三之敵剛此所謂有言者不必有德勇者不必有仁也南宫適問於孔子曰羿善射奡蕩舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人善射蕩舟力也躬稼德也南宫適賤羿奡而貴禹稷尚德也自其成德而言之則曰君子哉若人自其所言而言之則曰尚德哉若人禹與稷均曰躬稼稷與禹均曰有天下者禹暨稷奏庶艱食則禹稷之躬稼可也文武之功起於后稷則稷謂之有天下可也言禹稷躬稼與孟子言禹稷三過其門不入同言稷有天下與太伯以天下遜同夫微莫微于一身大莫大于天下羿奡之力不足保其身况天下乎禹稷之德足以有天下况一身乎適言而當故夫子不答厲王好稼穡芮伯刺之樊遲請學稼夫子非之何耶好稼學稼為利也躬稼為德也傳曰后稷封殖于天下子曰君子而不仁者有矣夫未有小人而仁者也有成德之君子有未成德之君子成德之君子則於仁義無不盡未成德之君子則于仁義有不能所謂君子不仁者有矣夫君子有勇而無義為亂此未成德之君子也蓋仁者人之所尤難顔子之于仁則三月不違而已其餘可知矣故子路公西赤之徒孔子皆曰仁則吾不知也子曰愛之能勿勞乎忠焉能勿誨乎勞之所以作其才誨之所以達其善愛之而不忍勞之忠焉而不忍誨之適所以賊之也禮曰細人之愛人也以姑息此愛而不忍勞之也孟子曰教人以善謂之忠此忠而能誨之也蓋愛之者仁也勞之者義也忠焉者義也誨之者仁也君子處仁以義然後仁行義以仁然後義子曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之為命禆諶草創以始之遊吉討論以辨之公孫揮修飾以洽之國僑潤色以文之蓋為命専于一則不能無失資於衆智然後盡善鄭之為命必更四人然後成此春秋傳所以謂其鮮有敗事也列子曰鄭之東里多才其子産之謂乎或問子産子曰惠人也問子西曰彼哉彼哉鄭之子西俯仰於子展子産之間其與殺子孔之専則因子展而已其與伐陳則因子産而已其才不足道也楚之令尹子西理百姓實倉廩百姓得所楚王賢之其才可知也不徇白公仇鄭之謀而終死于白公之亂其正可知也或問子西孔子彼而棄之者非楚之子西意鄭之子西乎老子曰去彼取此彼者在所去此者在所取問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言子曰貧而無怨難富而無驕易人也猶言之人也奪伯氏駢邑三百沒齒無怨言至公也桓公以仲為聖人施伯以仲為賢人荀卿以仲為野人其言各有當與此謂人也異矣駢邑三百言奪之多飯疏食言貧之甚沒齒言廢之久蓋奪之雖多而貧不甚貧雖甚而廢不久其無怨則易若伯氏則無怨難矣故繼之以富而無驕易江熙曰顔子無怨不可及也子貢不驕猶可能也此之謂歟孔子前言子産則繼之以晏平仲此則繼之以管仲者荀子曰晏子功用之臣也不如子産子産惠人也不如夷吾子曰孟公綽為趙魏老則優不可以為滕薛大夫君子不器無施而不可不如君子則器矣有能有不能故禆諶謀野則獲于居屋則否黃霸治郡則長於相國則不及兵甲之事文種不如范蠡鎮撫國家范蠡不如文種面折廷爭陳平不如王陵全社稷安劉氏王陵不如陳平房元齡善于謀而不能斷杜如晦長於斷而不能謀孟公綽為趙魏老則優不可以為滕薛大夫其才有能有不能也老者成德之稱王朝有天子之老五官之長天子之老是也邦國有卿老國君不名卿老是也卿大夫則有家老所謂趙巍老是也子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣子問公叔文子于公眀賈曰信乎夫子不言不笑不取乎公眀賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎智以知之不欲以守之勇以行之據於德所以立本遊于藝所以存末本末具而又文之以禮樂則于人道幾盡矣故曰可以為成人子謂顔淵曰既能成人而又加之以仁義禮樂成人之行也傳曰人能曲直以赴禮者謂之成人荀卿曰能定所應之謂成人與此同意周官大司徒之教民終之以五禮六樂孟子言事親從兄亦終之以禮樂是學至于禮樂然後可以為成人也求言為邦曰如其禮樂以俟君子孔子于回之問為邦然後告之以禮樂蓋惟回可語以成人故也夫見利則忘義見危則惜命久要則忘信世俗之情也今也見利思義則可以為義見危授命則可以為忠久要不忘平生之言則可以為信故曰亦可以為成人矣言今之成人則文之以禮樂者古之成人也古之成人者由前君子之事也今之成人者由後亦不失為善人者也武仲之智未足以為成人而御叔以之為聖人不亦妄哉易簡而天下之理得而成位乎其中則其為成人不特文之以禮樂而已也子曰臧武仲以防求為後于魯雖曰不要君吾不信也孔子論仲則以防求為要論成人則以仲為智如此則若無要君之事而不免于要君何也禮曰道之不行賢者過之子曰仲之智綽之不欲文之以禮樂可以為成人使仲賢而不至于過智而濟之以不欲是能無要君之心矣禮曰事君三違而不出境則利祿也人雖曰不要君吾不信也子曰晉文公譎而不正齊桓公正而不譎齊桓公為會而封異姓晉文公為會而滅同姓桓責諸公以不貢天子文會河陽以召天子桓伐談戎而不有文滅曹而分其地桓仇管仲而用文親舅犯而疑桓寓內政以復古文作三軍以逼上桓釋曹沫之劫而遇以信文念衛侯之怨而加以鴆此其正譎之不同也晉文之譎非無正也齊桓之正非無譎也觀其出定襄王以示民義伐原以示民信大搜以示民禮于君之命有三辭之恭于國之利有三罪之當此晉文之正也然譎不勝正故謂之譎而不正前事則兄弟爭國內行則般樂奢汰外事則詐邾襲莒執陳轅濤塗以致斁于諸侯親豎刁易牙開方以搆于國此齊桓之譎者也然正能勝譎故曰正而不譎若夫以王道觀之則桓公之正猶之譎也昔孟氏子曰春秋無義戰愚曰五伯無王道子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左祍矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也自仁之成名而言之雖君子有所不仁自所愛而言之雖管仲有所施蓋仁之所施有殺身以成仁有不死以成仁殺身而不足以成仁者召忽也不死而足以成仁者管仲也孔子曰子糾未成君召忽未成臣管仲不死而立功名未可非也召忽雖死過于取仁未足多也魯仲連亦曰見小節者不能成榮名惡小恥者不能立大功管仲不恥身在縲絏之中而恥天下之不治不恥不死公子糾而恥威之不信于諸侯夫以管仲之功仲連能知之而子路疑之者自王道而論之宜子路之為疑也桓公衣裳之會十有一而九盛此所謂九會諸侯不以兵車也首止之會定王世子謂王世子正則天下正此所謂一正天下也其伐山戎攘狄人以王伐楚與厲而使夷狄不能剡其脈以蹈中國之腹所謂微管仲吾其被髮左祍矣傳以兵車之會三乘車之會六為九合不以兵車兼兵車言之則誤矣雖然管仲相桓公正天下修內政寓軍令諸侯盟會于九合而不以兵車功用可稱也及其志滿意得而塞門反坫僣邦君之禮故聖人小之公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣衛靈公以文子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎孔子以公叔文子之臣大夫僎與文子同升諸公可以為文矣蓋靈公以通鄰國而交之者為文孔子以推人而下之者為文通鄰國而交之禮之文也推人而下之仁之文也其所主雖殊其為文一也子言衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪國以賢興以諂衰君以忠安以佞危三仁在商而商不亡多賢在楚而秦不伐百里奚去虞而虞亡在秦而秦霸由余去戎而戎亡在秦而秦強故共公任小人而魯人知其無依衛多君子而霸主知其無患此孝經所謂諸侯有諍臣雖無道不失其國詩所謂人之云亡邦國殄瘁也靈公雖無道然治賔客則有仲叔圉治宗廟則有祝鮀治軍旅則有王孫賈故孔子曰奚其喪孔子對魯公曰靈公于私家則亂朝廷行事則賢伯常騫曰靈公同濫而浴史鰌奉御而進所搏幣而扶翼其慢若此之甚也見賢人若此之肅也蓋以此歟為治之道柔逺然後能邇故治賔客為先宗廟次之三軍之運德之末也故軍旅為後子曰其言之不怍則為之也難言忠信則不怍行顧言則能為之為之道也難則言之不怍期是矣言之不怍則行成亦貴于不怍矣揚子曰言不慙行不恥書曰行之惟艱陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也臣弒君子弒父凡在官者殺無赦陳恆弒簡公孔子請討之蓋曰請之者吾之職也行不行君之事也吾之職不可不盡君之事吾何與焉故曰不敢不告然則魯弱齊強攻之不亦難乎孔子曰陳恆弒君而民不與者半以魯之衆加齊之半可克也此言之三子告不可春秋傳以為不告誤矣子路問事君子曰勿欺也而犯之孟子曰非堯舜之道不敢陳勿欺也禮曰事君有犯而無隱犯之也勿欺忠也犯之義也由于孔子而欲為臣一事則欺而不忠于顓臾之伐而不救則順而不犯故其問事君而告之如此孝經曰進思盡忠退思補過盡忠則勿欺補過則有犯子曰君子上達小人下達子曰古之學者為已今之學者為人形而上者道也形而下者事也君子事道故上達小人事事故下達孔子曰中人以上可以語上中人以下不可以語上子曰古之學者為已今之學者為人荀子曰君子之學以美身小人之學以禽犢楊子曰大人之學為道小人之學為利則為道以美其身者為己者也為利以為禽犢者為人者也范曄曰為己者因心以會道為人者憑譽以顯物蓋為己者未嘗不為人為人者必不能為己楊朱第知為己而已墨翟第知為人而已若孔子則為已而不忘人為人而不忘己者也故曰我學不厭而教不倦彼學以為人教以為己者豈知此哉宜原憲所以不忍為也蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎孔子以蘧伯玉汲汲於人以善自終莊子以蘧伯玉行年六十化公叔文子欲葬於瑕丘而伯玉請行孫文子欲報衛君而伯玉辭之以不知季札適衛而稱其君子史鰌尸諫而稱其賢則伯玉欲寡其過也信矣曰使乎善其言之信也詩之皇華以周爰咨諏為使之美莊子以相靡以信忠信之言為使之事則使者以忠信為主也公眀賈之溢美公叔文子以不言不笑不取宋師紿魯以鄭師未及國則異乎此矣子曰不在其位不謀其政重出子曰君子思不出其位事君處其位而不履其事則亂不在其位而謀其政則冒亂者非所謂知務也冒者非所謂知分也子曰君子恥其言而過其行君子之於天下與其言不足而行有餘孰若行有餘而言不足故不恥行過言而常恥言過行此仲尼之徒善為説辭不若善言德行者之為優也子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也子貢方人子曰賜也賢乎哉夫我則不暇不器於人者然後能器人器於人者不可以器人子貢器于人而已其方人也不亦過乎孔子曰賜也賢乎哉以賢者過之也子貢對衛將軍文子則謂顔淵之相冉雍有志之君子仲由才任治戎冉求好學博藝至于公西赤顓孫師曽參卜偃滅眀髙柴南容之徒莫不在其所議而孔子笑之蓋譏其方人之過也故子以為不暇左氏之品藻班固之變㺯不免後世之譏者以其不能器人也子曰不逆詐不億不信抑亦先覺者是賢乎詐在行不信在言逆者迎而知之億者度而知之君子之于人遇之以誠而不察之以智照之以天而不照之以人此揚子所以言不姦姦不詐詐也不姦姦故不億不信不詐詐故不逆詐是乃先覺之所以為賢也若夫任前識之眀上太察之智則刻核之至忠信有時而見疑是乃昧者所以為不肖也舜之於象不以偽喜而不喜周公之於管蔡不以不賢而不封凡此不逆不億也子貢之屢中郤雍相盜失是矣微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎孔子曰非敢為佞也疾固也能仕者必貴乎能己能己者必貴乎能仕仕而不能己已而不能仕守一而不知變者也固者之所為君子疾諸孔子三月無君則皇皇如也則其栖栖然動靜無操持者非為佞也疾固以事道而已孰謂微生畝足以知孔子子曰驥不稱其力稱其德也君子絶德小人絶力故驥所以喻君子而不如驥者所以喻小人揚子曰齊馬以驥又曰睎驥之馬亦驥之乘或以譬仲尼或以譬顔回以驥有德也適賤羿奡尚禹稷孔子所以美之者以此或曰以德報怨何如子曰何以報德以直報怨以德報德復讐者人之所不能免先王之所不能禁特為之法以制之而已周官調人凡殺人而義者令勿讐則殺人而不義者在法之所不宥以可殺者必避之也朝士凡報仇讐者書于士殺之無罪則應避而不避其書于士而殺之可也然則先王復讐之法不行凡有罪辜乃罔常獲小民方興相為敵讐由是殺人之父也人亦殺其父殺人之兄也人亦殺其兄干戈相尋莫之或息豈特復其不讐避者而已哉于是有問孔子曰以德報怨何如孔子曰以直報怨以德報德蓋以直報怨則民有所懲以德報德則民有所勸以直報怨義也以德報德仁也老子曰以德報怨禮曰以德報怨寬身之仁也以怨報德刑戮之民也蓋以德報德者德也則詩所謂報之以瓊琚者也以怨報德者事也則詩所謂反以我為仇者也昔豎牛之于叔孫昭子盧蒲葵之於慶舍寒浞之于后羿公勝之于巢公皆以怨報德者也子曰莫我知也夫子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎孔子言莫己知也繼之以不怨天不尤人蓋曰莫我知者豈天與人使之然哉命也天道逺而難知故曰怨人道邇而可指其掌故曰尤下學而上達則始于窮理終于知命始于仁義終于天道如此則與天同矣故曰知我者其天乎荀子曰自知者不怨人知命者不怨天怨人者窮怨天者無志失之已反之人豈不亦迂哉孔子不怨不尤與反之人者異下學上達與失之己者異公伯寮訴子路于季孫子服景伯以告曰夫子固有惑志于公伯寮吾力猶能肆諸市朝子曰道之將行也與命也道之將廢也與命也公伯寮其如命何不知命者以興廢在人而有所難辨子服景伯是也知命者以興廢在天而無所校孔子是也蓋道待命而後行命待道而後立以道處命則死生無所恤以命處道則廢興無所纍君子之於道命雖死生不得與之况廢興乎哉孔子于伯寮言命孟子于臧倉言天其致一也子曰賢者辟世其次辟地其次辟色其次辟言子曰作者七人矣子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也斯己而已矣深則厲淺則揭子曰果哉末之難矣伯夷居海管寧浮海辟世也危邦不入亂邦不居辟地也色斯舉矣禮貌衰則去之辟色也聲音之詭人則去之辟言也作者七人則伯夷叔齊虞仲夷逸朱張栁下惠少連是也之七士者皆成德之逸民故或辟世辟地辟言而去就進退之理偹矣至于孔子則集七人之大成可以仕則仕可以止則止故曰我則異于是無可無不可揚子曰聖人不遁乎世不離乎群莊周曰古之所謂隱牛馬以伏其身而勿見也非間其言而不出也非藏其智而不發也當時命行乎天下則反一無迹不當時命窮乎天下則深根寧極而待此所謂無可無不可者也古之所謂大隱如是而已彼晨門譏其不可為而為荷蕢譏其莫知而不止豈知此哉然聖人之有為常出于無為其有心常出于無心荷蕢之聞磬知其有心而不得其無心則其所知也淺矣季咸之于列子知其氣機而不知其未始出吾宗亦若此也晨門司晨昏之啓閉者也周官以昏閉言之則曰閽人論語以晨啓言之則曰晨門子張曰書云髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽於冡宰三年斬衰之喪唯而不對齊衰之喪對而不言髙宗三年不言蓋禮然也子張以人君不能三年則以今疑古故問曰何謂也孔子以古陋今故曰何必髙宗古之人皆然詩之素冠刺不能三年滕之父兄百官皆不欲三年則孔子之時可知矣子曰上好禮則民易使也兩貴不能相事兩賤不能相使上好禮則不敢輕于使民民好禮則知分未有不易使者矣蓋禮以敬民則使民如承大祭民好禮以敬上則孰疾視其長上為哉故曰上有所好下必有甚焉者矣子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸書稱堯之德始于欽眀中于平章卒于於變欽眀者修己以敬也平章者安人也於變者安百姓也老子言修之身而其終至于天下修禮言毋不敬而其效至于安民與此同意修己以敬自愛也修己以安百姓博愛也夫正者未必安而安者必以正孟子以正己而物正為大人之事則修己以安百姓者聖人之事也堯舜于此可以不修而猶病之者以其不免有竄殛之刑故也書曰安民則惠惟帝其難之此之謂歟孝經言得人之歡心又言得百姓之歡心是人不及百姓之衆也原壤夷俟子曰幼而不遜弟長而無述焉老而不死是為賊以杖叩其脛無述則無所取賊則有所害莊子曰人而無以先人是人之謂陳人曽子曰少稱不弟焉恥也壯稱無德焉辱也老稱無禮焉罪也荀子曰少而不學長無能也此無述之謂也以杖叩脛責之而已所謂故者無失其為故也闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也居位則不遜並行則不弟將命非童子之事而夫子使之者以其欲速者也故因命而教之耳孟子好貨好色好勇好樂而教之與此同意論語全解卷七
