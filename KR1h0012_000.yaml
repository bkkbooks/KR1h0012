body:
  text: 欽定四庫全書經部八論語全解四書類提要臣等謹案論語全解十卷宋陳祥道撰祥道字用之福州人元祐中為太常博士祕書省正字李豸師友談記載其本末甚詳朝公武讀書志云王介甫論語注子雱口義其徒陳用之解紹聖後皆行於場屋為當時所重又引或人言謂用之書乃鄒浩所著托之用之考宋史藝文志别有鄒浩論語解義十卷則浩所著原自為一書並未托之祥道疑或人所言為誤舊本祥道自序之首題門人章粹校勘而每卷皆標曰重廣陳用之真本入經論語全解未詳其義豈爾時嘗以是本為經義通用之書故云然耶祥道長於三禮之學所作禮書世多稱其精博故詮釋論語亦於禮制最為明晰如解躬自厚而薄責於人章則引鄉飲酒之義以明之解師冕見章則引禮待瞽者如老者之義以明之雖未必盡合經意而旁引曲證頗為有見又如臧文仲居蔡章則云冀多良馬稱驥瀘水之黑稱盧蔡出寶龜稱蔡於關雎之亂章則云治汙謂之汙治弊謂之弊治荒謂之荒治亂謂之亂此類或不免創立别解而連類引伸亦多有禆於義訓惟其學術本宗信王氏故往往雜據莊子之説以作證佐殊非解經之體然其間徴引詳核可取者多固不容以一眚掩也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀論語全解原序言理則謂之論言義則謂之議莊子曰六合之外聖人存而勿論六合之內聖人論而不議春秋經世先王之志也聖人議而勿辨蓋夫論則及理耳所虧者道議則及義耳所虧者理聖人豈不欲廢去應問體道以自冥哉道無問無應不發一言不與萬物同患此特畸人耳非聖人之所尚然則孔子雖欲忘言豈可得哉不得已而言理以答學者之問而已夫是之謂論語然而王者之迹熄聖人雖言理以答學者之問猶未可以已也故其言義則存乎春秋言理則存乎論語而春秋之作是是以勸善非非以懲惡善惡之判猶在權衡之上輕重或差豫奪弗明其賞不足以為榮其罰不足以為辱矣不得不議若夫論語之言則答學者之問而已何事乎此嘗謂希微者道易簡者理君子以理明道以義明理言至於義去道逺矣孔子之世師道既明異端未起由辨議無間而作故聖人之答問言理而足矣平居之時弟子在側各言其志聖人察其所安得其才性之病處仁孝之言隨分而應不必屢告而詳説之大扺君子之教人欲其思得之孔子之於弟子不憤則不啓不悱則不發有所罕言有所不語其歸則曰忠恕仁義而已一隅之舉兩端之叩近而逺約而詳思得之則會其所固有者矣弟子之列有聞一而知二者有聞一而知十者問詩而知禮問伯夷而知夫子小以成小大以成大我告之約彼得之詳以至於是歟不足之冉求不恱之季路聞理而不得叛卒為賢者則後世之學士大夫豈宜置諸口耳之間哉論語之後子思之中庸孟子之七篇尤得其詳然而孟子之世許子之言盈天下孟子思欲拒詖説放淫辭不得已而有辨焉難疑問答不直則道不見故其為言尤詳於論語雖然聖人之言或論或辨非立異也時焉而已矣陳祥道序
