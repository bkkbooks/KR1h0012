body:
  text: 欽定四庫全書論語全解卷一宋陳祥道撰學而第一子曰學而時習之不亦說乎有朋自遠方來不亦樂乎人不知而不愠不亦君子乎學所以窮理教所以通物學而時習之則於理有所見故恱有朋自遠方來則於物有所通故樂於理有所見於物有所通宜為人知而不知宜愠而不愠然後謂之君子悅樂智之事也不愠仁之事也子夏出見紛華而恱入聞夫子之道而樂則恱者有所得於外樂者有所適於內朋友之講習易以為恱得天下英才而教育之孟子以為樂是講習亦此意也然人之情莫不喜其所同惡其所異榮其所達醜其所窮則其喜惡榮醜在物而不在我庸能安於命哉此孔子所以謂不知命無以為君子人不知而不愠然後為君子易曰不見是而無悶子曰不見知而不悔孟子曰人不知亦囂囂故孔子在陳弦歌不衰孟子去齊未嘗不豫凡以此也傳曰蘭不為莫服而不芳舟不為莫乘而不浮君子不為莫知而愠彼子路之愠見子貢之色作豈知是哉有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也犯上者常始於不順作亂者常始於犯上孝弟則順矣故好犯上者鮮不好犯上則順之至故好作亂者未之有也有子不曰不犯上而曰不好犯上者不犯上在迹不好犯上在心心之所不好則迹之所不為可知詩序以無犯非禮不及無思犯禮之深則不犯上不及不好犯上之為至也君子務本本立而道生孝弟也者其為仁之本與孝弟出於性而道又出於孝弟人莫不有孝弟之良心而道常不存者以其務末不務本也言本立而道生又言孝弟仁之本蓋仁者人也合而言之道也禮記言中者天下之大本繼之以和者天下之達道詩序言葛覃后妃之本繼之以化天下以婦道其所謂本者雖殊其本立而道生則一也孟子以事親為仁之實有子則以孝弟為仁之本者孟子執同以為異有子合異以為同故也古之立言者類多如此孟子言堯舜之道孝弟而已禮記則言孝近王弟近霸孔子言人而不仁如禮樂何禮記則義近禮仁近樂子曰巧言令色鮮矣仁訥者無巧言木者無令色木與訥務本者也故近仁巧言令色務末者也故鮮矣仁禮稱辭欲巧詩美令儀巧令者何也子曰有其本而輔以末則庶乎其可若事其末而忘其本則不可曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎謀貴忠言貴信傳貴習謀交傳者施諸人忠信習者存諸已先忠信而後習與易言忠信進德繼之以修辭立其誠禮言尊德性而繼之以道問學同意季文子三思則思其所未然者也曽子之三省則省其所已然者也傳曰君子三省乎身則智明而行無過此之謂歟孟子曰事孰為大事親為大守孰為大守身為大曾子三省其身可謂善守身矣子曰道千乘之國敬事而信節用而愛人使民以時敬則無所茍信則無所誕節用則不傷財愛人則不害民使民以時則不奪其力蓋不能敬事則不能立信不能節用則無以愛人故言敬事而繼之以信言節用而繼之以愛人成王誥康叔以汝亦罔不克敬典乃由裕民則敬事而信所謂敬典也節用而愛人使民以時所謂裕民也示之以敬則民不慢示之以信則民不疑示之以愛則民不離然後從而使之且使之也又以時人孰以為厲已哉言人又言民者人有十等民則特其賤者而已愛則兼乎貴賤故言人使之則特其賤者故言民詩曰宜民宜人傳曰和其民人與此同意周官縣師質人朝士所謂人民則異於是矣千乘之國百里之國也禮記曰封周公于曲阜地方七百里革車千乘者革車千乘自百里言之地方七百里兼附庸言之子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文入則孝於父兄出則弟於長上庸行之謹庸言之信泛愛衆而有容親仁而有擇凡此尊德性者也尊德性而後可以道問學故曰行有餘力則以學文蓋弓調然後可以求中馬服然後可以求良士信慤然後可以求智能若夫不知出此而以學文為先此古人所以譏其聖讀庸行鳳鳴鷙翰也禮曰忠信之人可以學禮子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣彼善而我善之謂之善善彼賢而我賢之謂之賢賢易色智也事父母能竭其力孝也事君能致其身忠也與朋友交言而有信信也有是四者則其質美矣故雖曰未學吾必謂之學矣由是觀之朽木糞土之質雖博學多聞君子謂之未學可也子曰君子不重則不威學則不固主忠信無友不如已者過則勿憚改言重則有法行重則有德貌重則有威蓋重足以畏人而不詘於人足以役物而不役於物不詘於人故有威不役於物故學固昔顔氏子視聽言動無非禮則重矣得一善則拳拳服膺而不失之則固矣莊子云中無主則不正外無正則不行主忠信則有主於內無友不如已則有正於外也重以固其學友以輔其德可謂善學矣然過而憚改則不足以成君子之道故終之以過則勿憚改也易之要終於補過之無咎孔子之憂終於不善不能改與此意同曾子曰慎終追逺民德歸厚矣孝經曰劈踊哭泣哀以送之卜其宅兆而安厝之慎終者也為之宗廟以鬼享之春秋祭祀以時思之追逺者也於終慎之則生可知於逺追之則近可知此民德所以歸厚矣詩序有云民德歸厚一者一者民之行厚者民之性則民性即民德歸厚一者以行齊行也民德歸厚者以性化性也慎終追逺民德歸厚豈非以性化性哉子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與禮曰溫良者仁之本又曰恭儉以求役仁信讓以求役禮則溫良恭儉讓者仁與禮而已仁者愛人愛人則人常愛之有禮者敬人敬人則人常敬之此夫子之至於是邦必聞其政也然夫子之道其體無方其用無體豈特溫良恭儉讓而已哉蓋釋其所有而致人之所以來者如斯而已若夫哀公季康子問之於魯景公問之於齊葉公問之於楚凡此皆未嘗求之而彼自以其政來問則夫子之所求求諸已而已子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣父在觀其志將以承之也父沒觀其行將以行之也三年無改過乎此而改之可也莊子不改父之臣與父之政孔子以為難能謂其過三年而不改故也禮曰孝子之身終終身也者非終父母之身終其身也是故父母之所愛愛之父母之所敬敬之至於犬馬盡然况於人乎此孝子所以改父之道不忍為也然父之道為可行也雖終身無改可也以為不可行也三年無改可乎曰古之人君有三年之喪皆以其國聽於冢宰雖父之道為不可行吾猶不與改也彼魯隱公於其可改而不改以至成先公之邪志秦襄公於其不可改而改之以至忘先君之舉皆不足以語此有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也敬者禮之體和者禮之用一之於敬則離故用和為貴一之於和則流故小大由之有所不行知和而和非小大由之者也然不以禮節之亦不可行也禮曰夫敬以和何事不行傳曰敬與和相反而相成有子曰信近於義言可復也恭近於禮遠恥辱也言必信則逺義行太巽則逺禮君子無逺義之信然後言可復無逺禮之恭然後逺恥辱晉文公伐原退舍則言可復尾生之信非可復也孔子敬所不敬則逺恥辱陳質之恭非逺恥辱也恥由中出辱自外至論語有言恥而不及辱此兼言之者以其恭近禮而待已侍人之道備故也因不失其親亦可宗也不因人而人因之其德崇德崇則人之所宗也莫之因而因人者其德卑德卑非人之所宗也雖然因人而不失其所親則所聞者正言所見者正行亦可宗也易比之初六擇有孚者比之所謂因不失其親也終來有它吉所謂亦可宗也子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也巳食無求飽居無求安不以小體害大體敏於事而慎於言不以所言勝所為此資諸已者也就有道而正焉資諸人者也古之有道者所飽在德不在食所安在仁不在居進其茙菽有稻粱之味庇其蓬屋若廣厦之䕃終身自適不知榮辱之在我也在彼也君子以飽食安居為戒此學者所宜知也易曰君子將有為也將有行也行則所行者也事則所為者也言君子敏於事又言君子欲敏於行則敏於行成德之君子也敏於事務學之君子也傳曰行成而先事成而後子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩巳矣告諸往而知來者諂失之卑驕失之亢二者非本於自然而常出於或使故貧而諂不若無諂富而驕不若無驕然無諂則能守而已未若樂無驕則能恭而已未若好禮此所以有其質者不可不成之以學也治骨與角謂之切磋治玉與石謂之琢磨切磋則以彼利器修此而成器故譬之道學琢磨則以謂見不善改此而成善故譬之自修道學所謂見賢思齊者也自修所謂見不賢而內自省也自切磋至於琢磨然後器可用自道學至於自修然後道可成故先切磋後琢磨先道學後自修也禮曰玉不琢不成器人不學不知道荀卿曰如切如磋如琢如磨謂學問也蓋别而言之切磋非自修琢磨非道學合而言之皆學問而已此以富而無驕未若好禮以好禮然後不驕何也無驕者質也好禮者文也美質者待文而後成故無驕未若好禮非美質者待文而後治故好禮而後不驕子曰不患人之不已知患不知人也人之於已知不為益不知不為損故不患不知以在外故也已之於人知則為智不知則為不智故患不知人以在我故也子曰不患無位患所以立亦此意歟為政第二子曰為政以德譬如北辰居其所而衆星共之天運無窮三光迭耀其中正而不移者北辰而已故天之樞則北辰為政者取譬焉北者道之復於無無者無為者也辰者居中而正乎四時者也無為而正乎四時則無為而無不為矣為政以德亦若此也蓋政以德然後善以正然後行書曰德惟善政政以德然後善也孔子曰子帥以正孰敢不正以正而後行也孔子之時為政者不然故譬稱以明之家語曰德者政之始子曰詩三百一言以蔽之曰思無邪無邪者天之道思無邪者人之道詩言性情而束之於法度其言雖多一言可以蔽之者思無邪而已觀變風變雅作於王道陵夷之後猶止乎禮義則詩之思無邪者於此可見矣孟子曰博學而詳說之將以反說約也揚子曰多聞守之以約詩三百一言以蔽之者說約故也然說約者猶事乎善言為詩者不說則忘言矣蓋言者君子所以教人忘言者君子所以自處子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格道之以政則非以德道之以德非無政也齊之以刑則非有禮齊之以禮非無刑也民免而無恥禮所謂民有遁心也有恥且格禮所謂民有格心也民可使覿德不可使覿刑覿德則純覿刑則亂則道之以政以至於民免而無恥者覿刑則亂也道之以德以至於有恥且格者覿德則純也書云帝德罔愆繼之以不犯于有司此道之以德而有恥且格者也傳曰法出而奸生令下而詐起此道之以政民免而無恥者也子曰吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩志學至立為學日益而窮理者也不惑至耳順為道日損而盡性者也然心不踰矩損之又捐而至於命者也孔子曰興於詩立於禮成於樂又曰可與共學未可與適道可與適道未可與立可與立未可與權則十五志于學興於詩而可與共學者也三十而立立於禮而可與立者也成於樂而可與權者也惟七十從心然後能之耳然耳順則用耳而已非所謂視聽不用耳目從心則有心而已非所謂廢心而用形孔子之言不及是者姑以與人同也孔子嘗曰吾六十有九未聞大道則七十從心者聞大道故也莊子曰莊猖狂妄行自蹈乎大方則不踰者也蹈大方故也孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟武伯問孝子曰父母唯其疾之憂子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎四子問孝夫子告懿子以無違教之以不失禮也告武伯以父母唯其疾之憂教之以不辱親也告子游以不敬何别教之以敬親也告子夏以色難教之以愛親也其問則同而告之不同凡各救其失而已諡法曰溫柔賢善曰懿剛强直理曰武溫柔賢善則於禮有所不立故教之以不失禮剛强直理則於行有所不慎故教之以不辱親子游之性近於偷懦則或失於不敬故教之以敬子夏之性近於恱外則或失於不愛故教之以愛不失禮則易而不辱親難不辱親則易而敬親難敬親則易而愛親難故於色然後言難也禮曰養可能也敬為難敬可能也安為難亦此意歟子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚道無問問無應故無始以無窮謂之不知為深黃帝以無為謂之不知為真此孔子以顔回之如愚為不愚皆所以貴其不知之知不言之言也回於孔子則如愚於其私則不愚者道相邇者可以意會而道相逺者必以言傳也老子曰我若愚人兮又曰盛德容貌若愚顔子其近之矣子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉所以其所行為者也所由其所趨向者也所安其所安止者也見之之謂視達視之謂觀詳視之謂察其所由難知於所以而非視所能盡故觀所安難知於所由而非觀所能悉故察顔淵用之則行舍之則藏其所以也願無伐善無施勞其所由也三月不違陋巷不改其所安也古之觀人者其精或致於九德其粗或止於九驗或觀之眸子或得之眉睫其所觀雖殊要不過是三者而已子曰溫故而知新可以為師矣溫故則月無忘其所能知新則日知其所亡如此則學不厭矣學不厭然後誨不倦故曰可以為師蓋師者人之模範而學者之賢不肖係焉故記問之學不足為而小知之師不足貴惟溫故而知新者然後可也記曰既知教之所由興又知教之所由廢然後可以為人師又曰能博喻然後能為師非夫溫故而知新者孰與此哉然溫故而知新可以為師與溫故知新敦厚崇禮者有間矣子曰君子不器大道不器故君子亦不器君子之道能柔能剛能圓能方流之斯為川塞之斯為淵升則雲行潛則雨施豈滯於一隅適於一用而為人之所器者若夫子貢之瑚璉管仲之器小則於君子有所不足此聖人所以不欲碌碌如玉落落如石顔子之言孔子瞻前忽後則孔子之道固不器矣子貢譬之以宫牆豈為知孔子者哉揚子曰君子不械子貢問君子子曰先行其言而後從之至言去言至為去為則凡言者風波也為者實喪也又况言浮於行者哉此孔子所以告子貢以先行而後言也禮曰君子約言小人先言子曰君子周而不比小人比而不周忠信者善周復故周阿黨者多缺露故比君子忠信而已故周而不比小人阿黨而已故比而不周大凡言君子道全小人道缺者此也書言自周有終詩云行歸于周周爰咨諏皆君子之道也詩曰洽比其鄰皆小人之道也然周亦有小人之周比亦有君子之比左傳曰是為比周原思曰比周而友小人之周也易之顯比周官比閭君子之比也子曰學而不思則罔思而不學則殆思由中出學自外入學而不思則內無自得之明故不信而罔思而不學則外無多識之益故不安而殆子曰博學之慎思之荀子曰誦數以貫之思索以通之揚雄曰學以聚之思以精之是思以學而後得學以思而後精二者謂其可偏廢乎哉蓋罔者不信之器相沿失誤而詩有羅罝之喻此不思所以謂之罔也子曰攻乎異端斯害也已天下之物有本有末本出於一端立於兩出於一則為同立於兩則為異故凡非先王之教者皆曰異端也子夏曰雖小道必有可觀者焉致逺恐泥以有可觀故有攻之者以其致逺恐泥故斯害也已董仲舒曰諸不在六藝之科孔子之術者皆絶其道勿使進此之謂知本者也子曰由誨女知之乎知之為知之不知為不知是知也由於德則鮮知於正名則不知於人未能事而欲事鬼於生未能知而欲知死則其以不知為知蓋不少矣孔子所以誨之也知之為知之不知為不知外不自以誣內不自以欺則以不知為知者非誣且欺乎老子之言至於知不知孔子之言止於知之為知之老子所言者道孔子所言者教也子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣言出於所聞行出於所見言以宣道故極髙明行以行已故道中庸言極髙明則寡口過故於人則寡尤行道中庸則寡怨惡故於已則寡悔如此則有得祿之理故曰祿在其中詩人以履為祿與此意同蓋君子求已小人求人修天爵以要人爵求諸人者也子張學干祿則學求諸人孔子語之以言行求諸已而已孔子於回則賢之於開則恱之於㸃則與之皆以其有志於學而無志於仕也子張之學干祿豈孔子之所許哉於富多言求於祿多言干蓋求富則有通於上下祿者僅千於上而已合而言之皆干者也哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服自道言之賢者非在所尚自事言之賢者不得不舉老子曰不尚賢使民不爭莊子曰舉賢則民相軋自道言之也莊子曰行事尚賢貴賤履位仁賢不肖襲情自事言之也孔子之答哀公則事而已故曰舉直錯諸枉則民服蓋民情好直而醜枉舉枉錯諸直則拂民之欲而民莫不怨舉直錯諸枉則適民之願而民莫不服詩云樂彼之園園有樹檀其下維榖以言上賢而下不肖則人莫不服而樂焉此舉直錯枉民服之意也孔子謂樊遲曰舉直錯諸枉能使枉者直不特民服而已告哀公不及此者即其所問而答之也季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸敬則不茍忠則不欺勸則不戒敬忠由中出勸自外入故康子之問先敬忠而後勸孝子道也慈父道也孝以率之則民觀而化慈以懷之則民感而化故忠舉善而列之以爵祿教不能而引之以道藝故勸禮曰孝以事君慈以使衆此孝慈所以使民致忠之道也書曰人之有猷有為有守汝則念之不協于極不罹于咎皇則受之而繼之以是彛是訓此舉善而教不能所以致勸之道也臨之以莊禮也孝慈仁也舉善而教不能則勸有是三者則民不待使而化康子不知出此而欲使之化焉豈知務哉或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政或人知為政而不知所以為政是知有用之用而不知無用之用故夫子告以惟孝友于兄弟是亦為政也孝之施於政也愛敬而已愛敬盡於事親而德教刑于四海則孝之施于政也豈不難哉蓋愛敬立則雖不為政而與孝同愛敬不立則雖為政而與不為政同揚子曰身立則敬立此之謂也然廣土衆民雖非君子之所樂而亦其所欲中天下而立定四海之民雖非君子之所性而亦其所樂孔子之不為政豈得已哉以其難為或人言故告不及此子曰人而無信不知其可也大車無輗小車無軏其何以行之哉信之在人猶輗軏之在車人而無信雖仁義禮智而不可行車而無輗軏雖輪轅輻輳而不可運此太𤣥所以言車無輗軏以貴信也行以立為體立以行為用民無信不立者體也人無信其何以行之哉用也易曰乾坤成列而易立乎其中矣又曰天地設位而易行乎其中矣體用之辨也子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也道之生也以三而成其變也以三而復故在天有隂有陽有隂陽之中在人有文有質有文質之中天之消息盈虛雖不同不過三者之相代而已人之因革損益雖不一不過三者之相救而已此所以由周至於十世由十世至於百世可知也今夫一人之身布指足以知寸布手足以知尺舒肘足以知尋天下之變若此而已則百世之因革損益其難知哉或問秦以繼周不待夏禮而治揚子對以繼周者如欲太平舍之而用他道亦無由至矣此之謂也董仲舒以忠質文為三代之道是離忠質以為二而不知忠者乃所以為質也子曰非其鬼而祭之諂也祀不貴淫神不享諂周官太宰八則祭祀以馭其神太祝命官則淫祀之禁尚矣世衰法弛淫祀滋盛其大至於五畤其小及於爰居以至正祀廢則天昏傷命者不為不多凡此皆謂之罪也漢谷永譏無福之祀魏文帝禁非禮之祭可謂知禮矣見義不為無勇也不見義而不為君子恕之以不知見義不為君子責之以無勇曾子曰自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣是見不義不可以必為而見義不可不為也春秋之時叔段有不弟之惡鄭伯可制而不制黎侯有狄人之患衛侯可救而不救田常有弒君之罪魯侯可討而不討凡此見義不為無勇也論語全解卷一
