body:
  text: 欽定四庫全書論語全解卷十宋陳祥道撰子張第十九子張曰士見危致命見得思義祭思敬喪思哀其可已矣孔子論成人則曰見利思義見危授命子張論士則曰見危致命見得思義者授命授君之命而不廢致命則致君之命以死制而已此成人所以與士異也得則在己利則不必在己見得思義則非見得而忘其形者也見利思義則非見利而忘其真者也成人於不以在己者則能思之士則能思其在己者而巳或先見利思義而後見危授命或先見危致命而後見得思義蓋成人以成己者為先士以事君者為先子張曰執德不𢎞信道不篤焉能為有焉能為亡德有體故可執道無體故信之而已𢎞則張而大之也篤則行而至之也執德𢎞信道篤有之則為盈亡之則為虛此能為有為亡者也執德不𢎞信道不篤有之不為益亡之不為損其能為有為亡哉傳曰彼有人焉能為有者也詩曰人之云亡邦國殄瘁能為亡者也若周亞夫之得劇孟世祖之得吳漢隱若一敵國是亦能為有者也蕭何之亡漢髙以為失左右手是亦能為亡者也然此特可以為有為亡而已與夫執德𢎞信道篤者有間矣然於德言𢎞而有所謂篤易曰篤實輝光日新其德是也於道言篤而有所謂𢎞孔子曰人能𢎞道是也凡言道德先道而後德出道之序也先德而後道入道之序也子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也其交也以道其接也以禮雖互童原壤孔子所不拒此所謂可者與之其交也不以道其接也不以禮雖滕更儲子孟子所不答此所謂不可者拒之也可者與之則不失人不可者拒之則不失己不失人仁也不失己義也子夏所云者盡之矣子張則以賢不賢異之非知所謂道與禮也子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也莊子曰百家衆技皆有所長時有所用雖然不該不遍一曲之士也蓋有所長有所用則可觀不該不遍則致逺恐泥此所以謂之小道也君子為其大者而小者從之小人為其小者則大者斯害己子夏曰日知其所亡月無忘其所能可謂好學也已矣日知其所亡知新也猶之智及之者也月無忘其所能溫故也猶之仁能守之者也孔子以溫故而知新可以為師子夏以日知其所亡月無忘其所能為好學者溫故然後知新則其所以己知者多而其所未知者少故可以為師知新然後溫故則其所已知者少而其所未知者多故可謂好學而已古之人其勤有至於愛日其極有至於競辰故學者有三餘之勤而女工有一月四十五日之説則夫日不知其所亡月而忘其所能者安在其為好學者哉詩曰我日斯邁而月斯征則其愛日也至矣子夏曰博學而篤志切問而近思仁在其中矣博學以知之而不能篤志以有之所知者必失切問以辨之而不能近思以精之則所辨者必惑博學切問則質諸外所以窮理篤志近思則資諸內所以盡性此仁行所以在其中也易曰學以聚之問以辨之而終之以仁以行之中庸曰博學之而終之以篤行之蓋學而至於行則可以得仁學而至於思則有得仁之道而已故曰仁在其中子夏曰百工居肆以成其事君子學以致其道審曲面勢以飭五材以辨民器謂之百工百工事事者也然不居肆不足以成其事君子事道者也然不務學不足以致其道時之人知事事而不知事道知事事者必居肆而不知事道者必務學子夏所以告之子夏以工之居肆譬務學孔子以工之事雖成而未必善務學而不取友則其致道也孰正之哉子夏之言姑以明學之大致而已莊子曰道不可致今此言學以致其道蓋不可致則在道而所以自致之則在人莊子亦曰致道者忘心子夏曰小人之過也必文君子作德其過也以人知之為幸故不文小人作偽其過也以人不知為幸故必文周公之於管蔡其過如日月之食人皆見之不文也冉求之於顓臾舍曰欲之而必為之辭必文也古之制字者以口文過為吝蓋吝則不改改則不吝吝則小人不吝則君子司馬遷曰君子之過謝以質小人之過謝以文子夏曰君子有三變望之儼然即之也溫聽其言也厲動容貌斯逺暴慢故望之儼然正顔色斯近信故即之也溫出辭氣斯逺鄙倍故聽其言也厲蓋望之儼然則疑於不厲及聽其言則厲儼然而溫溫變而厲此所以謂之變孔子威而不猛望之儼然者也溫而厲即之也溫聽其言也厲者也小人則貌輕而不嚴色厲而不溫言佞而不厲子夏曰君子信而後勞其民未信則以為厲己也信而後諫未信則以為謗己也信著於民然後勞之而不辭信著於君然後諫之而不疑説以先民民忘其勞信而後勞其民者也量而後入不入而後量信而後諫者也易晉之六三曰衆允悔亡志上行也革之九四改命之吉信志也蓋衆不允不可以有民志不信不可以改命信若晉之六三革之九四然後可以無厲己謗己之悔矣魏永之於龍門下車而廣公室此未信而勞民者也杜根之於鄧后未值其説而見誅此未信而諫者也孔子謂顔回曰德厚信矼未達人氣名聞不爭未達人心而強以仁義繩墨之言暴人之前是以惡有其美也揚子曰未信而分疑幾矣哉則未信者其可以諫乎子夏曰大德不踰間小德出入可也大德中德也小德庸德也中則以大常為體故不踰間庸則以小變為用故出入可也孟子曰動容周旋中禮盛德之至此大德不踰間者也易曰行過乎恭喪過乎哀用過乎儉此小德出入可也禮曰小德川流大德敦化也蓋敦化則立本而有常川流則應物而有變與此同也子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎子夏之門人其事則止於灑掃其言則止於應對其容則止於進退教之以漸也子遊譏之責之以頓也君子之教人漸而不頓孰當先傳孰可後倦譬之草木其始種之與移而植之不可以同區其大小不同故也列子曰學視者先見輿薪學聽者先聞撞鐘夫見輿薪未足為善視然非輿薪之見不足以致其明聞撞鐘未足為善聽然非撞鐘之聞不足以致其聽灑掃應對進退未足為善學然非灑掃應對進退不足以致其本此學記所謂先其易者後其節目也然則君子之道焉可誣也若夫有始以致其本有卒以致其末者惟聖人而已子夏以有始有卒為聖人則以致其本者為難能此其所以為子夏歟子夏曰仕而優則學學而優則仕仕而優則日有餘故學學而優則道有餘故仕君子學以為己仕以為人為己不忘乎為人故不以學廢仕為人不忘乎為己故不以仕廢學非念終始典于學者孰與此哉然則不學而仕則是未能操刀而製錦者也仕而不學則是得人爵而棄天爵者也學而不仕則是潔其身而亂大倫者也學而仕則仁仕而學則智惟君子為能盡之子遊曰喪致乎哀而止喪致乎哀則不忘親致哀而止則不滅性不忘親仁也不滅性禮也孝子之事如此而已曾子七日水漿不入口而辨人之為孺子泣不亦過哉禮曰毁不危身又曰而難為繼又曰毁而死君子謂之無子子遊曰吾友張也為難能也然而未仁曾子曰堂堂乎張也難與並為仁矣曾子曰吾聞諸夫子人未有自致者也必也親喪乎曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也堂堂乎張也能莊敬故也難與並為仁矣不能同故也父在觀其志父沒觀其行三年無改於父之道可謂孝矣孟莊子不改父之臣與父之政則非中道是難能也其為孝亦在去取之域矣孟氏使陽膚為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜先王之於民有九兩以繫之本俗以聨之大比以比之荒政以聚之則民附於上而不離安於下而不散及其有罪然後治之以刑不足恤也衰周之時上失其道民散久矣故曾子謂陽膚曰如得其情則哀矜而勿喜以罪在上不盡在民也蓋三軍大敗不可斬也獄犴不治不可刑也商人羣飲周公戒康叔以勿殺魯有父子訟孔子為司冦而舍焉以此子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之君子之過過於厚如日月之食而皆見故以人知之為幸小人之過過於薄雖必文而難解故必以人不知之為幸衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有聖人之道無所不在仁者見之之謂仁智者見之之謂智賢者識其大者不賢者識其小者咸其自取者然也孔子於老𣆀萇𢎞師襄郯子之徒有一善之可宗一言之可法者皆從而師之則亦何常師之有書曰德無常師主善為師孔子曰三人行必有我師之謂也蓋賢者識其大者不賢者識其小者資諸己者也孔子之無常師資諸人者也資諸己材也資諸人取材者也叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子責曰君子一言以為知一言以為不知言不可不慎也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也下士不笑不足以為道武叔不毁不足以為仲尼宫牆言其深日月言其明天言其髙方武叔之不賢仲尼則譬之以宫牆以言其深而不可知也及武叔之毁仲尼則譬之以日月以言其明而不可知也陳子禽之仰仲尼則譬之天以言其髙而不可及也其言各有所當爾揚子曰仲尼聖人也或劣諸子貢辭而精之廓如也然宫牆則不離乎器天與日月則不離乎象孔子之道不特乎此子貢之言亦其粗者而已矣夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也立之者政也道之者教也有政以立之有道以教之然後綏之以德莫不來動之以樂莫不和生則天下歌之故榮死則天下哭之故哀堯之治天下其效至於黎民於變時雍其死至於百姓如喪考妣不過如此蓋其有為也立然後道道然後綏綏然後動其有為之之效也立然後行行然後來來然後和治至於和則樂矣所謂成於樂者此也孔子嘗曰如有用我者三年有成又曰如有用我者吾其為東周乎蓋用此道而已堯曰第二十堯曰咨爾舜天之歷數在爾躬允執其中四海困窮天祿永終舜亦以命禹數在天歷在人非數無以作歷非歷無以紀數天之歷數則天地之數五十有五者也是數也變化待之以成鬼神待之以行萬物所聽之命則命於此而已萬物所由之道則道於此而已然則帝王之興豈特人事哉故曰天之歷數在爾躬然以命廢義則蔽於天以義廢命則蔽於人天事數在爾躬以其有命宜民宜人受祿于天然則不能允執厥中至於四海困窮則於內不足以備百福而於外不足以宜民人天祿其有不終乎蓋允執厥中所以教之也四海困窮所以戒之也書言天之歷數繼之以人心道心然後至於允執厥中又繼之以言謀君民之事然後至於四海困窮天祿永終此則略之者反説約故也曰豫小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬人君之於天猶子之於父臣之於君故以恩言之謂之天子以義言之謂之帝臣有罪不敢赦所謂不敢不政也帝臣不蔽所謂罪大而不可掩也朕躬有罪無以萬方萬方有罪罪在朕躬所謂以得為在人以失為在己也春秋傳曰禹湯罪已其興也勃然桀紂罪人其亡也忽焉聖人所以執左契而不責於人蓋以此歟書之多方曰非我有周秉德不康寧乃惟爾自速辜此又罪人不罪己者蓋教告已備而有不用降爾命者乃其自速之也周有大賚善人是富雖有周親不如仁人百姓有過在豫一人謹權量審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉所重民食喪祭寬則得衆信則民任焉敏則有功公則説書曰大賚于四海而萬姓説服注曰賚豫也言所以欽豫善人也蓋方用兵之時使智勇使貪使愚而小人皆在所用及其開國承家則不善之小人不以祿富之矣故曰周有大賚善人是富漢髙祖之用人下至於彭盧韓英鬻繒屠狗輕滑之徒莫不裂土而封之終以賈亂是知開國承家而不知小人勿用也光武之興監前事之違雖冦鄧之髙勳弇賈之鴻烈分土不過大縣數四所加特進朝請而已是知小人勿用而不知開國承家也知開國承家與小人勿用惟武王盡之矣周親自紂言之也仁人自周言之也紂之無道微子去之周之有道微子歸之是紂雖有周之親不如周有仁人也周官八柄廢以馭其罪誅以馭其過易言赦過宥罪則罪重於過矣於商言萬方有罪罪在朕躬於周言百姓有過在豫一人則周之責已尤重也可欲之謂善盡人之道之謂仁則善人於仁為不足仁人於善為有餘言善人又言仁人則賚而富之者不必皆仁人周親不特不如善人而已於湯言伐桀之事而不言善人與仁人以周見之也於周言善人言仁人而不言伐紂之事以湯見之也由是觀之湯之建中周之用皇極非不允執厥中而不言之者以舜禹見之也夫君人者其自任則以執中與罪已其所以輔之者又有善人與仁人則治之本立矣然不知謹權量審法度修廢官則四方之政未必行不知興滅國繼絶世舉逸民則天下之心未必歸故又繼之以謹權量審法度修廢官興滅國繼絶世舉逸民也蓋制而用之存乎法推而行之存乎人權量者法度之所出法度者百官之所守謹權量審法度則法有所明而四方無異制修廢官則法有所行而四方無廢事權衡度量其度量衡所以同天下齊風俗又曰同律度量衡權所以齊逺近立民信故舜則同律度量衡禹則關石和鈞周官內宰出其度量司事掌其度量合方氏於度量則一之行人於度量則同之故量之銘曰嘉量既成以正四國然則權量之於政其可以不謹乎夫國不可滅而滅者天下莫不望其興世不可絶而絶者天下莫不望其繼逸民不可遺而遺者天下莫不望其舉今也因天下之望興之而不廢繼之而不絶舉之而不遺此天下之民所以歸心也衰周之時若齊之四量陳氏三量則權量之不謹可知矣詩之蕩刺無綱紀文章則法度之不審可知矣大東刺南箕北斗長庚啓明皆有名而無實則官之廢者可知矣春秋譏滅國五十二則滅國之不興可知詩之裳華刺絶功臣之世則絶世之不繼可知隰桑刺君子在野則逸民之不舉可知故孔子言帝王之政而尤詳於此也蓋行政設官有方故以四方言之施德立賢無方故以天下言之夫天下固有常重為天下者固有常德民食喪祭者常重也寬信敏公者常德也書曰重民五教惟食喪祭蓋非民無以守邦非食無以養人非喪無以送終非祭無以追逺故先王重之也書曰御衆以寬又曰克寬克仁彰信兆民春秋傳曰上德以寬服人此所謂寬則得衆也禮曰上人疑則百姓惑蓋疑而不信則百姓惑而不任信而不疑則百姓任而不惑此所謂信則民任也家語曰天道敏生地道敏樹人道敏政易曰有攸往夙吉春秋傳曰敏以行之事雖大必濟此所謂敏則有功也書曰有以公滅私民其允懷傳曰出言而天下服公之謂也季羔公以行而刖者説管仲奪伯氏駢邑三百而無怨言公則説之謂也以季羔管仲之公而致人之説猶然况不為季羔管仲者乎寬敏信公四者政之所以成終始也由堯至周揖讓征誅雖或不同其為政之道不過以此而已故論語以詳記之子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司惠而不費所謂有孚惠心者也勞而不怨所謂佚道使民者也衆寡在人小大在事惠而不費仁也成仁在乎愛愛則雖欲而不貪勞而不怨義也成義在乎敬敬則雖泰而不驕蓋仁義之施在民而成仁義在己故言惠而不費勞而不怨則繼之以欲而不貪泰而不驕威而不猛也欲而不貪泰而不驕德行也威而不猛威儀也德行本也威儀末也無本不立無末不成故言欲而不貪泰而不驕而終之以威而不猛也家語荀卿皆曰慢令謹誅賊也斂無時暴也不教而責成虐也言暴虐與此不同者蓋對季康子而其指異也春秋傳曰山林川澤之實器用之資皂𨽻之事官司之守非君所及也曾子曰籩豆之事則有司存然則人君而為有司之事則上與下同德矣故曰猶之與人也出納之吝謂之有司矣非聖不可以為君非賢不可以為臣乾則君道也坤則臣道也易以坤為吝嗇而制字者以賢從臤則出納之吝在人臣則為善在人君則為惡猶之屯膏在小人者則吉在大人者則凶也聖人之法言其事足以盡其實故言之謂詩曰是謂伐德易曰隂陽不測之謂神是也其事不足以盡其實則言謂之而已詩曰謂之尹吉易曰利用出入民咸用之謂之神是也論語是謂棄之又言謂之虐謂之暴謂之有司其意亦若是也夫言尊則有卑言屏則有存五美不特可存而已故言尊四惡不特卑之而已故言屏此即事之證也若夫即道觀之則善之與惡相去何若子曰不知命無以為君子也不知禮無以立也不知言無以知人也知言將以窮理知禮將以盡性知命將以至命故不知詖淫邪遁之辭則無以知其人之蔽陷離窮不知慙枝寡多遊屈之辭則無以知其人之叛疑吉躁誣善失守故曰不知言無以知人恭而無禮則勞勇而無禮則亂慎而無禮則葸故曰不知禮無以立君子畏天命居易以俟之小人不知天命行險以徼幸故曰不知命無以為君子學而先時習之説繼以朋來之樂而終於知言之君子此先知命繼以知禮而終於知言則習而知言者學之所成終始者也明夫學之所以終始則孔子可以無言故論語終也論語全解卷十
