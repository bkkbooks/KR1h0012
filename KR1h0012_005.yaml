body:
  text: 欽定四庫全書論語全解卷五宋陳祥道撰子罕第九子罕言利與命與仁仁人道也命天道也利則和同天人之際者也仁命人所難知利人所難為智足以及此無事於言智不足以及此無足以與言所以罕言也天之所利年飢不足博施濟衆堯舜猶病况於人乎故鮮言之以利人所難為故也孔子於利罕言孟子於利不言蓋罕言者利之本不言者利之末達巷黨人曰大哉孔子博學而無所成名子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣顔閔之徒或以徳行稱或以政事稱或以文學稱或以言語稱皆其所以成名也孔子無所不學而人莫名其所以學無所不知而人莫名其所以知則無所成名也聖人之於天下方其人之知我也則承之以謙若曰吾少也賤故多能鄙事若聖與仁則吾豈敢君子道者三我無能焉我於辭命則不能也方其人之不知我則髙其言曰天生徳於予文不在兹乎下學而上達知我者其天乎此孔子所以執御而不執射者以達巷黨人之知我故也孟子於公孫丑之言既聖則曰惡是何言於距楊墨則曰予欲承三聖其抑揚髙下亦若是而已射與御皆藝也古者男子之生桑弧蓬矢六以射天地四方不能者則辭以負薪之憂周官六藝先射而後御詩之叔于田先善射而後良御則射者古之所尤重也孔子於射不敢執而曰執御者謙之至也子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下先王制禮之設為泰不為儉為泰不為恭用可以儉雖禮有所不行行在乎恭雖從有所不從故衆儉則從儉衆泰則從禮從衆者義也從禮者理也義者禮之權理者禮之經知禮之經則考之先王而不謬知禮之權則推於當世而可行三代之所以因革損益者亦不過如此而已矣子絶四毋意毋必毋固毋我聖人之於天下無適也無莫也以誠而已毋意也言不必信行不必果惟義而已毋必也可以止則止可以仕則仕趣時而已毋固也視人如我視我如人非特克已而已毋我也莊子曰于羊棄意聖人不必至人無已此之謂也雖然毋意也有所謂意易曰立象以盡意是也毋必也有所謂必名之必可言是也毋固也有所謂固君子固窮是也毋我也有所謂我以我為𨼆乎是也五行之性惟火為能毋我而火於五臟主神此毋我者聖人之妙用故於後言之毋者禁止之辭也孔子之於四者非無也特止而不為爾子畏於匡曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何聖人之勇能無懼如畏於三軍孟施舍之勇能無懼而畏於三軍聖人於内能無懼於外不能無畏聖人無懼而畏如孟施舍同其所以無懼與孟施舍異若孟子不動心與告子同其所以不動心與告子異老子曰人之所畏不敢不畏孟子曰五百年必有王者興其間必有名世者由文王至於孔子以其數則過矣以其時考之則可矣故曰文王既沒文不在兹乎太宰問於子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也子聞之曰太宰知我乎吾少也賤故多能鄙事君子多乎哉不多也牢曰子云吾不試故藝道徳者本也藝能者末也有其本而輔之以末則不害為君子若事其末而忘其本則不免為衆人周公之多才多藝與孔子之多能則多能亦聖人之所不廢而非其所先也聖人之於天下能圓能方能短能長流之斯為川塞之斯為淵升則雲潜則淵仁者見之謂仁智者見之謂智太宰見之謂多能不亦宜乎子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉聖人之於人患其不能學不倦其所教患其不能問不𨼆其所答互鄉童子之進則與之而不拒鄙夫之問則叩兩端而竭焉葢智及之而誠不至聖人答之以略智不及而誠至焉聖人告之以詳故於舉一隅不以三隅反者不竭兩端於竭兩端者不舉一隅此稱物平施也子曰鳯鳥不至河不出圖吾巳矣夫子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨君子以仁存心故見齊衰者則不忍以禮存心故見衣裳者則不慢以誠存心故見瞽者則不欺見之雖少必作於長者敬之可知矣過之必趨於與處者敬之可知矣見之過之而未必狎見齊衰雖䙝必以貎見冕與瞽雖狎必變夫子居鄉之容也顔淵喟然嘆曰仰之彌高鑚之彌堅瞻之在前忽焉在後夫子循循然善誘人愽我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已仰之彌高故不可階而升鑚之彌堅故不得其門而入瞻之在前故隨之不見其後忽焉在後故迎之不見其前仰之彌高鑚之彌堅聖也瞻之在前忽焉在後神也神與聖聖人之所獨文與禮天下之所同聖人以所獨者處已以所同者誘人博我以文使之窮理約我以禮使之盡性此所謂步亦步趨亦趨既竭吾才如有所立卓爾雖欲從之末由也已此所謂夫子奔逸絶塵而瞠乎其後掦子曰顔子得其行未得其所以行也子疾病子路使門人為臣病閒曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大葬予死於道路乎子疾病子路使門人為臣而孔子以為欺天夫子之死門人欲葬以三代之禮而君子不以為非禮門人欲厚葬之者義也孔子不敢厚葬之禮也夫詐則不誠欺則不忠不誠則無以行已不忠則無以事天故於已言詐於天言忠子貢曰有美玉於斯韞匵而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也君子未嘗不欲仕惡不由道美玉未嘗不欲沽惡不待賈沽之所以行其義待賈所以珍其道行其義則不失人珍其道則不失已易君子藏器於身待時而動掦子曰珍其貨而後市與此同意子欲居九夷或曰陋如之何子曰君子居之何陋之有子曰吾自衛反魯然後樂正雅頌各得其所孔子於禮不敢議執之而已於樂不敢作正之而已季札時豳不居末而次齊秦不次唐而次豳魏不次齊而次秦陳不次秦而次唐國風如此雅頌可知孔子所以亟正之左傳哀公十一年孔子在衛魯人召之乃歸其自衛反魯之時歟子曰出則事公卿入則事父兄䘮事不敢不勉不為酒困何有於我哉子在川上曰逝者如斯夫不舍晝夜天下之物無日而不禪無時而不移雖天地不能逃其變舟壑不能固其藏造化宻移疇覺之哉此孔子所以有川上之嘆也此即物觀之而已即理以觀之則流者未嘗流逝者未嘗逝子曰吾未見好徳如好色者也子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾徃也為譬則學也地譬則性也因性以為學亦猶因地以為山山㡬成而敗則功雖多而志不足故曰吾止也為山也未成而進則功不多而志有餘故曰吾徃也書曰為山九仞功虧一簣春秋傳曰君子惡惡也疾始而善善也樂終為善有始而鮮終豈君子所樂哉此孔子所以惡冉求之畫而與童子之進也孟子曰掘井九軔而不及泉猶為棄井又曰仁亦在熟之而已茍為不熟不如荑稗荀卿曰由垤而進吾與也由丘而止吾已矣自𤼵一矢不足以為善射千里之行一步不至不足以為善馬與此同意子曰語之而不惰者其回也與上士聞道勤而行之中士聞道若存若亡回語之而不惰勤而行之者也餘則語之而惰若存若亡者也葢於孔子之言無所不恱故能不惰彼予之晝寢求之自畫賜之願息其能無所不恱哉夫子所以獨稱回也於語則不惰於言則不違惟不惰所以能潜心惟不違所以能具體記有曰得一善則拳拳服膺而勿失之不惰之説也莊子曰回坐忘矣蓋不違之説也子謂顔淵曰惜乎吾見其進也未見其止也如有所立其進也欲罷不能未見其止也使回不死而充其庶㡬之資則其為聖也何有記曰向道而行中道而廢忘身之老也不知年數之不足也俛焉日有孳孶斃而後已回之謂歟子曰苗而不秀者有以夫秀而不實者有以夫詩稱種之黄茂而至於實𤼵實秀苗而秀者也實𤼵實秀至於實頴實栗秀而實者也古之人以學譬實以善譬榖則苗者可欲之善興之之時也秀者有諸已之信立之之時也實者充實之美成之之時也管子曰夫方其始也眴眴乎何其孺子也其壮也莊莊乎何其士也其成也由由乎何其君子也眴眴者苗也莊莊者秀也由由者實也孔子之時學者多止而不知君子也苗而不秀者有矣夫秀而不實者有矣夫子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已子曰年四十而見惡焉其終也已曾子曰年三十四十之間而無藝則無藝矣五十而不以善聞則不聞矣子曰法語之言能無從乎改之為貴㢲與之言能無說乎繹之為貴說而不繹従而不改吾末如之何也已矣人之性莫不秉彛而好徳人之情莫不好順而惡逆以其秉彛而好徳故法語之言不能無從然物或害之患不能改故改之為羙以其好順而惡逆故㢲與之言不能不恱然不以道患不能繹故繹之為貴昔惠王於孟子之言亦曰仁義而已是法語之言不能無從而不改幽王於聼言則對誦言如醉是㢲與之言不能無恱也然而不繹此惠主所以終於不仁幽王所以終於無道也孔子所謂訓恪人言法語之言也伊尹所謂有言遜于女志㢲與之言也子曰主忠信毋友不如已者過則勿憚改重出而逸其半子曰三軍可奪帥也匹夫不可奪志也三軍之所恃者帥也匹夫之可守者志也以匹夫視三軍不若三軍之衆以帥視志不若志之固故曰三軍可奪匹夫不可奪蓋見善明然後用心剛用心剛則心之所之者其銳不可挫其固不可攻此所以可親而不可刼可近而不可迫可殺而不可辱也夫以死生之大猶不得與變又况窮通之小者乎故首陽之飢不能降伯夷之志齊之卿相不能動孟子之心此儒行所謂身可危而志不可奪孟子曰志氣之帥也氣之帥本諸天三軍之帥本諸人本諸人者易奪本諸天者難奪此士所以貴尚其志也禮曰言有物而行有格也是以生則不可奪志死則不可奪名子曰衣敝緼袍與衣狐貉者立而不耻者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧勇或失於忮貧或失於貪求勇而不忮貧而不貪唯子路能之蓋懲忿則不忮窒慾則不求不忮者可以為仁而仁不止於不忮不求者可以為義而義不止於不求不忮不求子路終身誦之孔子抑之曰是道也何足以臧以言是善可以為善而非成乎善者也孟子曰人能充無欲害人之心而仁不可勝用人能充無穿窬之心而義不可勝用是仁義之道始於不忮不求而已子曰嵗寒然後知松栢之後彫也嵗不寒不足以知松栢事不難不足以見君子莊子曰受命於道唯松栢獨也又曰天寒既至霜露旣䧏然後知松栢之茂也禮曰若松栢之有心貫四時而不改柯易葉此所以譬君子之操也老子曰六親不和有孝慈國家昏亂有忠臣傳曰疾風知勁草亂世識忠臣與此同意子曰知者不惑仁者不憂勇者不懼知者自知不為物蔽故不惑仁者自得不為物役故不憂勇者自强不為物暴故不懼知者不惑亦有時而惑易曰或躍在淵是也仁者不憂亦有時而憂莊子曰仁人多憂是也勇者不懼亦有時而懼孔子曰臨事而懼是也此與中庸言知仁勇者學之序也憲問篇言仁智勇者道之序也禮運言知仁勇者用人之序也經傳所言皆先智而後勇書曰天乃錫王勇智禮曰以賢勇者興事立功蓋以勇為主故也子曰可與共學未可與適道可與適道未可與立可與立未可與權唐棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有子游子夏得其學故可與共學未得其所以學故未可與適道宰我子貢得其言故可與適道未得其所以言故未可與立顔回閔子得其行故可與立未得其所以行故未可與權可與權者聖人而已揚子曰聖人固多變也唐棣則喻權之用室則喻權之道權者反而後合故曰唐棣之華偏其反而不知返者視邇以為逺故曰豈不爾思室是逺而孔子曰未之思也夫何逺之有以言權者性之所固有求諸已而已鄉黨第十孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾道與之才聖人達之以為藝道與之貌聖人達之以為儀前言執射執御聖人之藝也此言郷黨之禮聖人之儀也然聖人之行禮不以居家者施之鄉不以居鄉者施之朝故於燕居則申申於鄉黨則恂恂於朝廟則便便凡皆異之以稱物同之以平施而已恂恂徳性之謂也便便辨治之謂也郷黨貴徳信則遜而無所辨故似不能言朝廟貴辨而不可不敬故曰便便唯謹周禮司徒教民以孝友睦婣而繼之以任恤此鄉黨貴徳信者也禮記言朝極辨此朝廷貴辨治者也子入太廟每事問周禮禁慢朝錯立族談者孟子謂朝廷不歴位而相與言禮曰在朝言朝此便便言唯謹爾也禮言庶子在宗廟之中如在外朝之位此言夫子在宗廟朝廷皆便便言唯謹爾者也宗廟朝廷之禮一也以孔子觀之色勃如足躩如入君之門則鞠躬如不容執君之圭則鞠躬如不勝與上大夫言則誾誾與下大夫言則侃侃動容周旋無不中禮則禮之為用可知矣詩云攝以威儀威儀孔時此之謂歟朝與下大夫言侃侃如也與上大夫言誾誾如也君在踧踖如也與與如也侃侃和也誾誾敬也踧踖則恭而安與與則有相與之意下交不凟故與下大夫言侃侃如上交不謟故與上大夫言誾誾如恭而失相與之意則不親有相與之意而不恭則不敬君在踧踖如也尊之也與與如也親之也閔子侍側誾誾如也冉有子貢侃侃如也閔子以孔子交乎上者侍孔子冉有子貢以孔子交乎下者侍孔子此三子之賢所以不同也詩曰執㸑踖踖我黍與與則踖踖者安而不遽與與者相與之謂也君召使擯色勃如也足躩如也揖所與立左右手衣前後襜如也趨進翼如也賓退必復命曰賓不顧矣朝聘之禮主有擯賓有介公則擯五人侯伯四人子男三人公則七介侯伯五介子男三介擯有紹擯有上擯介有衆介如此然後命有所傳情有所達而不相凟也君召使擯色勃如也其容不特莊而已足躩如也其容不特重而已揖所與立左右手衣前後襜如也其容不特恭而已孟子稱齊王勃然變乎色易以矍矍為之不安則勃如色之變也躩如足之不定也夫擯進則揖遜退則不顧揖遜者難進也不顧者易退也聘禮公食大夫禮公既拜送然後言賓不顧皆擯者復命之辭周官掌訝詔其位入復及退如之退亦入復所謂賓退必復命也入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屛氣似不息者出降一等逞顔色怡怡如也沒階趨進翼如也復其位踧踖如也執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循立中門則嫌於自尊行履閾則嫌於自髙過位過君之位也勃如戰色如戰陣之色也足蹜蹜如有循旁縁而有循也禮曰士大夫出入君門由闑右不履閾立不中門行不履閾之謂也又曰執主器執輕如不克執玉器操幣圭璧行不舉足如不勝之謂也玉藻曰執龜玉舉前曳踵蹜蹜如也儀禮曰執玉者惟周舒武舉前曳踵足蹜蹜如有循之謂也入公門如升堂如執圭故皆曰鞠躬如也過位如使擯故皆曰色勃如也足躩如也復其位如君在故皆曰踧踖如也沒階趨亦如君召使擯故皆曰趨進翼如也非夫動容周旋盛徳中禮之至者誰能至此享禮有容色私覿愉愉如也享致其禮私覿致其情致其禮則尚敬致其情則尚和故愉愉如也禮記言賓私覿私面致饔餼還圭璋周禮司儀言私面私獻春秋傳曰楚公子棄疾見鄭伯以其良馬私面則私覿固有獻矣蓋言享則知私覿之為獻言私覿則知享之為公互相備也然使而私覿則禮也覲而私覿則非禮也故禮記曰朝覲大夫之私覿非禮也君子不以紺緅飾紅紫不以為䙝服當暑袗絺綌必表而出之色未及緇為緅色過於緇為紺考工記鍾氏五入為緅是未及緇也列子曰以湼染紺而緇於湼是紺過於緇也火克金為紅南方之間色其義則陽侵隂水克火為紫北方之間色其義則隂侵陽君子不以紺為其近齊服也不以緅為其近練服也不以紅紫為䙝服為其非正色也不以為飾則不以為衣可知不以為䙝服則不以為正服可知當暑袗絺綌不入公門必表而出之詩所謂䝉彼縐絺是也曲禮玉藻皆言袗絺綌不入公門此衆人之禮也孔子袗絺綌必表而出非特不入公門而已緇衣羔裘素衣麑裘黄衣狐裘禮記曰麑裘素衣以裼之羔裘緇衣以裼之狐裘黄衣以裼之則緇衣羔裘素衣麑裘黄衣狐裘者稱其色以裼之也羔之色黑其性則羣而有禮麑之色白其性則弱而善愛狐之色黄其性則黄而多正緇所以象道素所以象義黄在坤象方物朝廷者道與禮之所自出故於緇衣羔裘為朝服喪則仁義之盡故以素衣麑裘為喪服蜡所以息老物故以黄衣狐裘為蜡服此皆色之純者也然有所不必純則純者所以相稱其不純者所以相成故記曰狐白裘錦裼之狐青裘元裼之䙝裘長短右袂必有寢衣長一身有半天不足西北故人之右目不如左明地不滿東南故人之手足右強右強則有利於用故右短袂以便作事正裘所以行有禮故不長䙝裘取温故長狐貉之厚以居先王之制衣服有以成徳者有以稱徳者成徳者外成乎内稱徳者外稱乎内孔子曰衰麻苴杖者志不存乎樂非耳勿聞服使然也黼黻衮冕者容不衰慢非性矜莊服使然也介胄執戈者無退懦之氣非體絶猛服故也此以外成乎内也莊子曰冠圜冠者知天時履勾履者知地形緩佩玦者事至而斷此以外稱乎内也狐之性善疑而戒貉之性善明而静居則戒於外而静於内故裘必以狐貉取温而已故必厚詩曰一之日于貉取彼狐狸為公子裘豳民以貉為裘以狐狸為公子裘是狐裘美於貉矣故先狐後貉去喪無所不佩佩所以致飾喪則去飾矣故去而不佩去喪無所不佩禮曰君子無故玉不去身凡帶必有佩玉惟喪否是也昔石駘仲卒卜所以為後者石祁子不沐浴佩玉而兆若祁子可謂知禮矣然是禮也非必終喪然也禮曰禫而纎無所不佩非帷裳必殺之羔裘𤣥冠不以弔詩曰漸車帷裳則帷裳者周禮巾車所謂華蓋是也羔裘朝服也元冠祭服也季桓子死魯大夫朝服而弔孔子曰始死羔裘元冠者易之而已蓋始死主人未變服則羔裘元冠可也及小歛則主人變服羔裘元冠以弔非禮也子游裼裘而弔魯子始譏而後是之然則曽子之知禮其知子游之後乎朝服言裘不言冠祭服言冠不言裘互相備也吉月必朝服而朝周禮言正月之吉詩言二月初吉朔月謂之吉者明生之幾故也魯自文公始廢告朔之禮孔子吉月猶必朝服而朝所以存禮也周官設璧羨以起度孔子不去餼羊以存告朔孟子不毁明堂以存王政皆救世之苦心也孔子吉月之朝知者以為存禮不知者以為謟也齊必有明衣布齊必變食齊所以致精明之徳於内而防其邪物於外故不御於内不聼樂不弔不賓不飲酒不膳葷䘮者凶者則不見苟慮苟動則不聞然後可交於神明此所以必有明衣與變食也謂之明衣以致其精明之徳也布以其有齊素之心也變食與周禮王齊日三舉同意然此第祭祀之齊非心齊也心齊則致虚而已何物之能累者哉士䘮禮亦有明衣蓋君子齊終之意也居必遷坐久立傷骨久行傷筋久臥傷氣久坐傷肉久視傷血居必遷坐非久坐也食不厭精膾不厭細食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食割不正不食不得其醬不食肉雖多不使勝食氣惟酒無量不及亂沽酒市脯不食不撤薑食不多食祭於公不宿肉祭肉不出三日出三日不食之矣飲食所以存生亦所以害生所以養形亦所以累形為其有以累形故不恥惡衣惡食為其有以害生故食不厭精夫肉曰敗魚曰餒敗則外腐餒則中潰色惡色之變也臭惡氣之變也然臭惡不特氣之變而已若牛庮羊羶犬臊鳥貍豕腥馬螻之類皆是也禮曰天不生地不養君子不以為禮鬼神勿嚮也又曰五榖不時榖實未熟不粥於市召信臣曰不時之物有傷於人不宜以奉供養漢之鄧后亦禁不時之物此之謂不時不食也禮曰骨有貴賤貴者取貴骨賤者取賤骨此所以割不正不食也蓋不時不食不可食也割不正不食不安食也神農氏曰醬除墊不煩薑去臭通神不得其醬不食禮所謂魚膾芥醬麋腥醢醬之類是也不撤薑食禮所謂飲食必有草木之滋是也夫天産養精所以作隂徳地産養形所以作陽徳不以作隂徳者勝陽徳故曰肉雖多不使勝食氣惟酒無量如酌孔取是也不及亂不為酒困是也不多食節飲食是也食不語寢不言雖疏食菜羮𤓰祭必齊如也席不正不坐鄉人飲酒杖者出斯出矣直言曰言論難曰語食不語者必不言寢不言者不必不語君子不以菲廢禮故雖蔬食菜羮𤓰祭必齊如也席之所向非所向所止非所止非理也故席不正不坐疾行先長謂之不弟徐行後長謂之弟故鄉人飲酒杖者出斯出矣鄉人儺朝服而立於阼階孝莫大於寧親寧親莫大於寧神鄉人儺則神有所不寧故朝服立於阼階所以寧之也此與方相氏月令皆曰儺郊特牲則曰禓裼者即謂之儺以狂夫為之狂則陽過之疾者也以陽勝隂則謂之禓去其為難者則謂之儺其實一也方相氏以時儺者占夢季冬令始儺則所謂時儺者季冬而已蓋冬者萬物歸根之時先王因其歸根之時而為之敺贈之禮故占夢季冬贈吉夢去惡夢男巫冬堂贈則儺於是時也宜矣月令仲春秋皆有儺非周制也問人於他邦再拜而送之康子饋藥拜而受之曰丘未達不敢嘗厩焚子退朝曰傷人乎不問馬饋藥而不敢嘗慎疾故也厩焚不問馬重人故也傳曰國厩焚子退朝而之火所鄉人有為火來者蓋問人曰仁也拜之者禮也昔魯桓僖廟災救火者皆曰顧府南宫敬叔至命周人出御書子服景伯至命宰人出禮書公父文伯至命校人駕乘車季桓子至命救化者傷人則止財可為也命藏象魏富父槐至去表之槀其所命不同要急於重人而已而書次傳命駕車與顧府者其異乎夫子之問人不問馬也蓋亦逺矣君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之侍食於君君祭先飯疾君視之東首加朝服拖紳君賜食必正席先嘗之敬君惠也君賜腥必熟而薦之榮君惠也君賜生必畜之仁君恵也禮曰侍食於君子先飯而後已又曰侍食於先生異爵者後祭先飯夫於先生君子其敬尚如此况侍於君側乎此禮所以言君客之則先飯辨嘗羞飲而俟也禮曰君有疾飲藥臣先嘗之親有疾飲藥子先嘗之亦嘗食之意也古者于㸑則祭先炊于田則祭田祖于樂則祭樂祖于開龜則祭先卜于養老則祭先老于學則祭先聖先師于馬則祭馬祖先牧于射則祭侯于駕則祭車以至師田有禡飲食有祭皆所以不忘本也君之祭仁也而禮存焉臣之先飯禮也而仁存焉君命召不俟駕行矣父命呼唯而不諾手執業則投之食在口則吐之走而勿趨為人臣者資於事父以事君而敬同此所以不俟駕也詩云顛之倒之自公召之禮曰在官不視履在外不俟車荀卿曰諸侯召不俟駕而走禮也然當其為臣則可召當其為師則不可召可召而不遄往則非禮不可召而往焉則非義孔子不俟駕孟子辭以疾者以此入太廟每事問重出朋友死無所歸曰於我殯子夏問曰客至無所舍夫子曰於我乎舘客死無所殯夫子曰於我乎殯禮與仁與子曰仁者制禮葢禮非仁不立仁非禮不行生於我乎舘禮也而仁存焉死於我乎殯仁也而禮亦存焉朋友之饋雖車馬非祭肉不拜車馬雖重為禮輕祭肉雖輕為禮重故朋友之賜雖車馬非祭肉不拜若夫於君賜車馬乘以拜賜衣服服以拜賜酒肉之賜必再拜則無所不拜矣寢不尸居不容見齊衰者雖狎必變見冕者與瞽者雖䙝必以貎凶服者式之式負版者素相親近者為狎齊衰者雖與之狎近變其色所以哀有䘮也數相見面者為褻冕與瞽者雖與之褻見必盡其禮所以致其敬也凶服者不但齊衰而已孔子過泰山側有婦人哭而哀式而聼之式凶服也周官之法生齒以上書於版則版民數也孔子式負版者重民數也觀司冦之登民數以王之尊猶拜而受之以冡宰之貴猶式之而已孔子之式不亦宐乎有盛饌必變色而作迅雷風烈必變食至起則不必變色有盛饌則變色而作孔子曰主人不以禮客不敢盡禮主人既盡禮客亦不敢不盡禮者也禮曰有疾風迅雷甚雨則必變雖夜亦必興服衣冠而坐詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅皆恐懼修省之意也升車必正立執綏車中不内顧不疾言不親指升車執綏不親指手不失儀也不内顧首不失儀也不疾言口不失儀也周官道右所謂車儀者此也然禮記言不廣欬不妄指顧不過轂此言不内顧不疾言不親指者不廣欬不必不疾言不疾言不特不廣欬而已不妄指不必不親指不親指不特不妄指而已顧不過轂不必不内顧不内顧不特不過轂而已論語言孔子為人臣之禮故其禮特過於嚴記言為人君之事故其禮不妨於稍寛色斯舉矣翔而後集曰山梁雌雉時哉時哉子路共之三嗅而作衛靈公望鴈色不在焉而我孔子遂行此所謂色斯舉矣孔子曰鳥能擇木木豈能擇鳥此之謂翔而後集也色斯舉矣易退也翔而後集難進也色斯舉矣翔而後集者臣之道也故以雌雉繼焉雌雉之為物其别有倫禮也其交有時義也君子出處以時去就以道亦若是焉而已孔子嘆雌雉於山梁亦此意也他日子路共之三嗅而作其能識去就之宜也共與周禮共舉之共同論語全解卷五
