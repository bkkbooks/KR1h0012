body:
  text: 欽定四庫全書論語全解卷三宋陳祥道撰公冶長第五子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之公冶長能為不可罪之行而不能必免於縲絏南容有保身之明而能必免於刑戮其賢固有間矣孔子以己子妻長以兄子妻容處己子可薄處兄子不可不厚也孔子於疾病不禱周公於君之疾則金縢孝子於已則含菽緼絮於親則致滋美其意亦若是也傳曰君子為己不重為人不輕為人且不輕况於君親乎聖人之妻人不必求其才徳之備要其修身慎行不累其妻孥可也故於公冶長言雖在縲絏之中於南容言邦無道免於刑戮家語曰公冶長能忍恥南容世清不廢世濁不汙子謂子賤君子哉若人魯無君子者斯焉取斯蓬生麻中不扶自直白沙在涅不染自黒此不齊在魯所以取君子之名也故曰魯無君子斯焉取斯不齊於君子有以父事者有以兄事者有以友事者此其所以取君子之名也家語言不齊之事其學益明骨月益親朋友益篤孔子嘿然謂之君子者此也孔子曰君子吾不得而見又言魯有君子與孟子所謂春秋無義戰彼善於此同意子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也禮曰夏后氏四璉商六瑚朝廷之器也君子不器而子貢謂之瑚璉則不免於器也不免於器而猶為器之珍者方之君子則不足比之衆人則有餘然則不為人之所器者而後能器人為人之所器而器人則非人之所宜故子貢方人孔子非之或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞訥則近仁巧言則鮮仁給則奪仁故顔子之如愚冉雍之不佞孔子以為仁宰予之言語公西華之可與賓客言孔子不以為仁蓋仁者愛人愛人者常愛於人禦人以口給屢憎於人則不仁可知矣孔子謂雍可使南面為人君止於仁故也子使漆雕開仕對曰吾斯之未能信子說子曰道不行乗桴浮於海從我者其由與子路聞之喜子曰由也好勇過我無所取材孔子於天下環車接淅席不暇煖於南子陽貨則見於佛肸公山則欲往嘗謂茍有用我者三年有成如有用我者吾其為東周乎則其汲汲於行道不為不至矣然所歴者七十二君一君無所任用以至伐木于宋削迹于衞圍于陳蔡欲避世也不可得矣於是有欲居夷浮海之說子路不知乎此而欲勇於必行故曰好勇過我無所取材以其能勇而不能怯非所以為成材也鼓方叔入於河播鼗武入於漢少師陽撃磬襄入於海范蠡之泛湖管寧之浮海亦乗桴之意也孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賓客言也不知其仁也顔淵冉雍得聖人之具體者也具體則為聖人而足以名仁故孔子與之仁由求與赤得聖人之一體者也一體則非成人而不足以名仁故孔子曰不知其仁有曰未知焉得仁者聖人知其為仁也不欲以不仁名之故曰不知其仁未知其為仁也特聞其忠清而已故曰未知焉得仁由於千乗之國可使治其賦也則大夫而已求於千室之邑百乗之家可使為之宰則陪臣而已然則千乗之國由也為之可使有勇方六七十如五六十求也為之可使足民則皆諸侯之事與此不同者三子所言者志也孔子所論者材也子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也聖人後天地而生知天地之始先天地而成知天地之終故能以微知明以一知萬豈特聞一知十哉葢道之所在有方有隅有上有下聞一知十者知方而已此顔回所以下於聖人聞一知二則不過告往知来而已此賜所以下於回也賜雖下於回與詩所謂人知其一莫知其它莊周所謂識其一不識其二者異矣孔子嘗以賜為士君子以回為明君子蓋士則上達故可以知二明則殆於㡬故可以知十也聖人之與人常與其自知而不與其自是子貢不蔽於自是而知其弗如故夫子與之宰予晝寢子曰朽木不可雕也糞土之牆不可杇也於予與何誅子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於予與改是良工能雕木而不能雕既朽之木杇者能杇牆而不能杇糞土之牆聖人能教人而不能變不美之質蓋質幹在於自然華藻在於人事所有不可耀所無不可强凡在因之而已此宰予之寢孔子所以不誅也蓋宰予足於言而不足於行故嘗欲短三年之喪與田常之作亂短喪則不仁與亂則不智則其質之不美可知矣質之不美雖不舎晝夜以學先王之道孔子猶且不與則晝寢之過何所責哉春秋責備賢者而畧於不賢亦此意也孔子嘗曰吾以言取人失之宰我以貌取人失之子羽故於宰予則改之此所謂於予與改是也且君子於人也不逆詐不億不信故始吾於人聴其言而信其行及宰予之不信然後以決之疑焉疑之所生因彼而已孔子之門人若求之自畫賜之願息其不能自勉非特宰予而已孔子於賜求則教之於宰予則何誅者以其質不同故也傳曰皮之不存毛將安傅子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛剛本乎性慾出乎情慾不能無求不能無求則不能無撓也故曰棖也慾焉得剛君子之於慾也寡之使不勝窒之使不行其固不為物傾其完不為物虧此老子所謂自勝者强揚子所謂勝私之克者也又奚適不剛哉湯之奏勇其来乃自於不邇聲色文王之赫怒其来乃自於無然歆羨子路之不求所以能全勇之名孟子之不動心所以能全至剛之氣此皆以直養而無害者也蓋慾之不行則難矣而未仁剛之於仁則近矣而未至慾不行然後能剛能剛然後近仁則欲仁不可不剛欲剛不可以有慾也然陽處父并植於晉不可謂之無慾而人以為剛趙文子生不交利可謂之無慾而人不以為剛者文子之剛也内處父之剛也外君子所貴剛於内而已子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也孔子曰不使不仁者加乎其身所謂我不欲人之加諸我又曰己所不欲勿施於人所謂吾亦欲無加諸人也君子以仁存心以禮存心仁者愛人有禮者敬人愛而且敬則我無加諸人矣然横逆有時而至亦所不免也蓋我無加諸人則易人無加諸我則難子貢不能匿人之過其於是之易者猶或未能况其難者乎故曰非爾所及也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫子之道出而致廣大則為文章入而極髙明則為性與天道子貢得其言故於文章可得而聞未得其所以言故於性與天道不可得而聞蓋性在我者也未嘗不在天天道在天者也未嘗不在我禮曰天命之謂性是在我者未嘗不在天也孟子曰聖人之於天道是在天者未嘗不在我也顔子殆庶幾者也故於言無所不恱子貢非殆庶㡬者也故於其言不可得聞老子曰上士聞道勤而行之顔子是也中士聞道若存若亡子貢是也孟子之言性善自其離於道言之孔子之言性自其渾於道言之故孟子之言雖告子有所聞孔子之言雖子貢有所不得聞子路有聞未之能行唯恐有聞君子有三患未之聞患不得聞既聞之患不得學既學之患不得行子路勇於必行其患又過於此故有聞未行唯恐有聞而行之不逮也孔子於其無宿諾則美之於其兼人則抑之美之所以長其善抑之所以救其失子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也敬文之恭也忠文之實也信文之孚也義文之制也智文之輿也勇文之帥也教文之施也孝文之本也惠文之慈也讓文之才也文之所施不一故古之為諡者多謂之文孔子謂敏而好學所以聚之也不恥下問所以辨之也好學則資諸已下問則資諸人此所以謂之文也然此可以為文而已其於文王周公之文固有間矣子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義子産遜不失禮所謂行己也恭事君無二心茍利社稷死生以之所謂事上也敬濟人以乗輿殖民以田疇所謂養民也惠擇能使之所謂使民也義行己恭然後移之於君則敬養民惠然後使民則義得其序也君子之道固多矣子産有是四者而已四者之中尤長於惠故又命之以惠人子曰晏平仲善與人交久而敬之交患於不久久患其不敬晏平仲久而敬之此所以為賢大夫觀平仲之與越石父交延而賓之久敬可知矣此曾子所以言晏子可謂知禮詩之故舊不遺周官之敬故皆久而敬之之謂也彼耳餘之凶終蕭朱之隙末其於平仲之交不亦逺乎此林回喻之以甘醴桓譚譬之以闤闠朱穆所以有比周之論劉峻所以有五交之歎也子曰臧文仲居蔡山節藻梲何如其知也冀多良馬天下命良馬者因謂之驥瀘水之黒天下命黒者因謂之盧蔡之出龜天下命龜者皆謂之蔡漆雕憑曰臧氏有守龜曰蔡文仲三年為一兆臧氏之居蔡始於文仲故也禮曰諸侯以龜為寶家不寶龜山節藻梲文仲之居蔡有僭於天子之廟飾非所謂知而夫子非之曰何如其知也管仲山節藻梲君子以為濫與此同也古之作服者繪山於衣所以象仁之静繡藻於裳所以象徳之潔侯伯之章猶不及山大夫之章猶不及藻又况可施於文仲之節梲乎孔子於文仲言不知於武仲言知則文仲之於武仲固有間矣顔淵問二者孰賢子曰武仲賢哉子張問曰令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弑齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁進退在君不在已故三仕三已無喜愠之色此忠於君者也待人以誠不以欺故舊政必告此忠於人者也不顧十乗之富不恤大夫之位無崔子之亂則就之有崔子之亂則違之此清其身者也忠足以盡己未足以成已清足以避亂未足以救亂故皆曰未知焉得仁比干之忠伯夷之清孔子皆以為仁何耶比干之忠所以戒萬世之為君伯夷之清所以戒萬世之為臣其所忠清與二子同其所以忠清與二子異令尹子文之無喜愠蓋出於或使公孫敖之無喜愠則出於自然出於自然猶孟子之言不動心也出於或使猶告子之不動心也傳曰卿違從大夫之位又曰凡諸侯之大夫違告於諸侯蓋大夫去其位曰違季文子三思而後行子聞之曰再斯可矣文子於國則忠於家則儉其逐紀太子以不忠孝責韓穿以非信義内無衣帛之妾外無食粟之馬金玉非所藏寶器非所重魯君以為社稷之臣而存亡之所係則其所舉固寡過矣然猶三思而後行故孔子言再斯可矣古之人其謹身有至於三省其慎言有至於三復則三思而後行不為過矣蓋有文子之質再斯可矣無文子之質非三思則不可孔子於三思則抑之於率爾而對則責之因人而為之教也文子嘗曰備豫不虞三思可知矣子曰甯武子邦有道則知邦無道則愚其知可及也其愚不可及也君子之仕也邦有道其言足以興邦無道其黙足以容故坤之六三居下卦之上則曰知光大六四居二隂之間則曰括囊卷阿之什則曰来游来歌抑之章則曰靡哲不愚武子邦有道則知無道則愚蓋得諸此而過之者也南容邦有道不廢邦無道免於刑戮而已史魚邦有道如矢邦無道亦如矢而已伯玉邦有道則仕邦無道則卷懐而已子游曰吾友張也為難能也曽子曰孟莊子不改父之臣與父之政為難能也然則不可及者其難能之謂歟顔子之如愚甯武子之愚有以異乎曰如愚可也不可及不可也不可及非中道也此顔甯之愚所以不同子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之狂者能為而不能已其成章也失之過簡者能畧而不能詳其成章也失之不及孔子在陳欲與中道者不可得故思魯之狂簡者裁之使歸於中也詩言有斐君子記言且其斐色則斐者文之散也東南為文西南為章則章者文之成也此言狂簡孟子言狂狷者簡言其所學狷言其所守所守在行故以狷言之所學在言行故以簡言之子曰伯夷叔齊不念舊惡怨是用希求在外者不可必故放於利而行所以多怨求諸已者可必故求仁得仁怨是用希葢仁人不藏怒不宿怨則所謂舊惡者在彼而已我何加損焉此所以不念也怨是用希則不能無怨又曰何怨者以怨出於不怨雖曰無怨可也回不思舊怨雍不錄舊罪孔子皆與之亦求仁得仁之謂與子曰孰謂微生髙直或乞醯焉乞諸其鄰而與之君子之於天下外不可失人以存己内不可失已以為人與其失已以為人孰若不為人以存已髙之乞醯為人可也為已則非直也强無以為有非安命者也今夫君子之於言知則為知不知為不知内不以自誣外不以欺人言尚如此况於行乎此髙之所以不足取也洪範之三徳平康正直臯陶之九徳直而温詩曰邦之司直易曰直其正也孔子曰人之生也直三代直道而行孟子曰不直則道不見道之所貴直而已矣子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之巧言令色足恭非務本者也不足於仁匿怨而友其人非質直者也不足於義故左丘明恥之丘亦恥之聖人之於人有所異亦有其所同其得地而君之則與伯夷伊尹同用舎行藏則與顔回同則其所恥與左丘明同也宜矣顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懐之重財輕義人之常情子路願乗肥馬衣輕裘與朋友共敝之而無憾義者之志也謙則不伐善愛則不施勞顔回願無伐善無施勞仁者之志也老幼安懐於已者恕也朋友信於已者忠也孔子言老者安之朋友信之少者懐之聖人之志也賢人之志則入而成已聖人之志則出而成物以輕裘肥馬敝而無憾所以成已之義伐善施勞之不為所以成已之仁老幼之所安懐朋友之所信然後成物之道盡充子路之義然後至於顔子之仁充顔子之仁然後至於孔子之聖蓋物足以累已非學者之道也言侍則先顔子言志則先子路豈子路之對亦率爾乎子曰已矣乎吾未見能見其過而内自訟者也隂陽有時而愆日月有時而食川谷有時而竭天地之大猶且不免於過况於人乎要在改過而已改過始於見過不見其過而不知自訟者君子所不責見其過而不自訟者君子必責之蓋見其過而不自訟非好學為已者也孔子之教將無所施焉故曰已矣乎昔申徒嘉有曰自狀其過以不當亡者衆不狀其過以不當存者寡則自狀者不知自訟自訟者斯不自狀矣子曰十室之邑必有忠信如丘者焉不如丘之好學也十步之内必有茂草十室之邑必有忠信忠信則徳性能尊尊徳性而道問學則廣大可致髙明可極其亦何所不至哉時人之徳性如孔子者蓋有之矣然不如孔子之好學此所以愚益愚聖益聖也孔子嘗曰知之者不如好之者好之者不如樂之者孔子固樂矣而言好學何也蓋好之者不必樂樂之者必不不好孔子於道則樂於學則好故曰樂以忘憂又言好古敏以求之也顔淵之好學而不改其樂殆庶幾於此雍也第六子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然孔子於冉求則曰百乗之家可使為之宰於子路則曰千乗之國可使治其賦於仲弓則可使南面是冉求可以仕大夫而亦可以仕諸侯子路可以仕諸侯而亦可以為諸侯仲弓可以為諸侯矣語之以王者之佐則未也惟顔子可以當之仲弓問伯子孔子答之以其人可也然失之簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎葢人主執要則百事詳叢脞則百事隳則簡者先王之所尚也然内之所居者敬外之所行者簡則在下者有所從内之所居者簡外之所行者亦簡則在下者無所從子桑所為無乃太簡而孔子以雍之言為然則其行可使南面矣在易之坤言君子敬以直内繼之以不習无不利敬以直内居敬也不習无不利行簡也春秋時有公孫子桑意伯子即其人歟哀公問弟子孰爲好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也思屬土怒屬水水可以勝土故怒可以勝思不遷怒則犯而不校者也不貳過則知不善未嘗復行者也蓋能懲忿然後能不遷怒能窒慾然後能不貳過不遷怒不貳過則能修性矣故孔子謂之好學然不遷怒則所怒以類而已未至於出怒不怒不貳過則无祇悔而已未至於敦復无悔此所以止於殆庶㡬也列子之論死生則曰由生而亡不幸也揚子之論夀則曰人以其仁顔子之短命雖曰不幸然以其仁則無害其為夀也葢不遷怒不貳過盡性也不改其樂知命也顔子未至五十而知天命蓋知命必以五十者非若謂五十而猶不知天命則不可也子華使於齊冉子爲其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉子曰赤之適齊也乗肥馬衣輕裘吾聞之也君子周急不繼富原思爲之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎可以與可以無與無與可也與傷惠可以取可以無取無取可也取傷廉子華之富非可多與也多與則為傷惠原思之宰非可無取也取之則非傷廉此孔子所以不許冉有之請而止原思之辭也昔人有歸四布君子不以為㢘有以賻布頒兄弟之貧者君子以為善則不歸四布義也頒兄弟仁也孔子止思之辭是亦仁義而已矣子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舎諸卿大夫之子不脩禮義則歸之庶人庶人之子非不賤也能修禮義則可進為大夫然愚知貴賤其可以類言哉故孔子謂仲弓曰犂牛之子騂且角大可以祀天小可以祀廟孔子獨以山川為言者蓋諸侯之禮得祭山川之在境内者而仲弓之才可使南面故以山川言之周官陽祀用騂牲毛之隂祀用黝牲毛之隂祀陽祀各以其色牲毛之然山川之祀不特以騂以騂舉其盛者而已子曰回也其心三月不違仁其餘則日月至焉而已矣仁在天則為尊爵在人則為安宅其為器重而舉者莫能勝其為道逺而行者莫能至以顔子之不違仁猶不過三月而已則夫人之為仁不亦難乎孔子之於回蓋其所試者然也其後告之以克己復禮而請事斯語則其不違也蓋將終身焉不特三月而已其餘則日月至焉者所謂不能期月守也由求之徒孔子皆曰不知其仁以此而已季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有能勇而不能怯果也聞一知二達也可以足民藝也果㡬於義達與藝㡬於智為政使人器之而已故雖才之不備而有可施於政者皆所不棄也然達而不果不足以有行果而不藝不足以有能三者雖不同然皆可以從政猶樝梨橘柚其味相反而皆可於口康子誠能兼用之則魯國不亦庶幾乎然此具臣而已語以大臣之事則未也三者之序藝不及果果不及達此先果後達者即康子所問而告之也夫才者言之實言者才之文善於言語者必善於政事善於政事者未必善於言語則其政事可知矣是亦不在政事之列無害其可使從政也季氏使閔子騫爲費宰閔子騫曰善爲我辭焉如有復我者則吾必在汶上矣邦有道危言危行邦無道危行言孫故也善雖不吾與吾將强而為不善雖不吾惡吾將强而去如有復我者則吾必在汶上矣强而去可也家語有子騫為費宰問政之事則子騫為費宰矣蓋子騫不願為費宰者志也終為費宰者不得已也伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也由生而生者常也由生而死者不幸也由死而生者幸也顔淵之死孔子曰不幸短命死矣伯牛有疾孔子曰亡之命矣夫斯人也而有斯疾也皆以其由生而亡者也揚子曰命不可避者也顔氏之子冉氏之孫以其無避也此所謂順受其正也禮曰始反而亡焉失之矣則死與亡固不同孔子於顔子曰死於冉牛曰亡者以死對亡則異通言之則一也死矣者已然之辭亡之者未然之辭子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也天下之所重君子之所輕天下之所憂君子之所樂故衣朱懐金不能重顔子之輕簞瓢陋巷不能憂顔子之樂此所以明明在上百官牛羊舜也闇闇在下畎畆簞瓢亦舜也然則回之樂人樂也子之樂以忘憂天樂也人樂者能樂而樂也天樂者又無能樂也始終言賢哉回也與泰伯篇禹無間然章易其唯聖人乎皆兩稱之同意冉求曰非不說子之道力不足也子曰力不足者中道而廢今女畫志有餘而力不足中道廢者也力有餘而志不足自畫者也中道而廢者君子之所惜自畫者君子之所惡求之畫而自以為力不足則其不智甚矣揚子曰百川學海而至於海丘陵學山而不至於山則勤而不已者無所不至惰而自畫者無所能至也書曰為山九仞功虧一簣孟子言掘井九軔而不及泉猶為棄井皆自畫之謂也子謂子夏曰女爲君子儒無爲小人儒古之儒者一而已矣周官儒以道得民則凡以非道得民者皆非儒也後世澆漓而道術將為天下裂於是有君子之儒有小人之儒君子之儒惟務本小人之儒在趨末子夏之為已止於文學其為人止於洒埽應對進退此趨末者也故孔子戒之曰女為君子儒無為小人儒荀卿言有俗儒有雅儒有大儒揚子又言有真儒真儒以性言大儒以業言雅儒似君子俗儒似小人子游爲武城宰子曰女得人焉耳乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也以天下與人易為天下得人難則賢者百福之宗神明之主而為政者其可以不得之乎子賤之治單父其於賢也有以父事者有以兄事者有以友事者而孔子歎美之則子游為宰而問之以得人固其所也滅明行不由徑無邪也非公不至無私也羔羊之正直如是而已此家語所以言滅明公正無私也荀卿曰出於其門入於公門歸於其家無有私事滅明之謂也傳曰滅明有君子之容而不勝其貎者責賢者備故也子曰孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也書於矜言能於伐言功能在内者也功在外者也自伐則喪厥功自矜則喪其能伐譬則賊也矜譬則殘也故老子於自伐言無功自矜言不長而已春秋之時師敗而奔惟恐其不全在師而有功者惟恐其不彰之反於齊之戰也殿軍而不奔䇿馬而不進人之所難也故夫子取之子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣佞則不美美則不佞矣天下有道恱美而惡佞天下無道恱佞而惡美故曰不有鮀佞與朝美難免今世矣春秋所謂宋公子朝非孔子所謂宋朝者也夫子於治宗廟則取之於佞則非之非之者直拒之所以立本取之者節取之所以趨時子曰誰能出不由户何莫由斯道也人之啓處雖不同所出者户而已萬物散殊雖不一所由者道而已衆人無異於萬物則由之而不知君子異於衆人則由而知之蓋户者出入之所自者也此言由道故云誰能出不由户揚子言學道故云惡由入曰孔氏孔氏者户也子曰質勝文則野文勝質則史文質彬彬然後君子野非君子之所在故曠於禮而不知文史則官書之所繫故專於文而不知本二者皆非中道而已俗之好質者則曰質而已何以文為好文者則以文滅質以博溺心此孔子所以言質勝文則野文勝質則史文質彬彬然後君子也孔子曰義以為質禮以行之彬彬之謂也彬從林質也從彡文也揚子曰華無實則史實無華則野華實副則禮又曰事勝辭則史辭勝事則賦事辭稱則經然君子之彬彬豈特施於禮樂間哉野非君子所尚而孔子欲從先進者姑以救弊云耳子曰人之生也直罔之生也幸而免君子以由生而生為常以由生而亡為不幸小人以由死而死為常由死而生為幸人之生也直由生而生也罔之生也幸而免由死而生也蓋直本有生之道雖不幸而死君子以為猶生罔原有死之道雖幸而免君子以為猶死是以回牛之死不足謂之夭盜跖之永不足謂之夀子曰知之者不如好之者好之者不如樂之者知之者為學日益而窮理者也興於詩者能之好之者為道日損而盡性者也立於禮者能之樂之者損之又損而將以至於命者也成於樂者能之表記之言仁强仁不若利仁利仁不若安仁中庸之言明善不若誠善誠善不若至誠亦若此而已莫非知也有生而知之有學而知之有困而知之聖人則生而知之賢人則學而知之下於賢人則困而知之莫非好也有好之淺者有好之深者就有道而正焉日知其所亡月無忘其所能此其淺者也顔子之好學孔子之好古此其深者也莫非樂也有人樂有天樂顔子不改其樂人樂也孔子樂以忘憂天樂也子曰中人以上可以語上也中人以下不可以語上也天下有均善之性無均美之才故中人以上可以語上中人以下不可以語上老子曰上士聞道勤而行之可以語上者也中士聞道若有若亡可以語上下者也下士聞道大笑之不可以語上者也中人以上譬則火也其性趨上中人以下譬則水也其性趨下於其趨上也而語之以下則不仁於其趨下也而語之以上則不智故孔子之於門人不以語回者告由不以語由者告求凡皆因其材而已此所謂不陵節而施之者也人之生雖參差不齊其大致不過此三品而已樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁曰仁者先難而後𫉬可謂仁矣務民之利而害在其中焉務民之利非特其利不可以必得也失義而得害然則務民之義孔子以為知不亦宜乎有己之義有民之義仕則不稼佃則不漁詩云采葑采菲無以下體觴酒豆肉則辭而受惡衽席之上辭而坐下朝廷之位辭而就賤同爵則尚齒同齒則尚長若此之類所謂己之義也耕者讓畔行者讓路壯者代老少者事長窮乏相周患難相救詩云雨我公田遂及我私若此之類所謂民之義也上之所好下必有甚焉者樊遲好利務為鬼神之事者也聖人欲其務己之義則教之曰上好義則民莫敢不服知己之務然後可以率民則教之曰務民之義以義為務則不失矣敬鬼神而逺之者敬則致生之逺則致死之也凡此所謂知也其為器重舉之莫能勝其為道逺行之莫能至言之則訒為之則難凡此所謂仁也問知一也一告之以務民之義敬鬼神而逺之又告之以知人問仁一也一告之以先難而後獲又告之以愛人與夫居處恭執事敬與人忠何也義敬與獲在已者也知人愛人在彼者也務其在己者然後能其在彼事之序也智之敬則敬鬼神而逺仁之敬則居處執事恭敬而已無所不敬也其與人忠不特愛之而已問仁則先難而後獲問崇徳則先事後得者對事而言故曰得對難而言故曰獲而得兼於事者也故於崇徳言先事仁愛人者也故於仁言先難子曰知者樂水仁者樂山知者動仁者静知者樂仁者壽應物而利之者水也附而育焉者山也知者樂水故動仁者樂山故静是動則利仁者也静則安仁者也動則見理故樂静則得性故夀然動者非不静也静者非不動也知者非不夀也然知者之夀不若仁者之盛仁者夀則樂不足以言之也哀公問曰知者夀而孔子對之以人有三死飲食不節勞逸過度疾共殺之居下位而上誣其君嗜慾無厭刑共殺之以少犯衆以弱侮强兵共殺之知士仁人動静以義喜怒以時無害其性欲得夀焉何不可乎是知者亦非不夀也樂水樂山言其情動静言其用樂夀言其功葢惟有情斯有用有用斯有功辭之序也子曰齊一變至於魯魯一變至於道春秋之時成霸功者莫如齊秉周禮者莫如魯由齊之尚功而變之則至於魯由魯之好禮而變之則至於王道齊譬則召南也魯譬則周南也道譬則雅也由魯變而至於道則無齊魯之異政由周變而至於雅則無周召之殊猶之百川至海知有海而不知有百川四時成歳知有歳而不知有四時也文王能變周召以至於雅孔子未能變齊魯以至於道孔子欲變齊魯以歸於道孟子欲逃楊墨以歸於儒則孔子之時異於文王之時孟子之時又有異於孔子之時矣子曰觚不觚觚哉觚哉有觚之實然後有觚之名有觚之名而無觚之實則觚不觚矣尚得謂之觚哉詩有南箕北斗之喻揚子雲有象龍之論凡皆譏其有名無實者也孔子之時實不稱名者多矣故其歎如此宰我問曰仁者雖告之曰井有仁焉其從之也子曰何爲其然也君子可逝也不可陷也可欺也不可罔也君子以誠待物而不逆詐故可欺以明燭理而無所蔽故不可罔蓋欺者以偽為真罔者以無為有以偽為真則有可信之端以無為有則直罔於人而已故象之偽喜舜不疑其偽校人之烹魚子産不疑其不舎是以有可信之端也放齊以朱為啓明堯以為嚚訟共工以驩兜為有功堯以為静言庸違是直罔於人者也宰我問井有人焉其從之也孔子曰何為其然也君子可逝也不可陷也可欺也不可罔也可逝也不可陷也故井無人可欺也不可罔也故知井無人孟子曰君子可欺以其方難罔以非其道子曰君子博學於文約之以禮亦可以弗畔矣夫博學於文則無不該約之以禮則有所執無不該則所知者詳有所執則所趨者中斯亦可以弗畔矣畔者有見乎四旁之地弗畔則趨中可知矣約之以禮可以弗畔則成於樂者斯不畔矣此所謂一貫也顔淵曰博我以文約我以禮回於道亦可云弗畔矣故稱其殆庶㡬揚子稱其未達一閒耳子見南子子路不說夫子矢之曰予所否者天厭之天厭之易以大有遏惡揚善為命以否之内小人外君子為匪人然則君子小人進退消長皆天命也君子之於天命知之故能畏之畏之故能順之君子見所不見順天命也順天者存而逆之天所厭故於子路不恱而矢以予所否者天厭之天厭之然則孔子之於公山弗擾子路不恱而告之以人事於此告之以天命者蓋見南子者在天不在已也之公山弗擾者在已不在天也夫子之見南子與睽之初六同意子曰中庸之爲徳也其至矣乎民鮮久矣莫非徳也有髙明之至徳有中庸之至徳莊子至徳之世髙明之至徳也周禮之至徳為道本中庸之至徳也禮曰中者天下之大本莊子曰庸者用也用者通也則中者至徳之體庸者至徳之用也君子以髙明者人之所難勉中庸者人之所易行故不以其所難勉者强之使行而以其所易行者同之於民將人人能之夫所謂民鮮久矣由上失其道非一日也子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸夫仁者已欲立而立人已欲達而達人能近取譬可謂仁之方也已非神而化之使民宜之不足以博施濟衆非以百姓之心為心不足以安百姓博施濟衆修已以安百姓者天下之至難堯舜者天下之至聖以天下之至聖猶病天下之至難則下於堯舜者其可易言哉書曰安民則惠惟帝其難之老子曰多異必多難是以聖人猶難之皆此意也素問曰神用無方謂之聖惟無方故所施者博而所濟者衆若仁則有方矣又曰己欲立而立人已欲達而達人能近取譬可謂仁之方也已蓋立則不廢達則不窮自立自達而忘乎人則入乎楊而非所謂兼愛立人達人而忘乎已則入乎墨而非所謂自愛故欲立欲達者仁之自愛也立人達人者仁之兼愛也傳曰獨貴獨富君子恥之此之謂也彼危人而自安害人而自富者豈知此哉論語全解卷三
