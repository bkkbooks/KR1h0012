body:
  text: 欽定四庫全書論語全解卷四宋陳祥道撰述而第七子曰述而不作信而好古竊比於我老彭道德之原出於天而其說始於古老子之言道德躬因之而已故曰述而不作信而好古老子之言有言古之善為士者有言古之為道德者有言古之所謂曲則全者有言執古之道以御今者則述而不作信而好古可知矣信則有之也好則不特知之而已故孔子比焉聖人之於人將自明之則自尊而卑之所以信其言於後世孔子之竊比於我老彭尊之所以信其言也孔子祖述堯舜憲章文武述而不作之謂也好古敏以求之信而好古之謂也蓋聖人達而在上則帝王天子之德而有所作窮而在下則元聖素王之道而不敢作不敢作則信而好古而已有所作則不特自信而又人信不特好古而又稽而行之也然孔子之作春秋其事則述其書則作故其言曰其事則齊桓晉文其文則史其義則􅉌竊取之矣與夫不知而作者多矣諸子之學有不知無位而作之者有不知無德而作之者又有不知先王之法既已致隆而或苟作之者皆在所棄焉孟子曰孔子作春秋而亂臣賊子懼蓋唐虞成周未有懼之者此聖人所以有作也彭之言行於傳無道豈古之彭祖者乎子曰默而識之學而不厭誨人不倦何有於我哉默而識之德也學而不厭知也誨人不倦仁也時之人道聼而途說皆德之棄非所謂默而識之也或畫焉或願息焉非所謂學而不厭也或先傳而後倦非所謂誨人不倦也故特自成而已蓋學在已故言厭誨在人故言倦叔向曰求善不厭施舍不倦楊子曰事不厭教不倦合而言之則厭與倦皆在已而已故曰我學不厭而教不倦子曰德之不修學之不講聞義不能徙不善不能改是吾憂也德在內者也不修則不充學在外者也不講則不明聞義不能徙則善不備不善不能改則行不完皆孔子所憂者也然樂而不憂所以處已憂而不樂所以與人同樂以忘憂處已者也樂天知命憂之不與人同者也德之修然後能講學學之講然後能徙義德之修學之講未能無不善改之而已孔子言君子不重則不威學則不固主忠信而終之以過則勿憚改與此同意子之燕居申申如也夭夭如也人之情矜慎於行禮之際其不失禮也易優游於無事之際其不失禮也難子之燕居申申如也夭夭如也非夫盛德之至孰與此哉申申言肆而不曲夭夭言不以老壯自居於子之燕居縱言肆猶至於禮而不屈也居不容不以老壯自居也肆而不屈則直不以老壯自居則和所謂居不容燕居告溫溫知夭夭之謂也禮記有言仲尼燕居有言孔子閒居蓋退朝曰燕居燕曰閒子曰甚矣吾衰也久矣吾不復夢見周公形接為事神遇為夢事見於有為夢出於有思孔子之盛時嘗欲有大勳勞於天下而思周公之所為故夢見之及其衰也知時命不我與而不復思周公所為故不復夢見之髙宗之夢傅說文王之夢臧丈人其出於有思亦如此莊周曰古之真人不夢何也真人以性言聖人以德言性則入而冥道故無夢德則出而經世故有夢子曰志於道據於德依於仁游於藝揚子之言道德仁則合異以為同故曰道德仁人得之以人之天也老子之言道德仁則散同以為異故曰失道而後德失德而後仁其實一也蓋道則無體故志之而已德則有體故可據據德所以立己依仁所以行已禮體此者也義宜此者也智知此者也信誠此者也言道德仁則義智信舉矣道德仁君子之務本藝則君子之餘事周官司徒教萬民以六德六行然後繼之以六藝師氏教國子以三德三行然後保氏教之以六藝則藝豈君子所先哉特游之而已少儀曰士依於德游於藝何謂依於仁曰德之所愛者仁也其所以制者義也愛則近於厚制則近於薄君子處其厚故依於仁不依於義此所以在此無惡在彼無射也今夫已之子與兄之子均在所愛也孔子則以其子妻公冶長以兄之子妻南容此依於仁而施於親親者也已之與人均在所責也孔子則躬自厚而薄責於人此依乎仁而施乎人者也君臣之分道合則從不合則去孔子於魯不欲茍去必欲以微罪行孟子於齊不欲速行必至三宿然後出晝此依乎仁而施乎君者也然則君子之於仁奚所處而不依哉此所以造次必於是顛沛必於是也然此言依於仁禮記言依於德仁即是德故也此言志於道孟子言志於仁者仁即是道故也子曰自行束修以上吾未嘗無誨焉孟子曰君子之所以教之者有如時雨化之者有成德者有達財者有答問者有私淑艾者則行束修淑艾者也自私淑以上未嘗無誨則四者可知矣君子之於人常患其所不學而不倦其所教其於教也常恕其所不足而不嚴其科故潔已以進者孔子未嘗不與以是心至者孟子未嘗不受則行束修以上豈或遺之哉然孔子不見孺悲孟子不見滕更非不教也不屑之教也束修與禮記穀梁所謂束修之問者意似同子曰不憤不啓不悱不發舉一隅不以三隅反則不復也憤在氣悱在心氣不憤不能誠心問故不啓心不悱不能誠心辨故不發啓之發之則舉一隅不以三隅反則不復此又惡其不思也蓋啓所以開之發所以示之不以三隅反則不復欲其思而自得也蓋君子之於人能道之以善而不能使之自得猶夫匠之於人能與之規矩而不能使之巧故性與天道子貢所不得聞鬼神與死子路所不得聞豈非不以三隅反則不復哉禮記曰開而不達則思孟子中道而立能者從之此之謂也然此言學者之道而已鄙夫問於我叩兩端而竭焉子食於有喪者之側未嘗飽也子於是日哭則不歌天之道隂陽不同時則當喪而飽者逆道也人之理哀樂不同日則哭日而歌者逆理也行弔之日不飲酒食肉况食之飽乎鄰有喪舂不相里有殯巷不歌况哭之日歌乎禮曰哭日不歌弔於人是日不樂又曰飢而廢事非禮也飽而忘哀非禮也孔子所以未嘗飽與不歌者執禮故也古之人哀樂歌哭同日者惟祭而已故禮記曰祭之日哀與樂半周禮女巫曰邦之大烖歌哭而請子謂顔淵曰用之則行舍之則藏惟我與爾有是夫子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也學不至於不惑不可以語去就之義行不至於不惑不可以言廢興之命故用之則行舍之則藏惟孔子能之蓋君子藏器於身待時而動用舍不纍於一身其流止不失其為淵其所謂明明在上亦山雌也暗暗在下亦山雌也夫豈以盛行之通窮居之塞而為之加損榮醜哉此所以為孔顔也子路以孔子稱顔回故問之曰子行三軍則誰與孔子答之以暴虎馮河死而無悔者所以戒其勇也必也臨事而懼好謀而成者所以教其怯也子路聞乘桴浮於海則喜非所謂臨事而懼有父兄在聞斯行之非所謂好謀而成此所以無所取材也兵法曰勇之為將乃萬分之一又曰謀者違害而就利則行三軍者其可懼哉孟施舍量敵而後進慮勝而後㑹臨事而懼者也方叔元老克壯其猶好謀而成者也子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好富在天所好在已在天者不可以求在已者可以自樂故曰富而可求雖執鞭之士吾亦為之如不可求從吾所好執鞭之士其位則卑其職則賤周官條狼氏之類也孔子之欲富豈如是之甚哉以為在天者不可以求凡以與民同患而已然言富而不及貴者以其為利所在故也子之所愼齊戰疾齊必有明衣布齊必變食愼齊也曰不教民戰是謂棄之必也臨事而懼好謀而成者慎戰也康子饋藥曰丘未達不敢嘗慎疾也慎齊故祭則受福慎戰故戰則克慎疾則命受其正慎齊所以仁鬼神慎戰所以仁民慎疾所以仁已此先齊戰而後疾禮記言祭戰而不及疾者仁已之事雖聖人所慎亦非其所先也聖人之所慎非止此三者而已特舉其重故也子在齊聞韶三月不知肉味曰不圖為樂之至於斯也有盡美然後知天下之謂美者斯不美矣有盡善然後知天下之謂善者斯不善矣韶之為樂盡善孔子聞之故將忘天下之為美善者又况肉味哉魏侯聼古樂惟欲臥齊宣王不好先王之樂此真樂鷃以鐘鼓載鼷以車馬也豈知孔子樂韶之意哉司馬遷曰聞韶三月學之然孔子之樂韶器尚矣其在齊則感其仁聲而已非學也冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也聖人之行有浮於言而言未嘗不顧於行故觀其所言足以知其所為此子貢所以問夷齊之事而知其所以不為衛君也蓋兄弟之讓則仁父子之爭則不仁孔子善夷齊之仁而惡衛君之不仁此所以知其不為也子貢疑孔子之為衛君孟子則謂智足以知聖人子貢之知出類拔萃而已至於不為衛君則不知也孔子以夷齊為賢人孟子以夷齊為聖人者以伯夷為聖即能化而言也以夷齊為賢以明已之集大成者亦賢而已此孔子不居聖之意也子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲貧與賤人之所惡不以其道得之不去也故飯疏飲水曲肱而枕樂亦在其中富與貴人之所欲不以其道得之不處也故不義富貴於我如浮雲子曰加我數年五十以學易可以無大過矣神無方也非精義則不可入易無體也非知命不可以學聖人入而為天之所為故無過出而為人之所為則不能無過孔子五十而學易則為天之所為故可以無大過矣可以無大過則於過之小者有所不免蓋七十而從心然後無過矣易曰敦復無悔是也聖人之於易必以五十而後學然必云五十者制行以人不以已也子所雅言詩書執禮皆雅言也不言詩書則無以教人不言禮則無以明分故子所雅言者詩書也執而不敢議者禮也言詩書而不及樂與春秋易者蓋德不全者不可道之以樂志不定者不可發之以春秋不知命者不可申之以易也子罕言利與命與仁亦猶是也孔子之於言有所雅言有所不言有所罕言其趣雖不同亦各適其理而已葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾子曰我非生而知之者好古敏以求之者也葉公問孔子於子路子路不對非不知對不足對也蓋曰以孔子之道對葉公是語蛙以海樂雞以韶適滋以惑也孔子曰女奚不曰發憤忘食樂以忘憂不知老之將至蓋曰奚不俯其言而對之以此也孔子之於道非學也非不學也以為非學則吾非生而知之好古敏以求之以為非不學則我非多學而識之豫一以貫之非學也所以學人異非不學也所以學人同子不語怪力亂神直言曰言論難曰語怪力亂神非不言也不語於人而已不語怪力則所語者常與德也不語亂神則所語者治與人也怪之為害不若力力之為害不若亂怪力亂人之所為故先之神則非人之所為故後之楊子曰神又茫茫聖人曼云則不語神之謂也李究曰力不由理為怪力神不由正為亂神誤矣子曰三人行必有我師焉擇其善者而從之其不善者而改之善者吾師也不善者亦吾師也師其不善所以自修此所以三人行必有我師也若夫師其善而不師其不善則內無以自省外無以自觀其欲至於君子難矣然則不善之師其可忽哉老子以强梁為教父釋氏以邪盜之類為人師亦此意也子曰天生德於豫桓魋其如豫何孔子於桓魋之暴則曰天生德於豫於匡則曰天之未喪斯文蓋德所以足乎已而君子之所獨文所以化於人而天下之所同故於桓魋則危疑而已故稱在已者而歸之於命於匡有死之道故稱在人者而歸之於時以明桓魋不能害天之命匡人不能易天之時也紂曰我生不有命在天王莾曰天生德於豫漢兵其如豫何奚德哉子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是􅉌也孔子之誨人其不倦仁也其無隱忠也不倦與先傳後倦者異矣無隱與教人不盡其才者異矣惟其開而不達引而不發不以三隅反則不復再三瀆則不告此弟子所以疑其隱也子以四教文行忠信忠信所以成終始也學由中出故以文為餘事教自外入故以文為先務乾九三先之以忠信進德所以成始孔子之四教後之以忠信所以成終子曰聖人吾不得而見之矣得見君子者斯可矣子曰善人吾不得而見之矣得見有恆者斯可矣亡而為有虛而為盈約而為泰難乎有恆矣有常者能常而已非可欲者也故不足於善人善人能為可欲而已非充實者也故不足於君子君子充實而已非大而化之者也故不足於聖人有常可與共學者也善人可與適道者也君子可與立者也聖人可與權者也聖人不可得則思君子善人不可得則思有常詩之子襟先子襟而繼之以子佩素冠先素冠而繼之以素鞸褰裳先他人而繼之以他士凡皆思其次者而已亦此意也孔子曰不得中行而與之必也狂狷乎孟子以琴張曾晳牧皮為狂以不屑不潔之士為狷則狂可以為善狷者有恆而已若夫亡而為有虛而為盈約而為泰難乎有恆矣此易所謂不恆其德也蓋虛非亡也特未盈而已約非虛也特約之而已亡而為有甚於虛而為盈虛而為盈甚於約而為泰其序如此子釣而不綱弋不射宿釣與弋君子與人同不綱不射宿君子與人異君子於物愛之弗仁其愛之也不綱不射宿其弗仁也不免於釣弋孔子窮而在下其不忍如此使達而在上則其仁可知也春秋時有干戈相尋屠城滅國舉無噍類况有釣而不綱者乎有以乘人之厄掩人不備而襲之况有弋不射宿者乎子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也君子之於學也逺則聞而知之近則見而知之多聞患於不能擇能擇則知所從多見患於不能識能識則知所辨此特知之而已吾道一以貫之則知之上也孔子曰生而知之者上也學而知之者次也則知之次者學者之事也曾子子貢皆聞一貫於孔子曾子能唯而不能辨子貢知聼而不知問則知之上者聖人之事也然此未離乎知而已乃若離一以至於無始去知以至於無知則又聖人之妙也互鄉難與言童子見門人惑子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其往也聖人不以能病人而常待之以恕故潔已以進者在所與不以智逆物而常繼之以義故於往在所不保與其潔故子路變服而至則教之不保其往故宰豫與辭於後則聼之門人不知而惑於童子之見孔子示之以唯何甚則不與其潔者甚於所擇也保其往者甚於所逆也孔子不為已甚故韓愈曰言辭之不則禮貌之不答雖孔子不得行於互鄉也孟子之設科來者不拒廋則不得亦此意與與其潔則所謂汚者斯不與矣不保其往則親於其身為不善者斯拒之矣子曰仁逺乎哉我欲仁斯仁至矣陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸茍有過人必知之周公之過以親也孔子之過以君也過于厚者也過於厚以人知之為幸過於薄以人不知為幸故曰古之君子過也如日月之食人皆見之更也人皆仰之今之君子豈徒順之又從而為之辭子與人歌而善必使反之而後和之樂者人情之所不免君子樂得其道小人樂得其欲孔子于韶則忘味于歌之善則和樂得其道也子曰文莫吾猶人也躬行君子則吾未之有得行者君子之務本文者君子之餘事與其行不足而文有餘不若行有餘而文不足今吾於文也不特猶人而已然躬行君子未之有得則是行不足而文有餘也蓋時之人與其文不究其實而不知其非故孔子自謂如此以救其弊子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也聖者天道之至仁者人道之至語仁之未成名雖管仲子産亦可謂之仁人語仁之成名雖孔子有所不敢孔子之所不敢非不敢也不居之而已孔子以為不厭誨不倦為非聖賜赤或以為既聖或以為不能學者不厭不倦聖人之所為而學者之所難也不曰學之不厭而曰為之不厭者蓋曰仁聖之成名我不敢居特為仁聖之事而已為仁聖之事故學不足以言之子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾於上下神祗子曰丘之禱久矣疾與病合則一别則異周官疾醫言疾病獸醫則言病以人易知雖疾可見獸不易察病而後知是疾輕於病子疾病疾而後至於病君子於神祗未疾則禱衆人於神祗未疾則不禱既疾則禱未疾而禱禱之以正直既疾而禱禱之以祭享孟子曰夭壽不二修身以俟之所以立命也禱之以祭享是二之也孔子之疾不禱無妄之疾勿藥可也春秋之時楚昭王之疾不禱於河齊侯之疾欲誅祝史賢否可知矣子曰奢則不孫儉則固與其不孫也寧固奢則僣故失之不孫儉則約故失之固不孫則其害大固則其害小老子於奢則去之于儉則寶之管仲之奢孔子以為不知禮晏子之儉曽子以為知禮此與其奢也寧儉與其不孫也寧固然二者皆非中道以曹風之奢魏晉之儉皆詩人所刺也孔子言寧儉寧固與思狂狷同意子曰君子坦蕩蕩小人長戚戚子溫而厲威而不猛恭而安作德心逸日休故坦蕩蕩作僞心勞日拙故長戚戚君子居易以俟命大行不加窮居不損故有終身之樂而無一日之憂小人行險以徼幸未得則患得既得則患失故有終身之憂而無一旦之樂此坦蕩蕩長戚戚所以不同也子溫而厲威而不猛恭而安是亦君子之所謂坦蕩蕩也蓋溫而不厲過於柔威而猛過於剛恭而不安過於㢲子夏曰即之溫聽其言厲溫而厲也禮曰溫而愛威而不猛也子曰與人恭而有禮恭而安也溫而厲則處仁以義威而不猛則成義以仁恭而安則行㢲以禮仁而後義義而後禮事辭之序也泰伯第八子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉不纍於厚利故三以天下讓不纍於名髙故民無得而稱此所以為至德太伯之讓則國也三以天下讓者以文王之聖有得天下之道故也詩曰帝作邦作對自太伯王季又曰文王肇禋惟周之禎則文王有得天下之道也固矣後世伯夷之遜孤竹季札之遜吳國魯隱之遜桓公宋穆之遜與夷燕噲之遜子之韋元成之遜弟勝東海王强之遜弟陽鄧彪之遜弟荆丁鴻之遜弟盛劉愷之遜弟憲凡是者多矣若伯夷季札則狥義者也餘則矯異以取一時之名而已豈君子之所與哉然擬於突忽之兄弟蒯輒之父子其有間矣子曰恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞君子篤於親則民興於仁故舊不遺則民不偷好勇不好學其蔽也亂好直不好學其蔽也絞則所謂無禮者不學之蔽恭慎勇直出於德性而德性本於道學有是德性而無禮以節之故恭則不安而勞慎則過思而葸勇則至於悖亂直則至於絞迫脅肩諂笑病於夏畦恭而無禮則勞也其父攘羊而子證之直而無禮則絞也葸猶荀卿所謂諰諰然也絞猶詩傳所謂綯絞也禮曰恭而不中禮謂之給勇而不中禮謂之逆則無禮不特不中禮而已蓋恭慎則不及必跂而進於禮勇直則過必抑而就於禮禮以仁厚為質而已故繼之以君子篤於親則民興於仁故舊不遺則民不偷禮曰親者毋失其為親故者毋失其為故詩曰親親以睦故舊不遺周官八政統馭萬民一曰親親二曰敬故馭以親親則民莫遺其親馭以敬故則民莫慢其故莫遺其親則興於仁也莫慢其故則不偷矣後世不知親親而角弓之怨興不知敬故而谷風之刺作欲民免於無禮其可得乎曾子有疾召門弟子曰啓豫足啓豫手詩曰戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子父母全而生之子全而歸之孔子以不敢毁傷為孝樂正子以傷足為憂此曾子所以戰戰兢兢如臨深淵如履薄氷蓋賢者之保身猶之乎諸侯之保國也故曾子取此詩以明已之孝孝經取此詩以為諸侯之孝也先啓足而後體者便於侍疾者故也禮曰曾元曾申坐於足曾子有疾孟敬子問之曾子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯逺暴慢矣正顏色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存道無乎不在物無乎非道故默而成之於性命之理道也揮而散之於容貌辭氣亦道也蓋恭敬達之於容貌則無暴慢之容貌矣誠信逹之於顔色則無詐諂之顔色矣忠順達之於辭氣則無鄙倍之辭氣矣於顔色言近信則容貌近禮辭氣近和可知於容貌言逺暴慢於辭氣言逺鄙倍則顔色逺誕謾可知禮曰禮義之始在於正容體齊顏色順辭令又曰君子不失足於人不失色於人不失口於人與此同意人道本也事末也末在人本在仁君子則事道有司則事事故曰籩豆之事則有司存此所以告孟敬子也曾子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣能言其才多言其學以能問於不能以多問於寡其資人者也有諸已而若無充實而若虛其處已者也以能問於不能以多問於寡則學愈博有若無實若虛則德愈充犯而不校則恕矣以能問於不能至實若虛不伐善者能之犯而不校不遷怒者能之則曽子所謂吾友者顔子而已孔子曰以直報怨顔子犯而不校者蓋犯非必怨也曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也託言其所恃寄言其所付六尺之孤其責重故言託百里之命其責輕故言寄老莊皆曰貴以身為天下乃可託天下愛以身為天下乃可寄天下則貴者不辱其身而其德尊愛者不危其身而其德殺於德尊者言託於德殺者言寄是託於寄為重寄於託為輕通而言之則一也故寓公於喪服傳曰寄公於君孟子則曰託於諸侯可以託六尺之孤仁也可以寄百里之命義也臨大節而不可奪忠也苟非君子孰能與此曾子曰士不可以不弘毅任重而道逺仁以為已任不亦重乎死而後已不亦逺乎士不可以不尚志不可以不弘毅弘則張大而有容毅則致果而有濟孟子曰其為氣也至大至剛蓋人生莫不有剛大之氣患乎不能尚志以帥之尚志以帥之則弘可以致至大毅可以致至剛故能任重而道逺禮曰仁之為器重其為道逺舉者莫能至此所以不可不弘毅也詩曰惟仲山甫不侮矜寡不畏强禦德輶如毛惟仲山甫舉之則不侮矜寡弘也不畏強禦毅也惟仲山甫舉之任重也記曰斃而已矣荀卿曰生乎由是道死乎由是道逺之謂也坤言厚德載物乾言自强不息則任重者地道逺者天道充𢎞毅至此則大人之事備孟子於士尚志則兼仁義言之此則言仁不及義者仁者義之本故也子曰興於詩立於禮成於樂學始於言故興於詩中於行故立於禮終於德故成於樂禮樂者成人之事詩者養䝉之具孔子之於小子則曰何莫學夫詩於成人則曰文之以禮樂此禮所謂志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉者也然興於詩非不學禮也特不可謂之立立於禮非不知樂也特不可謂之成禮曰十有三年學樂誦詩舞勺成童舞象學射御二十而冠始學禮學記之教人亦先之以安絃夔之教胄子亦先之以樂於此言成於樂則樂者學之所終始也惟其禮樂皆得謂之有德然後為修之至矣荀子曰學始於誦詩終於讀禮是可以與立也以為學止乎此則未也子曰民可使由之不可使知之聖人制行以人不以已議道以已不以人以人不以已故禮方而卑所以廣業而其仁顯以己不以人故智圓而神所以崇德而其用藏顯故民可使由之藏故不可使知之易曰百姓日用而不知孟子曰終身由之而不知其道者衆矣是也惟其不知故不可使知之不可使知之而必其知則是以已之所能者病人以人之所不能者愧人是雖至於折骨絶筋亦無益也此所以有餘不敢盡也若夫老子所謂古之善為道者非以明民莊子曰聖人者天下之利器不可以示人則進於此矣子曰好勇疾貧亂也人而不仁疾之已甚亂也子路好勇矣然衣敝縕袍而不疾貧故不為亂商􅉌開疾貧矣然力弱而不好勇亦不為亂好勇而不疾貧則未必為亂貧而不好勇則不能為亂故曰好勇疾貧亂也夫鳥窮則搏獸窮則攫馬窮則逸人窮則詐故於不仁者剋核太至則不肖之心應之故曰人而不仁疾之已甚亂也蓋不仁者非不疾之疾之不可已甚孔子之不為已甚老子之言去甚者此也疾不仁者義也不至於已甚者智也兵法曰冦窮勿追亦此意也子曰如有周公之才之美使驕且吝其餘不足觀也已才之美者莫過於周公行之醜者莫甚於驕吝有周公之才之美使驕且吝猶不足觀又况才美下此者乎蓋君子以禮存心故不驕以仁存心故不吝小人以驕滅敬而忘禮以吝滅愛而忘仁忘禮與仁非所謂有德者也其何以觀之哉荀卿曰弓調然後求徑馬服然後求良士信慤然後求智能士不信慤而多智能譬之豺狼不可以身近之亦此意也子曰三年學不至於穀不易得也米以不失穀為善人以不失性為仁善為仁之體仁為善之用孟子以五榖譬仁則榖者仁之實也君子之學一年則論學取友七年小成九年大成若夫仁以為已任死而後已三年學其可以至榖哉此所以樂其自强不息也莊周曰美成在久荀卿曰真積力久則入此之謂也孔子曰有能一日用其力於仁者蓋謂誘之而已子曰篤信好學守死善道危邦不入亂邦不居天下有道則見無道則隱篤信則於道不疑好學則於道不厭守死善道則於道不變學至於此然後知廢興之有命去就之有義故曰危邦不入亂邦不居天下有道則見無道則隱故君子體龍之潜升以為德體鳯之顯隱以為行邦有道則以道狥身而行邦無道則以身徇道而隱此所謂當治世而不避其任遭亂世而不為茍存然有是言也而言之不必信有是行也而行之不必果故孔子於公山佛肹之召則欲往於衛君之亂則欲入環轍天下卒老於行而未嘗隱苟非體常盡變孰能與此哉邦有道貧且賤焉耻也邦無道富且貴焉耻也於可仕之時而無可仕之道貧且賤焉耻也於可退之時而無必退之志富且貴焉耻也孔子曰邦有道榖耻也孟子曰立乎人之本朝而道不行耻也與邦無道富且貴焉耻也同一意子曰不在其位不謀其政大夫不在其政而謀其政則謂之犯分居官不在其政而謀其政則謂之侵官此易所以言思不出其位而孔子所以言各司其局此不在其位不謀其政也若夫在天則春夏秋冬不相易時在地則東西南北不相易方在人則耳目口鼻不相易用至於朝廷不歷位而相與言不踰階而相揖大至於天地之理小至於言語之儀其定分也猶且不可犯又况不在其位而謀其政哉韓之典冠者加昭侯以衣非不愛君也不免越職之誅晉之將中軍者將載厲公以車非不憂君也不免侵冒之責故庖人雖廢職而尸祝者不可以代御者雖非良而參乘者不可以呼此孔子嘗為乘田則曰牛羊茁壯長而已嘗為委吏則曰會計當而已曾子不與越冦之事孟子不以為罪陽處父易中軍之班春秋以為罪其以此歟然則於田常之亂孔子不在其位而請討季氏之旅孔子不在其位而欲救之者蓋田常之亂盡人可討季氏之旅唯告冉有而已子曰師摯之始關雎之亂洋洋乎盈耳哉治汚謂之汚治弊謂之弊治荒謂之荒治亂謂之亂關雎嘗亂矣師摯之始其亂而正之故師摯之始關雎之亂洋洋乎盈耳哉書曰聖謨洋洋禮曰鬼神洋洋乎在其上史曰洋洋乎美德役羣衆則洋洋盛美之辭師摯之始關雎之亂而孔子美之及其適齊而嘆之則其賢可知矣子曰狂而不直恫而不願悾悾而不信吾不知之矣狂則進取而無節者也恫則游移而無守者也悾則虛中而無實者也無節而直無守而願無實而信嘆未善也猶出於誠未善而無誠則非君子所與也孔子所以深非而曰吾不知之矣人之生也悾恫顓䝉則悾而後恫恫而後狂於此則先狂而後恫與悾者蓋狂者進取善也狂未以為善也以其未善而猶不直則其反常度甚矣子張色取仁而行違其狂而不直者與子曰學如不及猶恐失之學如不及猶恐失之者用殆於學其能有得乎此文武所以汲汲仲尼所以皇皇也孔子之門人猶有冉有之自畫子貢之願息宰豫之晝寢時之殆於學者多矣故孔子言此以警之子曰巍巍乎舜禹之有天下也而不與焉巍巍言成功之髙大也有天下而不與焉者如堯之無為而治者也無為而治者君子之道故孟子曰君哉舜也孟氏先堯後舜此先舜禹而後堯何也先堯後舜者堯舜先後之序也先舜禹而後堯者以舜禹之有天下本於堯故也子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章天任理人任情任理則大而公任情則小而私堯之為君子不私其天下則大而公焉故曰唯天為大唯堯則之易曰大哉乾元傳曰無為為之謂天蓋大而公然後能無為則無不為矣堯之則天至於蕩蕩乎民無能名無為也巍巍乎其有成功煥乎其有文章無不為也民無能名故謂之帝其有成功故謂之放勳其有文章故謂之重華然堯之則天之大非美而未大也則天者天之合也舜似堯為美而未大堯自以為人之不合者蓋不虐無告不廢困窮嘉懦弱而哀婦人此特堯之緒餘故也易曰天埀象見吉凶聖人則之詩曰不識不知順帝之則前乎堯者則其象而已後乎堯者順其則而已故曰唯天為大唯堯則之舜有臣五人而天下治武王曰豫有亂臣十人子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已以天下與人易為天下得人難堯舜之時野無遺賢而舜之治天下者五人而已文之時濟濟多士武之亂臣十人而已故孔子嘆其才難也考之孟子五臣則禹稷契臯陶伯益是也考之書則亂臣十人同心同德是也書稱虢叔五人之外周公太公召公畢公而已馬融以榮公與焉非也子無臣母之義則所謂婦人者邑姜而已馬融以為文母非也萇𢎞曰十人同德周以興三分天下有其二以服事殷周之德其可謂至德也已矣文王有君民之大德有事君之小心有君民之大德故三分天下有其二有事君之小心故猶服事殷如此則不以利纍名不以私纍實其德不可以有加矣此所以為至德也不謂文王之至德而曰周之至德者以明周之世世修德若文王也易曰周之盛德而此曰至德自其衰世言之則曰盛德自其以服事殷言之則曰至德子曰禹吾無閒然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無閒然矣厚飲食美衣服崇宫室人之情也菲而致孝乎鬼神惡而致美乎黻冕卑而盡力乎溝洫所以仁鬼神仁民也仁者盡人道而已人道盡則無間矣易乾元言大哉亨言大亨利言大利坤元言至哉柔言至柔靜言至靜堯以德而帝天道也故稱大哉文王以業而王地道也故稱至德帝道成於堯舜王道成於文武曰帝王之道而無間者禹而已故言禹終之論語全解卷四
